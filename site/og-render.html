<!DOCTYPE html>
<!--
  Static OG image renderer for grainulator.app
  Dimensions: 1200x630 — screenshot this to create og-image.png
  Shader frozen at t=8.0 for optimal blob configuration

  Capture instructions:
    1. Open in browser at 100% zoom (no scaling)
    2. Screenshot the viewport (macOS: Cmd+Shift+4, select the window)
    3. Or use a headless browser:
       npx puppeteer screenshot --width=1200 --height=630 og-render.html og-image.png
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Grainulator OG Image — Static</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden;background:#111}
canvas{display:block;position:absolute;top:20px;left:20px;width:1160px;height:590px}
.overlay{position:absolute;inset:0;width:1200px;height:630px;pointer-events:none;z-index:10}
.border-frame{position:absolute;inset:0;border:20px solid #111;pointer-events:none;z-index:5}
.title{
  position:absolute;
  bottom:130px;
  left:0;right:0;
  text-align:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:72px;
  font-weight:700;
  letter-spacing:-0.03em;
  color:#8df6ff;
  text-shadow:
    0 0 7px #8df6ff,
    0 0 20px rgba(141,246,255,0.6),
    0 0 40px rgba(141,246,255,0.3),
    0 0 80px rgba(141,246,255,0.15);
  z-index:20;
}
.tagline{
  position:absolute;
  bottom:90px;
  left:0;right:0;
  text-align:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:24px;
  font-weight:400;
  color:#8df6ff;
  opacity:0.45;
  text-shadow:
    0 0 5px rgba(141,246,255,0.4),
    0 0 15px rgba(141,246,255,0.2);
  z-index:20;
}
.install{
  position:absolute;
  bottom:32px;
  right:40px;
  font-family:'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
  font-size:14px;
  color:rgba(57,255,20,0.5);
  z-index:20;
}
</style>
</head>
<body>
<div class="border-frame"></div>
<canvas id="c" width="1160" height="590"></canvas>
<div class="overlay">
  <div class="title">Grainulator</div>
  <div class="tagline">Research that compiles.</div>
  <div class="install">/plugin install grainulator</div>
  <div class="claim-bar" style="position:absolute;bottom:58px;left:40px;right:40px;height:4px;display:flex;gap:3px;z-index:20;border-radius:2px;overflow:hidden">
    <div style="flex:3;background:#8df6ff;border-radius:2px" title="factual"></div>
    <div style="flex:2;background:#f43f5e;border-radius:2px" title="risk"></div>
    <div style="flex:2;background:#fbbf24;border-radius:2px" title="constraint"></div>
    <div style="flex:1;background:#22c55e;border-radius:2px" title="recommendation"></div>
    <div style="flex:1;background:#a78bfa;border-radius:2px" title="estimate"></div>
  </div>
</div>

<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;

#define NUM 12

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

float map(vec3 p) {
  float d = 100.0;
  vec2 heatDir = vec2(0.0, -1.0);

  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float hash1 = fract(fi * 412.531 + 0.513 + seed);
    float hash2 = fract(fi * 317.892 + 0.217 + seed * 1.7);
    float hash3 = fract(fi * 253.147 + 0.891 + seed * 2.3);

    float speed = (hash1 - 0.5) * 0.4;
    float phase = fi * 1.37 + seed * 6.28;

    float cycle = sin(t * speed + phase);
    float rising = cycle * 0.5 + 0.5;

    float eased = rising < 0.5
      ? 2.0 * rising * rising
      : 1.0 - 2.0 * (1.0 - rising) * (1.0 - rising);

    float travel = eased * 2.4 - 1.2;

    vec3 offset;
    offset.x = -heatDir.x * travel + sin(t * 0.08 * (0.5 + hash2) + phase * 2.1) * 0.5;
    offset.y = -heatDir.y * travel + sin(t * 0.07 * (0.5 + hash3) + phase * 1.7) * 0.3;
    offset.z = cos(t * 0.1 * (0.5 + hash3) + phase * 1.7) * 0.3;

    float size = mix(0.25, 0.55, hash1);
    d = smin(d, sdSphere(p - offset, size), 0.45);
  }

  vec3 heatPos = vec3(0.0, -2.2, 0.0);
  float pool = sdSphere(p - heatPos, 1.0);
  d = smin(d, pool, 0.5);

  vec3 coolPos = vec3(0.0, 2.2 * 0.9, 0.0);
  float topPool = sdSphere(p - coolPos, 0.7);
  d = smin(d, topPool, 0.4);

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

  vec3 ro = vec3(0.0, 0.0, 6.0);
  vec3 rd = normalize(vec3(uv, -2.0));

  float d = 0.0;
  float hit = -1.0;
  for (int i = 0; i < 96; i++) {
    vec3 p = ro + rd * d;
    float h = map(p);
    if (h < 0.001) { hit = d; break; }
    if (d > 20.0) break;
    d += h * 0.8;
  }

  float bgY = uv.y * 0.5 + 0.5;
  vec3 col = mix(
    vec3(0.06, 0.04, 0.015),
    vec3(0.015, 0.012, 0.008),
    bgY
  );

  vec2 bulbPos = vec2(0.0, -0.5);
  float bulb = exp(-dot(uv - bulbPos, uv - bulbPos) * 4.0);
  col += vec3(0.08, 0.05, 0.02) * bulb;

  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    vec3 lightDir = normalize(vec3(0.2, -1.0, 0.8));
    float diff = max(dot(n, lightDir), 0.0);
    diff = sqrt(diff);

    float amb = 0.25 + 0.15 * n.y;
    float fres = pow(1.0 - max(dot(n, -rd), 0.0), 2.5);
    float sss = max(dot(n, -lightDir), 0.0) * 0.2;

    vec3 H = normalize(lightDir - rd);
    float spec = pow(max(dot(n, H), 0.0), 16.0) * 0.12;

    float heightFade = (p.y + 3.0) / 6.0;
    vec3 waxDark = mix(
      vec3(0.20, 0.50, 0.06),
      vec3(0.12, 0.38, 0.05),
      clamp(heightFade, 0.0, 1.0)
    );
    vec3 waxBright = vec3(0.40, 1.0, 0.25);

    vec3 waxCol = mix(waxDark, waxBright, fres * 0.7);

    float underLight = max(dot(n, vec3(0.0, -1.0, 0.0)), 0.0);
    waxCol += vec3(0.08, 0.15, 0.02) * underLight;

    col = waxCol * (diff * 0.4 + amb + sss * 0.5);
    float rimInner = pow(fres, 1.5);
    float rimOuter = pow(fres, 3.0);
    col += waxBright * rimInner * 0.25;
    col += vec3(0.1, 0.35, 1.0) * rimOuter * 1.2;
    col += vec3(0.05, 0.15, 0.6) * pow(fres, 5.0) * 0.8;
    col += vec3(0.2, 0.4, 0.1) * spec * 0.5;

    float fog = exp(-hit * 0.08);
    vec3 fogCol = vec3(0.035, 0.028, 0.012);
    col = mix(fogCol, col, fog);
  }

  float vig = 1.0 - dot(uv * 0.6, uv * 0.6);
  col *= smoothstep(0.0, 0.5, vig);

  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)) + t) * 43758.5453);
  col += grain * 0.005 - 0.0025;

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');

// Fixed seed for reproducible blob positions
gl.uniform1f(seedLoc, 0.42);

// Render a single frame at t=8.0
gl.viewport(0, 0, c.width, c.height);
gl.uniform1f(tLoc, 8.0);
gl.uniform2f(rLoc, c.width, c.height);
gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
</script>
</body>
</html>
