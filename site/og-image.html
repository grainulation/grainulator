<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<title>Grainulator OG Image</title>
<style>
  @font-face {
    font-family: 'Card';
    src: local('Inter Tight'), local('InterTight'), local('Inter'), local('Helvetica Neue'), local('Arial');
    font-weight: 100 900;
    font-display: swap;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    font-family: 'Card', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0A0A0B;
    color: #F0F0F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(191, 255, 0, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(191, 255, 0, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    border-color: rgba(191, 255, 0, 0.15);
    border-style: solid;
    border-width: 0;
    z-index: 10;
  }
  .corner-tl { top: 32px; left: 32px; border-top-width: 2px; border-left-width: 2px; }
  .corner-tr { top: 32px; right: 32px; border-top-width: 2px; border-right-width: 2px; }
  .corner-bl { bottom: 32px; left: 32px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-br { bottom: 32px; right: 32px; border-bottom-width: 2px; border-right-width: 2px; }

  /* Glow behind kernel */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(191, 255, 0, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* -- Animation timeline: 10s loop (slower, more breathing room) -- */
  /* Phase 1 (0-1s): kernel + brand fade in */
  /* Phase 2 (1-2s): question types in */
  /* Phase 3 (2-3s): terminal lines appear */
  /* Phase 4 (3-4s): PASS + stats */
  /* Phase 5 (4-5s): tagline + url hold */

  .scene { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }

  /* Kernel */
  .kernel {
    opacity: 0;
    animation: fadeIn 0.6s ease 0.2s forwards, loopReset 10s linear 0s infinite;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes loopReset {
    0%   { opacity: 0; }
    6%   { opacity: 0; }
    16%  { opacity: 1; }
    92%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Brand */
  .brand {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    color: #F0F0F0;
    margin-top: 24px;
    opacity: 0;
    animation: brandAnim 10s linear 0s infinite;
  }
  @keyframes brandAnim {
    0%   { opacity: 0; }
    8%   { opacity: 0; }
    18%  { opacity: 1; }
    56%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Question */
  .question {
    font-size: 22px;
    font-weight: 400;
    color: #9A9A9A;
    margin-top: 20px;
    height: 30px;
    overflow: hidden;
    opacity: 0;
    animation: questionAnim 10s linear 0s infinite;
  }
  .question-inner {
    display: inline-block;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid #BFFF00;
    animation: typing 0.8s steps(40) 1.2s forwards, blink 0.4s step-end 1.2s 3, typingLoop 10s linear 0s infinite;
    width: 0;
  }
  @keyframes questionAnim {
    0%   { opacity: 0; }
    20%  { opacity: 0; }
    24%  { opacity: 1; }
    38%  { opacity: 1; }
    42%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes typingLoop {
    0%   { width: 0; border-color: transparent; }
    20%  { width: 0; border-color: #BFFF00; }
    36%  { width: 100%; border-color: #BFFF00; }
    40%  { width: 100%; border-color: transparent; }
    100% { width: 100%; border-color: transparent; }
  }

  /* Terminal block */
  .terminal {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 16px;
    margin-top: 20px;
    text-align: left;
    line-height: 1.8;
    opacity: 0;
    animation: terminalAnim 10s linear 0s infinite;
  }
  @keyframes terminalAnim {
    0%   { opacity: 0; }
    40%  { opacity: 0; }
    44%  { opacity: 1; }
    56%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .term-line {
    opacity: 0;
    animation: termLineAnim 10s linear 0s infinite;
  }
  .term-line:nth-child(1) { animation-name: termLine1; }
  .term-line:nth-child(2) { animation-name: termLine2; }
  .term-line:nth-child(3) { animation-name: termLine3; }

  @keyframes termLine1 {
    0%   { opacity: 0; }
    41%  { opacity: 0; }
    43%  { opacity: 1; }
    58%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes termLine2 {
    0%   { opacity: 0; }
    44%  { opacity: 0; }
    46%  { opacity: 1; }
    58%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }
  @keyframes termLine3 {
    0%   { opacity: 0; }
    47%  { opacity: 0; }
    49%  { opacity: 1; }
    58%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .term-prefix { color: #BFFF00; }
  .term-text { color: #777; }
  .term-highlight { color: #BFFF00; }

  /* PASS + Stats */
  .result {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: resultAnim 10s linear 0s infinite;
  }
  @keyframes resultAnim {
    0%   { opacity: 0; }
    58%  { opacity: 0; }
    62%  { opacity: 1; }
    76%  { opacity: 1; }
    80%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .pass {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #BFFF00;
    text-transform: uppercase;
    text-shadow: 0 0 60px rgba(191, 255, 0, 0.3);
  }

  .stats {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 16px;
    color: #666;
    margin-top: 16px;
    opacity: 0;
    animation: statsAnim 10s linear 0s infinite;
  }
  @keyframes statsAnim {
    0%   { opacity: 0; }
    64%  { opacity: 0; }
    68%  { opacity: 1; }
    76%  { opacity: 1; }
    80%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Final tagline + URL */
  .finale {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: finaleAnim 10s linear 0s infinite;
  }
  @keyframes finaleAnim {
    0%   { opacity: 0; }
    78%  { opacity: 0; }
    84%  { opacity: 1; }
    96%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .finale-tagline {
    font-size: 40px;
    font-weight: 700;
    color: #BFFF00;
    letter-spacing: -0.02em;
  }

  .finale-url {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 18px;
    color: #666;
    margin-top: 16px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="glow"></div>

  <div class="scene">
    <!-- Phase 1: Kernel + Brand -->
    <svg class="kernel" width="100" height="100" viewBox="0 0 64 64" aria-hidden="true">
      <ellipse cx="32" cy="30" rx="12" ry="22" fill="#BFFF00" transform="rotate(-8 32 30)" />
      <line x1="32" y1="10" x2="32" y2="56" stroke="#99CC00" stroke-width="1.5" stroke-linecap="round" />
    </svg>

    <div class="brand">Grainulator</div>

    <!-- Phase 2: Question -->
    <div class="question">
      <span class="question-inner">Should we use Postgres or MongoDB?</span>
    </div>

    <!-- Phase 3: Terminal lines -->
    <div class="terminal">
      <div class="term-line"><span class="term-prefix">&#9656; </span><span class="term-text">researching&hellip; </span><span class="term-highlight">6 findings tracked</span></div>
      <div class="term-line"><span class="term-prefix">&#9656; </span><span class="term-text">challenging&hellip; </span><span class="term-highlight">estimate revised</span></div>
      <div class="term-line"><span class="term-prefix">&#9656; </span><span class="term-text">compiling&hellip;</span></div>
    </div>
  </div>

  <!-- Phase 4: PASS + Stats (absolute positioned over scene) -->
  <div class="result">
    <div class="pass">Pass</div>
    <div class="stats">47 findings &middot; 12 topics &middot; 4 min</div>
  </div>

  <!-- Phase 5: Final tagline -->
  <div class="finale">
    <div class="finale-tagline">Research that compiles.</div>
    <div class="finale-url">grainulator.app</div>
  </div>
</body>
</html>
