<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Grainulator Sprint Mode — Prototype</title>
<meta name="color-scheme" content="dark">
<style>
/* === Reset + Base === */
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow-x:hidden}
body{
  min-height:100%;
  background:#0a0a0a;
  color:#e2e8f0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  line-height:1.6;
}

/* === Lava CSS Gradient Background === */
@property --lava1x{syntax:'<percentage>';inherits:false;initial-value:30%}
@property --lava1y{syntax:'<percentage>';inherits:false;initial-value:70%}
@property --lava2x{syntax:'<percentage>';inherits:false;initial-value:70%}
@property --lava2y{syntax:'<percentage>';inherits:false;initial-value:30%}
@property --lava3x{syntax:'<percentage>';inherits:false;initial-value:50%}
@property --lava3y{syntax:'<percentage>';inherits:false;initial-value:50%}

.lava-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 60% at var(--lava1x) var(--lava1y), var(--lava-c1,rgba(30,80,90,0.35)) 0%,transparent 70%),
    radial-gradient(ellipse 45% 55% at var(--lava2x) var(--lava2y), var(--lava-c2,rgba(20,60,70,0.30)) 0%,transparent 65%),
    radial-gradient(ellipse 60% 40% at var(--lava3x) var(--lava3y), var(--lava-c3,rgba(15,50,60,0.25)) 0%,transparent 60%),
    linear-gradient(to top,rgba(15,40,50,0.15) 0%,rgba(8,12,15,1) 50%,rgba(0,0,0,1) 100%);
  animation:lava-drift 25s ease-in-out infinite;
  transition:opacity 0.6s ease;
}
@keyframes lava-drift{
  0%{--lava1x:30%;--lava1y:70%;--lava2x:70%;--lava2y:30%;--lava3x:50%;--lava3y:50%}
  25%{--lava1x:45%;--lava1y:55%;--lava2x:55%;--lava2y:60%;--lava3x:35%;--lava3y:40%}
  50%{--lava1x:60%;--lava1y:40%;--lava2x:40%;--lava2y:70%;--lava3x:65%;--lava3y:60%}
  75%{--lava1x:35%;--lava1y:65%;--lava2x:65%;--lava2y:45%;--lava3x:45%;--lava3y:35%}
  100%{--lava1x:30%;--lava1y:70%;--lava2x:70%;--lava2y:30%;--lava3x:50%;--lava3y:50%}
}

/* Phase color tinting overlay */
.phase-tint{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:transparent;
  transition:background 0.8s ease;
}
.phase-tint.research{background:rgba(0,180,200,0.12)}
.phase-tint.challenge{background:rgba(200,150,0,0.10)}
.phase-tint.synthesis{background:rgba(0,180,80,0.10)}
.phase-tint.compile{background:rgba(100,100,100,0.15)}

/* === Page States === */
.page-state{display:none;position:relative;z-index:10}
.page-state.active{display:flex}

/* === INPUT STATE === */
#inputState{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  padding:2rem 1rem;
}
.input-container{
  width:100%;
  max-width:600px;
  text-align:center;
}
.input-logo{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:1.1rem;
  color:rgba(141,246,255,0.7);
  letter-spacing:0.05em;
  margin-bottom:2rem;
}
.input-field{
  width:100%;
  font-family:inherit;
  font-size:max(1rem,16px);
  color:#fff;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(141,246,255,0.2);
  border-radius:8px;
  padding:1rem 1.2rem;
  outline:none;
  transition:border-color 0.3s,box-shadow 0.3s;
  resize:none;
  min-height:56px;
  max-height:160px;
}
.input-field:focus{
  border-color:rgba(141,246,255,0.5);
  box-shadow:0 0 20px rgba(141,246,255,0.08);
}
.input-field::placeholder{color:rgba(255,255,255,0.25)}
.submit-btn{
  margin-top:1rem;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.8rem;
  color:#8df6ff;
  background:rgba(141,246,255,0.08);
  border:1px solid rgba(141,246,255,0.25);
  border-radius:6px;
  padding:0.7rem 2rem;
  cursor:pointer;
  transition:all 0.2s;
  min-height:44px;
}
.submit-btn:hover{background:rgba(141,246,255,0.15);border-color:rgba(141,246,255,0.4)}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed}
.input-hint{
  margin-top:1.5rem;
  font-size:0.7rem;
  color:rgba(255,255,255,0.2);
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
}

/* === SPRINT RUNNING STATE === */
#sprintState{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  padding:2rem 1rem;
}
.sprint-question{
  font-size:0.75rem;
  color:rgba(255,255,255,0.3);
  max-width:500px;
  text-align:center;
  margin-bottom:2rem;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.sprint-phase-label{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:1.1rem;
  color:#8df6ff;
  letter-spacing:0.1em;
  text-transform:uppercase;
  animation:phase-pulse 2s ease-in-out infinite;
  text-align:center;
}
@keyframes phase-pulse{0%,100%{opacity:0.6}50%{opacity:1}}

.sprint-counter{
  font-size:2.5rem;
  font-weight:800;
  color:#fff;
  margin:0.5rem 0;
  text-align:center;
  font-variant-numeric:tabular-nums;
}
.sprint-counter-label{
  font-size:0.65rem;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  letter-spacing:0.15em;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  text-align:center;
}

/* Claim pills stream */
.claim-pills{
  margin-top:1.5rem;
  max-height:40vh;
  overflow-y:auto;
  scrollbar-width:none;
  width:100%;
  max-width:500px;
  display:flex;
  flex-direction:column;
  gap:0.4rem;
}
.claim-pills::-webkit-scrollbar{display:none}
.claim-pill{
  display:flex;
  align-items:baseline;
  gap:0.5rem;
  padding:0.35rem 0.6rem;
  background:rgba(255,255,255,0.03);
  border-radius:4px;
  border-left:3px solid transparent;
  opacity:0;
  transform:translateY(8px);
  animation:pill-in 0.3s ease forwards;
  font-size:0.72rem;
}
@keyframes pill-in{to{opacity:1;transform:translateY(0)}}

.pill-badge{
  font-size:0.55rem;
  padding:0.1rem 0.35rem;
  border-radius:2px;
  text-transform:uppercase;
  font-weight:700;
  flex-shrink:0;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
.pill-text{
  color:rgba(255,255,255,0.5);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* Claim type colors */
.type-constraint{border-left-color:#f59e0b}.badge-constraint{background:rgba(245,158,11,0.15);color:#f59e0b}
.type-factual{border-left-color:#3b82f6}.badge-factual{background:rgba(59,130,246,0.15);color:#3b82f6}
.type-risk{border-left-color:#ef4444}.badge-risk{background:rgba(239,68,68,0.15);color:#ef4444}
.type-recommendation{border-left-color:#22c55e}.badge-recommendation{background:rgba(34,197,94,0.15);color:#22c55e}
.type-estimate{border-left-color:#8b5cf6}.badge-estimate{background:rgba(139,92,246,0.15);color:#8b5cf6}

/* Cancel button */
.cancel-btn{
  margin-top:1.5rem;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.65rem;
  color:rgba(255,255,255,0.3);
  background:none;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  padding:0.5rem 1.2rem;
  cursor:pointer;
  transition:all 0.2s;
  min-height:36px;
}
.cancel-btn:hover{color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.2)}

/* Rate limit wait indicator */
.rate-wait{
  margin-top:0.8rem;
  font-size:0.6rem;
  color:rgba(255,255,255,0.2);
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  text-align:center;
}

/* Compiler pass lines */
.compiler-lines{
  margin-top:1rem;
  width:100%;
  max-width:400px;
}
.pass-line{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.7rem;
  color:rgba(255,255,255,0.5);
  padding:0.25rem 0;
  opacity:0;
  transform:translateX(-8px);
  transition:all 0.3s ease;
}
.pass-line.done{opacity:1;transform:translateX(0)}
.pass-line .check{color:#8df6ff;margin-right:0.4rem}
.pass-line .fail{color:#ef4444;margin-right:0.4rem}

/* === ANSWER STATE === */
#answerState{
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  min-height:100dvh;
  padding:2rem 1rem 4rem;
  opacity:0;
  transform:translateY(40px);
  transition:opacity 0.8s ease-out,transform 0.8s ease-out;
}
#answerState.active{opacity:1;transform:translateY(0)}

.answer-column{
  width:100%;
  max-width:680px;
}

/* Answer sections — staggered reveal */
.answer-section{
  opacity:0;
  transform:translateY(12px);
  transition:opacity 0.4s ease,transform 0.4s ease;
  margin-bottom:1.5rem;
}
.answer-section.visible{opacity:1;transform:translateY(0)}

/* Section 1: Claim bar + stats */
.claim-bar{
  height:8px;
  border-radius:4px;
  display:flex;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
}
.claim-bar-segment{transition:width 0.4s ease}
.stat-row{
  display:flex;
  gap:1.5rem;
  margin-top:0.6rem;
  flex-wrap:wrap;
}
.stat-item{display:flex;flex-direction:column;align-items:center}
.stat-value{font-size:1.5rem;font-weight:800;color:#fff}
.stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.3);font-family:'JetBrains Mono','SF Mono','Fira Code',monospace}

/* Section 2: Executive summary */
.exec-summary{
  font-size:0.95rem;
  line-height:1.7;
  color:rgba(255,255,255,0.8);
  padding:1rem 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

/* Section 3: Claims by type */
.claims-group{margin-bottom:1rem}
.claims-group-header{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.7rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:0.5rem;
  padding-bottom:0.3rem;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  gap:0.5rem;
}
.claim-card{
  padding:0.6rem 0.8rem;
  margin-bottom:0.4rem;
  border-radius:4px;
  border-left:3px solid transparent;
  background:rgba(255,255,255,0.02);
  font-size:0.78rem;
  line-height:1.5;
  display:flex;
  gap:0.6rem;
  align-items:baseline;
}
.claim-card-id{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.6rem;
  color:rgba(255,255,255,0.3);
  flex-shrink:0;
}
.claim-card-text{color:rgba(255,255,255,0.7)}
.claim-card-tier{
  font-size:0.5rem;
  padding:0.1rem 0.4rem;
  border-radius:2px;
  text-transform:uppercase;
  font-weight:700;
  flex-shrink:0;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
.tier-stated{background:rgba(100,116,139,0.2);color:#94a3b8}
.tier-web{background:rgba(59,130,246,0.2);color:#60a5fa}
.tier-documented{background:rgba(20,184,166,0.2);color:#2dd4bf}
.tier-tested{background:rgba(34,197,94,0.2);color:#4ade80}
.tier-production{background:rgba(16,185,129,0.2);color:#34d399}

/* Section 4: Conflicts */
.conflict-pair{
  display:flex;
  gap:0.8rem;
  margin-bottom:0.8rem;
  flex-wrap:wrap;
}
.conflict-card{
  flex:1;
  min-width:200px;
  padding:0.6rem 0.8rem;
  border-radius:4px;
  border:1px solid rgba(239,68,68,0.2);
  background:rgba(239,68,68,0.03);
  font-size:0.72rem;
  color:rgba(255,255,255,0.6);
}
.conflict-badge{
  display:inline-block;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.55rem;
  padding:0.15rem 0.5rem;
  border-radius:2px;
  background:rgba(239,68,68,0.15);
  color:#ef4444;
  font-weight:700;
  text-transform:uppercase;
  margin:0 0.4rem;
}
.no-conflicts{
  font-size:0.75rem;
  color:rgba(34,197,94,0.6);
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  padding:0.5rem 0;
}

/* Section 5: Verdict */
.verdict-label{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.85rem;
  font-weight:700;
  margin-bottom:0.5rem;
}
.verdict-high{color:#22c55e}
.verdict-moderate{color:#f59e0b}
.verdict-low{color:#ef4444}
.verdict-insufficient{color:#ef4444}
.evidence-bar{
  height:6px;
  border-radius:3px;
  display:flex;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  margin-bottom:0.4rem;
}
.evidence-bar-segment{transition:width 0.4s ease}
.evidence-legend{
  display:flex;
  gap:0.8rem;
  flex-wrap:wrap;
  font-size:0.55rem;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  color:rgba(255,255,255,0.3);
}
.evidence-legend-item{display:flex;align-items:center;gap:0.3rem}
.evidence-dot{width:6px;height:6px;border-radius:50%}
.verdict-text{
  font-size:0.75rem;
  color:rgba(255,255,255,0.5);
  margin-top:0.4rem;
}

/* Section 6: CTA */
.cta-section{
  text-align:center;
  padding:1.5rem 1rem;
  background:rgba(141,246,255,0.03);
  border:1px solid rgba(141,246,255,0.1);
  border-radius:8px;
}
.cta-code{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.75rem;
  color:#8df6ff;
  background:rgba(0,0,0,0.3);
  padding:0.5rem 1rem;
  border-radius:4px;
  display:inline-block;
  margin-bottom:0.8rem;
  cursor:pointer;
  border:1px solid rgba(141,246,255,0.15);
  transition:border-color 0.2s;
}
.cta-code:hover{border-color:rgba(141,246,255,0.4)}
.cta-text{
  font-size:0.7rem;
  color:rgba(255,255,255,0.3);
  margin-bottom:0.8rem;
}
.cta-btn{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.75rem;
  color:#0a0a0a;
  background:#8df6ff;
  border:none;
  border-radius:6px;
  padding:0.7rem 2rem;
  cursor:pointer;
  transition:all 0.2s;
  min-height:44px;
  font-weight:700;
}
.cta-btn:hover{background:#a0f8ff;box-shadow:0 0 20px rgba(141,246,255,0.2)}
.cta-restart{
  display:inline-block;
  margin-top:0.8rem;
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.6rem;
  color:rgba(255,255,255,0.25);
  background:none;
  border:none;
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:2px;
}
.cta-restart:hover{color:rgba(255,255,255,0.4)}

/* Section header */
.section-header{
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.65rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.25);
  margin-bottom:0.6rem;
}

/* === Mobile === */
@media(max-width:480px){
  .sprint-counter{font-size:2rem}
  .sprint-phase-label{font-size:0.9rem}
  .stat-row{gap:1rem;justify-content:center}
  .stat-value{font-size:1.2rem}
  .conflict-pair{flex-direction:column}
  .claim-card{flex-direction:column;gap:0.3rem}
  .answer-column{padding:0 0.5rem}
}

/* === Reduced motion === */
@media(prefers-reduced-motion:reduce){
  .lava-bg{animation:none!important}
  .claim-pill{animation:none!important;opacity:1;transform:none}
  .sprint-phase-label{animation:none!important;opacity:1}
  #answerState{transition:none!important}
  .answer-section{transition:none!important}
}

/* Copied toast */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;
  font-size:0.7rem;color:#8df6ff;
  background:rgba(0,0,0,0.9);border:1px solid rgba(141,246,255,0.3);
  padding:0.5rem 1rem;border-radius:4px;
  opacity:0;transition:opacity 0.3s;z-index:100;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="lava-bg" id="lavaBg"></div>
<div class="phase-tint" id="phaseTint"></div>

<!-- ARIA live regions -->
<div aria-live="polite" id="announcer" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap"></div>

<!-- STATE 1: INPUT -->
<div id="inputState" class="page-state active">
  <div class="input-container">
    <div class="input-logo">grainulator</div>
    <textarea
      id="questionInput"
      class="input-field"
      rows="2"
      placeholder="What complex question are you investigating?"
      autocomplete="off"
      spellcheck="false"
      maxlength="3000"
    ></textarea>
    <br>
    <button id="submitBtn" class="submit-btn" type="button">Run Sprint</button>
    <div class="input-hint">3 autonomous passes. Evidence-tracked. Confidence-graded.</div>
  </div>
</div>

<!-- STATE 2: SPRINT RUNNING -->
<div id="sprintState" class="page-state">
  <div class="sprint-question" id="sprintQuestion"></div>
  <div class="sprint-phase-label" id="phaseLabel">initializing...</div>
  <div class="sprint-counter" id="claimCounter">0</div>
  <div class="sprint-counter-label">claims discovered</div>
  <div class="claim-pills" id="claimPills"></div>
  <div class="rate-wait" id="rateWait"></div>
  <div class="compiler-lines" id="compilerLines" style="display:none"></div>
  <button id="cancelBtn" class="cancel-btn" type="button">cancel (compile partial)</button>
</div>

<!-- STATE 3: ANSWER -->
<div id="answerState" class="page-state">
  <div class="answer-column" id="answerColumn"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================================================================
// GRAINULATOR SPRINT MODE PROTOTYPE
// ===================================================================

// --- Escape helper ---
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// --- State management ---
const states={input:'inputState',sprint:'sprintState',answer:'answerState'};
function showState(name){
  Object.values(states).forEach(function(id){
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(states[name]).classList.add('active');
}

// --- TRACK_A fallback claims ---
const TRACK_A_QUESTION='How do we make our product accessible without delaying the launch?';
const TRACK_A_CLAIMS=[
  {id:'r001',type:'constraint',tier:'documented',text:'WCAG 2.1 AA compliance is required by ADA Title III for commercial websites — 4,605 accessibility lawsuits were filed in 2023 alone.'},
  {id:'r002',type:'factual',tier:'tested',text:'Overlay tools like AccessiBe and UserWay inject JavaScript widgets that claim to fix accessibility automatically, but WebAIM\'s analysis found they make sites LESS accessible by breaking screen reader navigation patterns.'},
  {id:'r003',type:'risk',tier:'documented',text:'Delaying accessibility to a \'phase 2\' creates compounding technical debt — retrofitting ARIA attributes into an existing component library costs 3-5x more than building them in from the start.'},
  {id:'r004',type:'recommendation',tier:'documented',text:'Use design tokens for color contrast ratios (4.5:1 for text, 3:1 for UI components) enforced at the component level, so accessibility is a design system property rather than a per-page audit.'},
  {id:'r005',type:'factual',tier:'stated',text:'Automated tools like axe-core catch approximately 30-40% of WCAG violations — the remaining 60-70% require manual testing with screen readers and keyboard navigation.'},
  {id:'x001',type:'risk',tier:'web',text:'Design token enforcement works only if the component library is the sole UI path — teams that bypass it with custom CSS will still ship inaccessible components.'},
  {id:'x002',type:'constraint',tier:'web',text:'Screen reader testing requires actual screen reader users or significant training time — automated tools miss interaction patterns, focus management, and live region behavior.'},
  {id:'x003',type:'risk',tier:'stated',text:'WCAG 2.1 AA is a minimum bar, not a quality bar — passing automated audits does not mean the product is usable by people with disabilities.'},
  {id:'s001',type:'recommendation',tier:'web',text:'Adopt a phased approach: Phase 1 (launch) addresses automated audit violations and keyboard navigation. Phase 2 (post-launch) adds screen reader optimization and user testing with disabled users. This balances speed with genuine accessibility.'},

// --- Claim type colors ---
const TYPE_COLORS={
  constraint:'#f59e0b',
  factual:'#3b82f6',
  risk:'#ef4444',
  recommendation:'#22c55e',
  estimate:'#8b5cf6'
};

// --- Evidence tier config ---
const TIER_COLORS={
  stated:'#94a3b8',
  web:'#60a5fa',
  documented:'#2dd4bf',
  tested:'#4ade80',
  production:'#34d399'
};
const TIER_WEIGHTS={stated:1,web:2,documented:3,tested:4,production:5};

// --- Dual-mode claim extraction ---
function extractClaims(text, passPrefix){
  var claims=[];
  var seen=new Set();
  var idCounter=1;

  // Strip stray label prefixes that leak into claim text
  function cleanText(t){
    return t.replace(/^(CONSTRAINT|FACTUAL|RISK|RECOMMENDATION|ESTIMATE)\s*/i,'').replace(/^Claim\s*\d+\s*/i,'').trim();
  }

  // Evidence tier inference from claim text
  function inferTier(content){
    if(/\d+(\.\d+)?%|\d{3,}|\bstudy|studies|survey|research\b|according to/i.test(content))return'documented';
    if(/\brisk|could|might|concern|may|unclear|uncertain|possible|potential\b/i.test(content))return'stated';
    return'web';
  }

  // Mode 1: Bracket labels — handles all variants:
  //   [TYPE] text, **[TYPE]** text, [TYPE]: text, **[TYPE]**: text
  //   1. [TYPE] text, - [TYPE] text, * [TYPE] text
  var bracketRe=/(?:^|\n)\s*(?:[-*]|\d+\.)?\s*(?:\*{1,2})?\[(CONSTRAINT|FACTUAL|RISK|RECOMMENDATION|ESTIMATE)\](?:\*{1,2})?[:\s]*([^\[]+)/gi;
  // Also match mid-line bracket labels (original simpler pattern)
  var bracketReInline=/(?:\*{1,2})?\[(CONSTRAINT|FACTUAL|RISK|RECOMMENDATION|ESTIMATE)\](?:\*{1,2})?[:\s]*([^\[]+)/gi;
  var m;
  var used=new Set();
  // First pass: line-anchored (list items, bold-wrapped)
  while((m=bracketRe.exec(text))!==null){
    var type=m[1].toLowerCase();
    var content=cleanText(m[2].trim().replace(/\n+/g,' ').replace(/\s+/g,' '));
    var key=content.substring(0,80).toLowerCase();
    if(content.length>20&&!seen.has(key)){
      seen.add(key);
      used.add(m.index);
      claims.push({id:passPrefix+String(idCounter++).padStart(2,'0'),type:type,tier:inferTier(content),text:content});
    }
  }
  // Second pass: inline matches not already captured
  while((m=bracketReInline.exec(text))!==null){
    var type=m[1].toLowerCase();
    var content=cleanText(m[2].trim().replace(/\n+/g,' ').replace(/\s+/g,' '));
    var key=content.substring(0,80).toLowerCase();
    if(content.length>20&&!seen.has(key)){
      seen.add(key);
      claims.push({id:passPrefix+String(idCounter++).padStart(2,'0'),type:type,tier:inferTier(content),text:content});
    }
  }

  // Mode 2: Keyword heuristic fallback (if bracket mode found <3 claims)
  if(claims.length<3){
    var sentences=text.split(/[.!?]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>25;});
    sentences.forEach(function(s){
      if(claims.length>=8)return;
      var type=null;
      if(/\brisk|danger|fail|vulnerab|threat|downside|concern|careful/i.test(s))type='risk';
      else if(/\bshould|recommend|suggest|consider|best practice|advise|opt for/i.test(s))type='recommendation';
      else if(/\brequir|must|need to|constraint|cannot|limitation|restrict/i.test(s))type='constraint';
      else if(/\bestimate|approx|typically|around \d|usually takes|\d+[-–]\d+\s*(week|month|day|hour)/i.test(s))type='estimate';
      else if(s.length>35)type='factual';

      if(type){
        var key=s.substring(0,80).toLowerCase();
        if(!seen.has(key)){
          seen.add(key);
          claims.push({id:passPrefix+String(idCounter++).padStart(2,'0'),type:type,tier:inferTier(s),text:s+'.'});
        }
      }
    });
  }

  return claims.slice(0,8);
}

// --- 7-pass compiler (ported from site/index.html) ---
const COMPILER_PASSES=[
  {name:'parse claims',fn:function(claims){return{parsed:claims.length,ok:true};}},
  {name:'type distribution',fn:function(claims){
    var types={};
    claims.forEach(function(c){types[c.type]=(types[c.type]||0)+1;});
    var total=claims.length;
    var entries=Object.entries(types).sort(function(a,b){return b[1]-a[1];});
    var dominant=entries[0];
    var monoculture=dominant&&(dominant[1]/total)>0.6;
    return{types:types,monoculture:monoculture,monocultureType:monoculture?dominant[0]:null,ok:true};
  }},
  {name:'evidence strength',fn:function(claims){
    var avg=claims.reduce(function(s,c){return s+(TIER_WEIGHTS[c.tier]||1);},0)/claims.length;
    return{avgStrength:avg.toFixed(1),weak:avg<2.5,ok:true};
  }},
  {name:'tension detection',fn:function(claims){
    var tensions=[];
    for(var i=0;i<claims.length;i++){
      for(var j=i+1;j<claims.length;j++){
        var a=claims[i],b=claims[j];
        var opposing=(a.type==='risk'&&b.type==='recommendation')||(a.type==='recommendation'&&b.type==='risk')||(a.type==='constraint'&&b.type==='estimate');
        if(opposing){
          var wordsA=new Set(a.text.toLowerCase().split(/\W+/).filter(function(w){return w.length>4;}));
          var wordsB=new Set(b.text.toLowerCase().split(/\W+/).filter(function(w){return w.length>4;}));
          var overlap=Array.from(wordsA).filter(function(w){return wordsB.has(w);});
          if(overlap.length>=2){
            tensions.push({pair:[a.id,b.id],a:a,b:b,overlap:overlap.slice(0,3)});
          }
        }
      }
    }
    return{tensions:tensions,count:tensions.length,ok:true};
  }},
  {name:'coverage check',fn:function(claims){
    var required=['constraint','factual','risk','recommendation'];
    var present=new Set(claims.map(function(c){return c.type;}));
    var missing=required.filter(function(t){return!present.has(t);});
    return{missing:missing,complete:missing.length===0,ok:true};
  }},
  {name:'confidence score',fn:function(claims,prev){
    var score=70;
    if(prev[1].monoculture)score-=15;
    if(prev[2].weak)score-=10;
    if(prev[3].count>0)score-=5*Math.min(prev[3].count,3);
    if(!prev[4].complete)score-=10;
    score+=Math.min(claims.length,15)*1.5;
    score=Math.max(10,Math.min(100,Math.round(score)));
    return{score:score,ok:score>=40};
  }},
  {name:'generate verdict',fn:function(claims,prev){
    var score=prev[5].score;
    var verdict;
    if(score>=80)verdict='High confidence. Research is well-balanced with strong evidence.';
    else if(score>=60)verdict='Moderate confidence. Some gaps remain — consider additional research passes.';
    else if(score>=40)verdict='Low confidence. Significant gaps or tensions detected. More evidence needed.';
    else verdict='Insufficient. Claims lack diversity or evidence strength for a reliable brief.';
    return{verdict:verdict,score:score,tensions:prev[3].tensions,missing:prev[4].missing,types:prev[1].types,ok:true};
  }}
];

function runCompiler(claims){
  var results=[];
  for(var i=0;i<COMPILER_PASSES.length;i++){
    results.push(COMPILER_PASSES[i].fn(claims,results));
  }
  return results;
}

// --- Pollinations API ---
// POST on production (no URL length limits), GET on localhost (POST gets deprecation notices)
async function streamPass(systemPrompt,userMessage,abortSignal){
  var isLocalhost=location.hostname==='localhost'||location.hostname==='127.0.0.1';
  var response;

  if(!isLocalhost){
    // Production: use POST — handles any context length
    response=await fetch('https://text.pollinations.ai/openai',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'openai',
        messages:[
          {role:'system',content:systemPrompt},
          {role:'user',content:userMessage}
        ],
        stream:false
      }),
      cache:'no-store',
      signal:AbortSignal.any?AbortSignal.any([abortSignal,AbortSignal.timeout(25000)]):abortSignal
    });
  }else{
    // Localhost: use GET (POST returns deprecation notices for localhost Origin)
    var url='https://text.pollinations.ai/'+encodeURIComponent(userMessage.substring(0,2000))+'?model=openai&system='+encodeURIComponent(systemPrompt.substring(0,1500))+'&nostream=true&_t='+Date.now();
    response=await fetch(url,{
      cache:'no-store',
      signal:AbortSignal.any?AbortSignal.any([abortSignal,AbortSignal.timeout(25000)]):abortSignal
    });
  }

  if(response.status===429){
    throw new Error('RATE_LIMITED');
  }
  if(!response.ok){
    throw new Error('API_ERROR_'+response.status);
  }

  var fullText;
  if(!isLocalhost){
    var json=await response.json();
    fullText=(json.choices&&json.choices[0]&&json.choices[0].message&&json.choices[0].message.content)||'';
  }else{
    fullText=(await response.text()).trim();
  }

  // Guard: deprecation notices
  if(/IMPORTANT NOTICE|API is being deprecated|migrate to our new service/i.test(fullText)){
    throw new Error('API_DEPRECATION_NOTICE');
  }
  return fullText;
}

function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}

// --- Choreographed wait (animate claims during rate limit) ---
async function choreographedWait(ms,claims,abortSignal){
  var start=Date.now();
  var remaining=Math.ceil(ms/1000);
  showRateWait('rate limit cooldown: '+remaining+'s');

  while(Date.now()-start<ms){
    if(abortSignal&&abortSignal.aborted)return;
    remaining=Math.ceil((ms-(Date.now()-start))/1000);
    showRateWait(remaining>0?'next pass in '+remaining+'s':'starting...');
    await delay(1000);
  }
  showRateWait('');
}

// --- Compiler animation ---
async function animateCompiler(claims){
  setPhase('compiling brief...','compile');
  var container=document.getElementById('compilerLines');
  container.style.display='block';
  container.innerHTML='';

  var results=[];
  for(var i=0;i<COMPILER_PASSES.length;i++){
    var pass=COMPILER_PASSES[i];
    await delay(150);
    var result=pass.fn(claims,results);
    results.push(result);

    var line=document.createElement('div');
    line.className='pass-line';
    var icon=result.ok?'<span class="check">&#10003;</span>':'<span class="fail">&#10007;</span>';
    line.innerHTML=icon+'pass '+(i+1)+'/7: '+pass.name;
    container.appendChild(line);
    requestAnimationFrame(function(){
      // closure over line
      var l=container.lastElementChild;
      if(l)l.classList.add('done');
    });
  }
  await delay(400);
  return results;
}

// --- Build executive summary from claims ---
function buildSummary(claims,compilerResults){
  var recs=claims.filter(function(c){return c.type==='recommendation';});
  var risks=claims.filter(function(c){return c.type==='risk';});
  var facts=claims.filter(function(c){return c.type==='factual';});

  var parts=[];
  if(recs.length>0){
    parts.push(recs[0].text);
  }
  if(facts.length>0&&parts.length<2){
    parts.push(facts[0].text);
  }
  if(risks.length>0){
    parts.push('Key risk: '+risks[0].text.charAt(0).toLowerCase()+risks[0].text.slice(1));
  }

  return parts.slice(0,3).join(' ');
}

var _abortController=null;

async function runSprint(question){
  var isOffline=window.location.search.indexOf('offline')!==-1;
  var startTime=Date.now();
  var allClaims=[];
  var passCount=0;
  _abortController=new AbortController();
  var signal=_abortController.signal;

  // Show sprint state
  document.getElementById('sprintQuestion').textContent=question;
  showState('sprint');
  document.getElementById('lavaBg').style.opacity='1';

  try{
    if(isOffline){
      // === OFFLINE MODE: use TRACK_A claims ===
      setPhase('researching...','research');
      for(var i=0;i<5;i++){
        if(signal.aborted)throw new Error('CANCELLED');
        await delay(400+Math.random()*300);
        allClaims.push(TRACK_A_CLAIMS[i]);
        addClaimPill(TRACK_A_CLAIMS[i]);
        updateCounter(allClaims.length);
      }
      passCount=1;

      await delay(800);
      setPhase('challenging assumptions...','challenge');
      for(var j=5;j<8;j++){
        if(signal.aborted)throw new Error('CANCELLED');
        await delay(500+Math.random()*300);
        allClaims.push(TRACK_A_CLAIMS[j]);
        addClaimPill(TRACK_A_CLAIMS[j]);
        updateCounter(allClaims.length);
      }
      passCount=2;

      await delay(800);
      setPhase('synthesizing...','synthesis');
      for(var k=8;k<TRACK_A_CLAIMS.length;k++){
        if(signal.aborted)throw new Error('CANCELLED');
        await delay(400+Math.random()*300);
        allClaims.push(TRACK_A_CLAIMS[k]);
        addClaimPill(TRACK_A_CLAIMS[k]);
        updateCounter(allClaims.length);
      }
      passCount=3;

    }else{
      // === ONLINE MODE: Pollinations API ===

      // Pass 1: Research
      setPhase('researching...','research');
      try{
        var p1Text=await streamPassWithRetry(PASS1_SYSTEM,question,signal);
        var p1Claims=extractClaims(p1Text,'r');
        passCount=1;
        // Stagger claim reveals
        for(var ci=0;ci<p1Claims.length;ci++){
          if(signal.aborted)throw new Error('CANCELLED');
          allClaims.push(p1Claims[ci]);
          addClaimPill(p1Claims[ci]);
          updateCounter(allClaims.length);
          await delay(200+Math.random()*200);
        }

        // Minimum claims gate: if <3, degrade to Level 1
        if(p1Claims.length<3){
          setPhase('compiling with limited evidence...','compile');
        }else{
          // Rate limit wait before Pass 2
          if(!signal.aborted){
            await choreographedWait(16000,allClaims,signal);
          }

          // Pass 2: Challenge
          if(!signal.aborted){
            setPhase('challenging assumptions...','challenge');
            try{
              var p2Context='Research findings to challenge:\n'+formatClaimsForContext(allClaims)+'\n\nOriginal question: '+question;
              var p2Text=await streamPassWithRetry(PASS2_SYSTEM,p2Context,signal);
              var p2Claims=extractClaims(p2Text,'x');
              passCount=2;
              for(var cj=0;cj<p2Claims.length;cj++){
                if(signal.aborted)throw new Error('CANCELLED');
                allClaims.push(p2Claims[cj]);
                addClaimPill(p2Claims[cj]);
                updateCounter(allClaims.length);
                await delay(200+Math.random()*200);
              }
            }catch(e){
              if(e.message==='CANCELLED')throw e;
              // Challenge pass failed — degrade to Level 2
              console.warn('Pass 2 failed, degrading:',e.message);
            }

            // Rate limit wait before Pass 3
            if(!signal.aborted){
              await choreographedWait(16000,allClaims,signal);
            }

            // Pass 3: Synthesis
            if(!signal.aborted){
              setPhase('synthesizing...','synthesis');
              try{
                var p3Context='All findings and challenges:\n'+formatClaimsForContext(allClaims)+'\n\nOriginal question: '+question;
                var p3Text=await streamPassWithRetry(PASS3_SYSTEM,p3Context,signal);
                var p3Claims=extractClaims(p3Text,'s');
                passCount=3;
                for(var ck=0;ck<p3Claims.length;ck++){
                  if(signal.aborted)throw new Error('CANCELLED');
                  allClaims.push(p3Claims[ck]);
                  addClaimPill(p3Claims[ck]);
                  updateCounter(allClaims.length);
                  await delay(200+Math.random()*200);
                }
              }catch(e){
                if(e.message==='CANCELLED')throw e;
                // Synthesis pass failed — proceed with what we have
                console.warn('Pass 3 failed, compiling partial:',e.message);
              }
            }
          }
        }
      }catch(e){
        if(e.message==='CANCELLED')throw e;
        // Pass 1 completely failed — fall back to TRACK_A
        console.warn('All passes failed, using TRACK_A fallback:',e.message);
        allClaims=TRACK_A_CLAIMS.slice();
        passCount=0;
        allClaims.forEach(function(c){
          addClaimPill(c);
        });
        updateCounter(allClaims.length);
      }
    }

    // --- Auto-compile ---
    if(signal.aborted)throw new Error('CANCELLED');
    if(allClaims.length===0){
      allClaims=TRACK_A_CLAIMS.slice();
      passCount=0;
      allClaims.forEach(function(c){addClaimPill(c);});
      updateCounter(allClaims.length);
    }

    var compilerResults=await animateCompiler(allClaims);
    var elapsed=Date.now()-startTime;
    await delay(300);

    renderAnswer(allClaims,compilerResults,elapsed,passCount||1,question);

  }catch(e){
    if(e.message==='CANCELLED'){
      // Compile whatever we have
      if(allClaims.length>0){
        var compilerResults2=await animateCompiler(allClaims);
        var elapsed2=Date.now()-startTime;
        await delay(300);
        renderAnswer(allClaims,compilerResults2,elapsed2,passCount||1,question);
      }else{
        resetToInput();
      }
    }else{
      console.error('Sprint error:',e);
      // Fallback
      allClaims=TRACK_A_CLAIMS.slice();
      allClaims.forEach(function(c){addClaimPill(c);});
      updateCounter(allClaims.length);
      var compilerResults3=await animateCompiler(allClaims);
      renderAnswer(allClaims,compilerResults3,Date.now()-startTime,0,question);
    }
  }
}

// Retry wrapper for rate limits
async function streamPassWithRetry(systemPrompt,userMessage,signal,retries){
  retries=retries||0;
  try{
    return await streamPass(systemPrompt,userMessage,signal);
  }catch(e){
    if(e.message==='RATE_LIMITED'&&retries<2){
      showRateWait('rate limited, retrying in '+(3+retries*3)+'s...');
      await delay((3+retries*3)*1000);
      showRateWait('');
      return streamPassWithRetry(systemPrompt,userMessage,signal,retries+1);
    }
    throw e;
  }
}

// --- Event wiring ---
document.getElementById('submitBtn').addEventListener('click',function(){
  var q=document.getElementById('questionInput').value.trim();
  if(!q)return;
  runSprint(q);
});

document.getElementById('questionInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    document.getElementById('submitBtn').click();
  }
});

document.getElementById('cancelBtn').addEventListener('click',function(){
  if(_abortController)_abortController.abort();
});

// Auto-resize textarea
document.getElementById('questionInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
});

// --- ?offline auto-start ---
var _isOfflineMode=window.location.search.indexOf('offline')!==-1;
if(_isOfflineMode){
  var qi=document.getElementById('questionInput');
  qi.value=TRACK_A_QUESTION;
  // Auto-submit after a short delay so the user sees the question first
  setTimeout(function(){ runSprint(TRACK_A_QUESTION); },600);
}

// Focus input on load
window.addEventListener('load',function(){
  if(!_isOfflineMode) document.getElementById('questionInput').focus();
});
</script>
</body>
</html>
