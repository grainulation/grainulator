  <!-- title -->
  <text x="600" y="490" text-anchor="middle" font-family="Inter,'Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="700" letter-spacing="3" fill="#8df6ff" opacity="0.7" filter="url(#tg)">grainulator</text>
  <text x="600" y="530" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="18" fill="#8df6ff" opacity="0.35">/plugin install grainulator</text>
