    <filter id="tg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="none" stroke="#1a1a1f" stroke-width="2"/>
  <!-- ambient -->
  <ellipse cx="380" cy="240" rx="200" ry="180" fill="#fbbf24" opacity="0.02" filter="url(#sg)"/>
  <ellipse cx="760" cy="340" rx="180" ry="150" fill="#f43f5e" opacity="0.02" filter="url(#sg)"/>
  <!-- wheat -->
  <ellipse cx="320" cy="200" rx="85" ry="105" fill="#1a1505" transform="rotate(-8 320 200)"/>
