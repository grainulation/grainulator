<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>.bg{fill:#050505}@media(prefers-color-scheme:light){.bg{fill:#111}}</style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <!-- wheat (amber) -->
  <ellipse cx="20" cy="18" rx="9" ry="11" fill="#1a1505" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)" transform="rotate(-10 20 18)"/>
  <!-- barn (rose) -->
  <ellipse cx="44" cy="36" rx="8" ry="10" fill="#1a0508" stroke="#f43f5e" stroke-width="1.5" filter="url(#glow)" transform="rotate(8 44 36)"/>
  <!-- mill (blue) -->
  <circle cx="40" cy="16" r="5" fill="#050a1a" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
  <!-- farmer (green) -->
  <circle cx="18" cy="44" r="6" fill="#051a0a" stroke="#22c55e" stroke-width="1.2" filter="url(#glow)"/>
  <!-- orchard (cyan, tiny) -->
  <circle cx="34" cy="48" r="4" fill="#051515" stroke="#22d3ee" stroke-width="1" filter="url(#glow)"/>
</svg>
