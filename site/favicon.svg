<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #050505; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #111; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="64" height="64" rx="14"/>

  <!-- Neon blobs — matching the landing page multi-color aesthetic -->
  <!-- Cyan blob -->
  <ellipse cx="22" cy="20" rx="10" ry="12" fill="#0a2a2b" stroke="#8df6ff" stroke-width="1.5" filter="url(#glow)" transform="rotate(-12 22 20)"/>
  <!-- Magenta blob -->
  <ellipse cx="42" cy="38" rx="8" ry="10" fill="#2a0a20" stroke="#ff33cc" stroke-width="1.5" filter="url(#glow)" transform="rotate(8 42 38)"/>
  <!-- Blue blob (small) -->
  <circle cx="38" cy="18" r="5" fill="#0a0a2a" stroke="#4d80ff" stroke-width="1.2" filter="url(#glow)"/>
  <!-- Green blob (small) -->
  <circle cx="20" cy="44" r="6" fill="#0a1a0a" stroke="#33ff66" stroke-width="1.2" filter="url(#glow)"/>
</svg>
