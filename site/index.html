// ===================================================================
// IN-BROWSER COMPILER — 7-pass pipeline
// ===================================================================
const COMPILER_PASSES = [
  { name: 'parse claims', fn: (claims) => ({ parsed: claims.length, ok: true }) },
  { name: 'type distribution', fn: (claims) => {
    const types = {};
    claims.forEach(c => types[c.type] = (types[c.type] || 0) + 1);
    const total = claims.length;
    const dominant = Object.entries(types).sort((a,b) => b[1]-a[1])[0];
    const monoculture = dominant && (dominant[1] / total) > 0.6;
    return { types, monoculture, monocultureType: monoculture ? dominant[0] : null, ok: true };
  }},
  { name: 'evidence strength', fn: (claims) => {
    const tierWeight = { stated: 1, web: 2, documented: 3, tested: 4, production: 5 };
    const avg = claims.reduce((s,c) => s + (tierWeight[c.tier]||1), 0) / claims.length;
    return { avgStrength: avg.toFixed(1), weak: avg < 2.5, ok: true };
  }},
  { name: 'tension detection', fn: (claims) => {
    // Generalized: find claims with opposing sentiment about similar topics
    const tensions = [];
    for (let i = 0; i < claims.length; i++) {
      for (let j = i+1; j < claims.length; j++) {
        const a = claims[i], b = claims[j];
        // Heuristic: risk vs recommendation, or constraint vs estimate on overlapping words
        const opposing = (a.type === 'risk' && b.type === 'recommendation') ||
                         (a.type === 'recommendation' && b.type === 'risk') ||
                         (a.type === 'constraint' && b.type === 'estimate');
        if (opposing) {
          const wordsA = new Set(a.text.toLowerCase().split(/\W+/).filter(w => w.length > 4));
          const wordsB = new Set(b.text.toLowerCase().split(/\W+/).filter(w => w.length > 4));
          const overlap = [...wordsA].filter(w => wordsB.has(w));
          if (overlap.length >= 2) {
            tensions.push({ pair: [a.id, b.id], overlap: overlap.slice(0, 3) });
          }
        }
      }
    }
    return { tensions, count: tensions.length, ok: true };
  }},
  { name: 'coverage check', fn: (claims) => {
    const requiredTypes = ['constraint', 'factual', 'risk', 'recommendation'];
    const present = new Set(claims.map(c => c.type));
    const missing = requiredTypes.filter(t => !present.has(t));
    return { missing, complete: missing.length === 0, ok: true };
  }},
  { name: 'confidence score', fn: (claims, prev) => {
    let score = 70;
    if (prev[1].monoculture) score -= 15;
    if (prev[2].weak) score -= 10;
    if (prev[3].count > 0) score -= 5 * prev[3].count;
    if (!prev[4].complete) score -= 10;
    score = Math.max(10, Math.min(100, score));
    return { score, ok: score >= 40 };
  }},
  { name: 'generate verdict', fn: (claims, prev) => {
    const score = prev[5].score;
    let verdict;
    if (score >= 80) verdict = 'High confidence. Research is well-balanced with strong evidence.';
    else if (score >= 60) verdict = 'Moderate confidence. Some gaps remain — consider additional research passes.';
    else if (score >= 40) verdict = 'Low confidence. Significant gaps or tensions detected. More evidence needed.';
    else verdict = 'Insufficient. Claims lack diversity or evidence strength for a reliable brief.';
    return { verdict, score, tensions: prev[3].tensions, missing: prev[4].missing, ok: true };
  }}
];

// ===================================================================
// Rx8: FOLLOW-UP CHIP GENERATION
// ===================================================================
function generateFollowUpChips(compilerResults) {
  const chips = [];
  // compilerResults: [parse, typeDistribution, evidenceStrength, tensions, coverage, confidence, verdict]
  const typeDist = compilerResults[1];
  const evidenceStr = compilerResults[2];
  const tensions = compilerResults[3];
  const coverage = compilerResults[4];

  // Missing claim types
  if (coverage.missing && coverage.missing.length > 0) {
    if (coverage.missing.indexOf('risk') !== -1) {
      chips.push('Find risks');
    }
    if (coverage.missing.indexOf('constraint') !== -1) {
      chips.push('Add constraints');
    }
    if (coverage.missing.indexOf('recommendation') !== -1) {
      chips.push('What should we recommend?');
    }
    if (coverage.missing.indexOf('factual') !== -1) {
      chips.push('Add factual evidence');
    }
  }

  // Type monoculture
  if (typeDist.monoculture) {
    chips.push('Diversify claim types');
  }

  // Tensions detected
  if (tensions.tensions && tensions.tensions.length > 0) {
    const t = tensions.tensions[0];
    chips.push('Resolve tension between ' + t.pair[0] + ' and ' + t.pair[1]);
  }

  // Low evidence strength
  if (evidenceStr.weak) {
    chips.push('Strengthen evidence');
  }

  // Limit to 3 chips max
  return chips.slice(0, 3);
}

  } else if (chip.includes('diversify')) {
    claims.push({ id: 'd' + String(idx).padStart(3, '0'), type: 'factual', tier: 'web', text: 'Industry surveys show that balanced research across constraints, risks, and recommendations produces more actionable decisions.' });
    claims.push({ id: 'd' + String(idx + 1).padStart(3, '0'), type: 'estimate', tier: 'stated', text: 'Diversifying the claim set for ' + keywords + ' would require 2-3 additional research passes covering underrepresented perspectives.' });
  } else if (chip.includes('evidence')) {
    claims.push({ id: 'd' + String(idx).padStart(3, '0'), type: 'factual', tier: 'documented', text: 'Strengthening evidence for ' + keywords + ' requires moving from stated/web sources to tested benchmarks or production measurements.' });
    claims.push({ id: 'd' + String(idx + 1).padStart(3, '0'), type: 'recommendation', tier: 'documented', text: 'Run a proof-of-concept for ' + keywords + ' to upgrade key claims from web-tier to tested-tier evidence.' });
  } else if (chip.includes('tension') || chip.includes('resolve')) {
    claims.push({ id: 'd' + String(idx).padStart(3, '0'), type: 'recommendation', tier: 'stated', text: 'The tension in ' + keywords + ' may be resolved by scoping the decision to a specific team or use case rather than applying it org-wide.' });
  } else {
    claims.push({ id: 'd' + String(idx).padStart(3, '0'), type: 'factual', tier: 'web', text: 'Further research on ' + keywords + ' could uncover additional perspectives not captured in the current claim set.' });
  }

  window._nextClaimIndex = (window._nextClaimIndex || 6) + claims.length;
  return claims;
}

async function runCompile() {
  window._trackEvent?.('compile_run');

  // Disable the compile button
  var compileMsgBtn = document.getElementById('compileMsgBtn');
  if (compileMsgBtn) compileMsgBtn.disabled = true;

  // Add thinking indicator
  addThinking();

  const claims = currentClaims();
  const results = [];

  // Create a pass-lines container in an AI message
  removeThinking();
  var compileContainer = document.createElement('div');
  var passLinesDiv = document.createElement('div');
  compileContainer.appendChild(passLinesDiv);
  var compileMsg = addMessage('ai', compileContainer);

  for (let i = 0; i < COMPILER_PASSES.length; i++) {
    const pass = COMPILER_PASSES[i];
    await delay(280 + Math.random() * 200);

    const result = pass.fn(claims, results);
    results.push(result);

    const line = document.createElement('div');
    line.className = 'pass-line';
    const icon = result.ok ? '<span class="check">&#10003;</span>' : '<span class="fail">&#10007;</span>';
    line.innerHTML = icon + 'pass ' + (i+1) + '/7: ' + pass.name;
    passLinesDiv.appendChild(line);
    requestAnimationFrame(function() { line.classList.add('done'); });
    announceCompilerPass('Pass ' + (i+1) + ' of 7: ' + pass.name + ' — ' + (result.ok ? 'passed' : 'issue detected'));
    autoScroll();
  }

  await delay(300);

  // Render verdict
  const final = results[6];
  var verdictDiv = document.createElement('div');
  verdictDiv.style.marginTop = '0.8rem';

  const vTitle = document.createElement('div');
  vTitle.className = 'verdict-title';
  vTitle.textContent = 'compilation complete \u2014 confidence: ' + final.score + '/100';
  verdictDiv.appendChild(vTitle);

  const vBody = document.createElement('div');
  vBody.className = 'verdict-body';
  vBody.textContent = final.verdict;

  if (final.tensions.length > 0) {
    vBody.appendChild(document.createElement('br'));
    vBody.appendChild(document.createElement('br'));
    const tensionLabel = document.createElement('span');
    tensionLabel.className = 'conflict-flag';
    tensionLabel.textContent = 'Tensions detected:';
    vBody.appendChild(tensionLabel);
    final.tensions.forEach(function(t) {
      vBody.appendChild(document.createElement('br'));
      vBody.appendChild(document.createTextNode('\u00A0\u00A0' + t.pair[0] + ' vs ' + t.pair[1] + ' (shared: ' + t.overlap.join(', ') + ')'));
    });
  }
  if (final.missing.length > 0) {
    vBody.appendChild(document.createElement('br'));
    vBody.appendChild(document.createElement('br'));
    vBody.appendChild(document.createTextNode('Missing claim types: ' + final.missing.join(', ')));
  }
  verdictDiv.appendChild(vBody);
  compileContainer.appendChild(verdictDiv);

  // Handoff UI
  const question = chatInput.value.trim() || TRACK_A_QUESTION;
  const claimCount = claims.length;
  const topicSet = new Set();
  claims.forEach(function(c) { (c.text || '').split(/\s+/).slice(0, 3).forEach(function(w) { if (w.length > 4) topicSet.add(w.toLowerCase()); }); });
  const topicCount = Math.max(1, Math.min(topicSet.size, claimCount));

  const shortPrompt = 'I explored a research question in the grainulator.app demo and want to continue with the full wheat plugin.\n\nQuestion: ' + question + '\nKey findings: ' + final.verdict + '\nClaims so far: ' + claimCount + ' claims across ' + topicCount + ' topics\nConfidence: ' + final.score + '/100\n\nPlease install the wheat plugin (/plugin install grainulator) and continue this research sprint.';
  const claimSummaries = claims.slice(0, 10).map(function(c) { return '- [' + c.type + '] ' + c.text; }).join('\n');
  const longPrompt = 'I explored a research question in the grainulator.app demo and want to continue with the full wheat plugin.\n\nQuestion: ' + question + '\nKey findings: ' + final.verdict + '\nClaims so far: ' + claimCount + ' claims across ' + topicCount + ' topics\nConfidence: ' + final.score + '/100\n\nClaim summaries:\n' + claimSummaries + '\n\nPlease install the wheat plugin (/plugin install grainulator) and continue this research sprint.';

  const handoff = document.createElement('div');
  handoff.className = 'handoff-section';
  const hasShare = typeof navigator.share === 'function';
  handoff.innerHTML = '<button class="handoff-primary" id="handoff-deeplink" type="button">Open in Claude Code</button>' +
    (hasShare ? '<button class="handoff-secondary" id="handoff-share" type="button">Share</button>' : '') +
    '<button class="handoff-secondary" id="handoff-clipboard" type="button">Copy to clipboard</button>';
  compileContainer.appendChild(handoff);

  document.getElementById('handoff-deeplink').addEventListener('click', function() {
    window._trackEvent?.('handoff_click', { type: 'deeplink' });
    try {
      window.location.href = 'claude-cli://open?q=' + encodeURIComponent(shortPrompt.substring(0, 1300));
      setTimeout(function() { showToast('Install Claude Code first \u2014 claude.ai/download'); }, 1500);
    } catch(e) {
      showToast('Install Claude Code first \u2014 claude.ai/download');
    }
  });

  var shareBtn = document.getElementById('handoff-share');
  if (shareBtn) {
    shareBtn.addEventListener('click', function() {
      window._trackEvent?.('handoff_click', { type: 'share' });
      navigator.share({ title: 'Grainulator Sprint', text: shortPrompt, url: location.origin + '/#q=' + encodeURIComponent(question) })
        .then(function() { showToast('shared.'); })
        .catch(function(err) { if (err.name !== 'AbortError') showToast('share failed'); });
    });
  }

  document.getElementById('handoff-clipboard').addEventListener('click', function() {
    window._trackEvent?.('handoff_click', { type: 'clipboard' });
    // iOS Safari fallback: textarea + execCommand
    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      document.execCommand('copy');
      ta.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(longPrompt).then(function() { showToast('copied.'); }).catch(function() { fallbackCopy(longPrompt); showToast('copied.'); });
    } else {
      fallbackCopy(longPrompt);
      showToast('copied.');
    }
  });

  announceState('Compilation complete. Confidence score: ' + final.score + ' out of 100.');

  // Save compilation result
  window._compilationResult = { score: final.score, verdict: final.verdict, tensions: final.tensions, missing: final.missing };
  saveSession();

  // Next steps use the conversational chip system
  generateNextStepChips(compileMsg);

  autoScroll();
  chatInput.focus();
}

function currentClaims() {

  if (window._allClaims && window._allClaims.length > 0) return window._allClaims;
  return window._liveClaims || TRACK_A_CLAIMS;
}

// Detect which models are cached
window._cachedModels = {};
(async function checkCachedModels() {
  if (!window.caches) return;
  try {

    var keys = await cache.keys();
    var urls = keys.map(function(k) { return k.url; });
    MODELS.forEach(function(m) {
      // WebLLM cache keys contain the model ID
      var found = urls.some(function(u) { return u.indexOf(m.id) !== -1; });
      if (found) window._cachedModels[m.id] = true;
    });

async function detectTier() {
  if (!navigator.gpu) return 'minimal';
  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) return 'minimal';
    const maxBuf = adapter.limits?.maxBufferSize || Infinity;
    if (maxBuf < 256 * 1024 * 1024) return 'reduced-gpu';
    return 'full';
  } catch { return 'minimal'; }
}

async function loadModel(modelId) {
  // Skip if already loading this model
  if (window._modelLoading && window._activeModelId === modelId) return;
  // Abort previous load if in progress
  if (window._modelAbort) { window._modelAbort.abort(); }
  // Wait a tick for previous abort to settle
  await new Promise(function(r) { setTimeout(r, 50); });
  window._modelAbort = new AbortController();
  window._modelReady = false;
  window._modelEngine = null;
  window._modelTokenizer = null;
  window._activeModelId = modelId;

  // Show input bar (disabled — picker accessible, textarea locked)
  var inputBarEl = document.getElementById('inputBar');
  inputBarEl.classList.add('visible');
  chatInput.disabled = true;
  chatInput.placeholder = 'loading...';

  // Update picker label
  var m = MODELS.find(function(x) { return x.id === modelId; });
  modelPickerLabel.textContent = m ? m.label.split(' ').pop() : '···';
  modelPicker.classList.add('loading');
  renderModelMenu();

  // Model picker doubles as cancel button while loading (tap to cancel)
  window._modelLoading = true;

  try {
    var { CreateMLCEngine } = await import('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/+esm');
    if (window._modelAbort.signal.aborted) throw new Error('Cancelled');

    var engine = await CreateMLCEngine(modelId, {
      initProgressCallback: function(report) {
        if (window._modelAbort.signal.aborted) throw new Error('Cancelled');
        var pct = Math.round((report.progress || 0) * 100);
        var fill = document.getElementById('topProgressFill');
        if (fill) fill.style.width = pct + '%';
        chatInput.placeholder = pct + '% loading...';
        updateModelProgress(pct);
        announceProgress(pct);
      }
    });

    if (window._modelAbort.signal.aborted) throw new Error('Cancelled');
    var generator = engine;

    window._modelEngine = generator;
    window._modelReady = true;
    window._modelLoading = false;
    window._activeModelId = modelId;

    modelPicker.classList.remove('loading');
    chatInput.placeholder = 'Ask anything...';
    if (uxState === 'LAVA_ONLY') transitionTo('LAVA_WITH_INPUT');
    document.getElementById('topProgress').style.opacity = '0';
    announceState('Model ready: ' + (m ? m.label : modelId));
    if (!document.hidden) chatInput.focus();
    renderModelMenu();

    // If a question was queued from #q= hash, auto-submit
    if (window._queuedQuestion) {
      chatInput.value = window._queuedQuestion;
      sendBtn.classList.add('active');
      window._queuedQuestion = null;
      chatInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
    }

  } catch (err) {
    console.warn('Model load:', err.message);
    window._modelLoading = false;
    modelPicker.classList.remove('loading');
    document.getElementById('topProgress').style.opacity = '0';
    if (uxState === 'LAVA_ONLY') transitionTo('LAVA_WITH_INPUT');
    if (typeof window._onWebLLMOffline === 'function') window._onWebLLMOffline();
  }
}

// LIVE INFERENCE (Track B) — when model is ready + user submits question

const qInput = chatInput;

qInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  if (e.shiftKey) return; // Shift+Enter adds newline
  e.preventDefault();
  if (inferenceRunning) return;
  var question = qInput.value.trim();
  if (!question && !_attachedFileText) return;

  // Prepend file content if attached
  if (_attachedFileText) {
    question = '[File: ' + _attachedFileName + ']\n' + _attachedFileText.substring(0, 4000) + '\n\nQuestion: ' + question;
    _attachedFileText = ''; _attachedFileName = '';
    var fchip = document.querySelector('.file-chip');
    if (fchip) fchip.remove();
  }

  // Clear input immediately
  qInput.value = '';
  qInput.style.height = 'auto';
  sendBtn.classList.remove('active');

  const cascadeStart = performance.now();

  // Transition to CHAT_ACTIVE on first message
  if (uxState !== 'CHAT_ACTIVE') transitionTo('CHAT_ACTIVE');

  // ── Layer 1: Live inference ──────────
  if (window._modelReady && window._modelEngine) {
    inferenceRunning = true;
    qInput.disabled = true;

    addMessage('user', question);
    addThinking();

    try {
      const response = await window._modelEngine.chat.completions.create({
        messages: [
          { role: 'system', content: 'You are a helpful research assistant. Answer the user\'s question directly and conversationally. Be specific and informative. Keep your answer to 2-4 paragraphs.' },
          { role: 'user', content: question }
        ],
        temperature: 0.7,
        max_tokens: 512
      });

      var raw = (response.choices[0].message.content || '').trim();
      if (!raw || raw.length < 10) throw new Error('Empty response');

      removeThinking();
      var aiMsg = addMessage('ai', escapeHtml(raw).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>'));

      // Extract claims from the natural language response
      var extractedClaims = extractClaimsFromText(raw, question);
      if (extractedClaims.length > 0) {
        var reIdClaims = extractedClaims.map(function(c) {
          var idx = window._nextClaimIndex++;
          return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: 'stated', text: c.text, unverified: true };
        });
        window._allClaims = window._allClaims.concat(reIdClaims);
        window._turnCount++;
        window._liveClaims = window._allClaims;
        aiMsg.appendChild(renderClaimsToggle(reIdClaims));
        showCompileButton();
        saveSession();
      }
      generateNextStepChips(aiMsg);
      autoScroll();

    } catch (err) {
      console.warn('Inference failed:', err);
      removeThinking();
      fallbackToCascade(question, cascadeStart);
    } finally {
      inferenceRunning = false;
      qInput.disabled = false;
    }
    return;
  }

  // ── Layer 0: Fuzzy match / template fallback (model not ready) ──
  addMessage('user', question);
  addThinking();
  fallbackToCascade(question, cascadeStart);
});

function isFollowUp(question) {
  // Short messages that reference existing conversation
  var lower = question.toLowerCase().trim();
  if (lower.length < 40 && window._turnCount > 0) return true;
  if (/^(yes|no|yeah|nah|we are|we do|we have|that|this|ok|sure|right|exactly|agreed|makes sense|any |what about|how about|can we|should we)/i.test(lower)) return true;
  return false;
}

function generateFollowUpResponse(question) {
  var prevClaims = window._allClaims;
  var risks = prevClaims.filter(function(c) { return c.type === 'risk'; });
  var recs = prevClaims.filter(function(c) { return c.type === 'recommendation'; });
  var constraints = prevClaims.filter(function(c) { return c.type === 'constraint'; });
  var lastQ = window._conversationHistory.length > 0 ? window._conversationHistory[window._conversationHistory.length - 1].question : '';

  var lower = question.toLowerCase();
  var text = '';
  var claims = [];

  if (/blindspot|gap|missing|blind spot|what else/i.test(lower)) {
    text = 'Looking at the ' + prevClaims.length + ' claims so far, there are a few gaps worth noting:';
    if (risks.length === 0) text += '<br><br>We haven\'t identified any risks yet — that\'s a significant blind spot. Every approach has downsides.';
    if (constraints.length === 0) text += '<br><br>No constraints have been captured. What are the hard boundaries?';
    text += '<br><br>Consider: what happens if this fails? What does rollback look like? Who are the stakeholders who haven\'t weighed in?';
    claims = [
      { type: 'risk', text: 'No rollback plan has been discussed — if the pilot fails, the path back to the current approach needs to be defined.' },
      { type: 'constraint', text: 'Stakeholder buy-in beyond the pilot teams has not been validated.' }
    ];
  } else if (/witness|verify|evidence|prove|check/i.test(lower)) {
    text = 'To strengthen the evidence, we\'d want to look at:';
    text += '<br><br>1. Case studies from teams of similar size who made this change';
    text += '<br>2. Metrics from the pilot teams — what are they actually measuring?';
    text += '<br>3. Feedback from the 8 teams NOT in the pilot — are they bought in or resistant?';
    claims = [
      { type: 'recommendation', text: 'Collect quantitative metrics from pilot teams before expanding — anecdotal feedback is insufficient for org-wide decisions.' },
      { type: 'risk', text: 'Selection bias in pilot teams (volunteers vs assigned) may not represent how the remaining teams will respond.' }
    ];
  } else if (/we are|we do|we have|we\'re|doing that|already/i.test(lower)) {
    text = 'Good — that\'s noted. Building on what you\'ve shared so far:';
    if (recs.length > 0) text += '<br><br>Given that context, the recommendation to <em>' + escapeHtml(recs[recs.length-1].text.toLowerCase().substring(0, 80)) + '</em> seems aligned with your approach.';
    text += '<br><br>The key question now is: what\'s your success criteria? How will you know when it\'s time to expand from 2 teams to the next batch?';
    claims = [
      { type: 'constraint', text: 'Success criteria for the pilot phase need to be defined before expansion decisions are made.' },
      { type: 'recommendation', text: 'Define a clear go/no-go checklist for scaling from pilot to broader rollout.' }
    ];
  } else {
    // Generic follow-up that references context
    var topicWords = [];
    window._conversationHistory.forEach(function(h) { topicWords = topicWords.concat(significantWords(h.question)); });
    var topic = topicWords.slice(0, 3).join(' ') || 'this';
    text = 'Continuing on <strong>' + escapeHtml(topic) + '</strong> — ' + escapeHtml(question) + ' is a good angle to explore.';
    text += '<br><br>Based on the ' + prevClaims.length + ' claims we\'ve gathered, the main tension is between moving quickly and making sure the foundation is solid.';
    if (risks.length > 0) text += ' We\'ve flagged ' + risks.length + ' risk' + (risks.length > 1 ? 's' : '') + ' so far.';
    claims = [
      { type: 'factual', text: 'The conversation has covered ' + prevClaims.length + ' claims across ' + window._turnCount + ' exchanges, with ' + risks.length + ' risks identified.' }
    ];
  }

  return { text: text, claims: claims };
}

function fallbackToCascade(question, cascadeStart) {
  // Check if this is a follow-up to an existing conversation
  if (isFollowUp(question) && window._turnCount > 0) {
    removeThinking();
    var followUp = generateFollowUpResponse(question);
    var aiMsg = addMessage('ai', followUp.text);
    var claims = followUp.claims.map(function(c) {
      var idx = window._nextClaimIndex++;
      return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: 'stated', text: c.text };
    });
    window._allClaims = window._allClaims.concat(claims);
    window._turnCount++;
    window._conversationHistory.push({ turn: window._turnCount, question: question, source: 'follow-up' });
    window._liveClaims = window._allClaims;
    if (claims.length > 0) aiMsg.appendChild(renderClaimsToggle(claims));
    generateNextStepChips(aiMsg);
    showCompileButton();
    saveSession();
    autoScroll();
    return;
  }

  const fuzzyResult = fuzzyMatchDemo(question, DEMO_LIBRARY);

  if (fuzzyResult && fuzzyResult.score > 0.4) {
    removeThinking();
    var demo = fuzzyResult.match;
    var intro = generateConversationalIntro(demo.claims, demo.question || question);
    var aiMsg2 = addMessage('ai', intro);
    var reIdClaims = demo.claims.map(function(c) {
      var idx = window._nextClaimIndex++;
      return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: c.tier, text: c.text };
    });
    window._allClaims = window._allClaims.concat(reIdClaims);
    window._turnCount++;
    window._conversationHistory.push({ turn: window._turnCount, question: question, source: 'fuzzy' });
    window._liveClaims = window._allClaims;
    aiMsg2.appendChild(renderClaimsToggle(reIdClaims));
    generateNextStepChips(aiMsg2);
    showCompileButton();
    saveSession();
    autoScroll();
  } else {
    removeThinking();
    var words = significantWords(question);
    var topic = words.slice().sort(function(a,b){ return b.length - a.length; }).slice(0,3).join(' ') || question;
    var response = generateConversationalFallback(topic, question);
    var aiMsg3 = addMessage('ai', response.text);
    var claims3 = response.claims.map(function(c) {
      var idx = window._nextClaimIndex++;
      return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: 'stated', text: c.text };
    });
    window._allClaims = window._allClaims.concat(claims3);
    window._turnCount++;
    window._conversationHistory.push({ turn: window._turnCount, question: question, source: 'template' });
    window._liveClaims = window._allClaims;
    if (claims3.length > 0) aiMsg3.appendChild(renderClaimsToggle(claims3));
    generateNextStepChips(aiMsg3);
    showCompileButton();
    saveSession();
    autoScroll();
  }
}

function generateConversationalIntro(claims, question) {
  var risks = claims.filter(function(c) { return c.type === 'risk'; });
  var recs = claims.filter(function(c) { return c.type === 'recommendation'; });
  var facts = claims.filter(function(c) { return c.type === 'factual'; });

  var parts = [];
  if (facts.length > 0) parts.push(escapeHtml(facts[0].text));
  if (facts.length > 1) parts.push(escapeHtml(facts[1].text));
  if (risks.length > 0) parts.push('One thing to watch out for: ' + escapeHtml(risks[0].text).toLowerCase());
  if (recs.length > 0) parts.push(escapeHtml(recs[0].text));
  return parts.join('<br><br>') || 'Here\'s what I found on that topic.';
}

function generateConversationalFallback(topic, question) {
  // Multiple response templates to avoid repetition
  var templates = [
    {
      text: 'That\'s an interesting area to explore. <strong>' + escapeHtml(topic) + '</strong> involves several trade-offs that depend heavily on your specific context — team size, existing infrastructure, and timeline all play a role.<br><br>The biggest question is usually whether the upfront investment pays off relative to the alternatives. Most teams that succeed with this approach start small, validate their assumptions, and scale gradually.',
      claims: [
        { type: 'constraint', text: 'Evaluating ' + topic + ' requires understanding the specific team context, existing infrastructure, and timeline constraints.' },
        { type: 'recommendation', text: 'Start with a small proof of concept to validate assumptions before committing to a larger rollout of ' + topic + '.' },
        { type: 'risk', text: 'The upfront investment in ' + topic + ' may not pay off if the team cannot commit to gradual scaling and iteration.' }
      ]
    },
    {
      text: 'Let me break down what I know about <strong>' + escapeHtml(topic) + '</strong>.<br><br>This is a space where the right answer depends on where you are today versus where you want to be. There are real trade-offs between moving fast and building a solid foundation. The teams that navigate this well tend to be explicit about what they\'re optimizing for.',
      claims: [
        { type: 'factual', text: 'The optimal approach to ' + topic + ' depends on the gap between current state and desired end state.' },
        { type: 'recommendation', text: 'Be explicit about optimization targets when evaluating ' + topic + ' — speed vs. foundation is a common tension.' },
        { type: 'risk', text: 'Trying to optimize for both speed and long-term architecture simultaneously with ' + topic + ' often results in achieving neither.' }
      ]
    },
    {
      text: 'Good question. <strong>' + escapeHtml(topic) + '</strong> is one of those areas where the conventional wisdom doesn\'t always hold up in practice.<br><br>What I\'d focus on first is understanding the constraints you\'re working within. The best solution often isn\'t the most technically elegant one — it\'s the one that fits your team\'s capacity and your timeline.',
      claims: [
        { type: 'constraint', text: 'Conventional wisdom about ' + topic + ' may not apply to all team contexts and should be validated against specific constraints.' },
        { type: 'recommendation', text: 'Prioritize solutions for ' + topic + ' that fit team capacity and timeline over theoretical elegance.' },
        { type: 'factual', text: 'Practical outcomes with ' + topic + ' correlate more strongly with team fit than with technical sophistication.' }
      ]
    }
  ];

  return templates[Math.floor(Math.random() * templates.length)];
}

// ===================================================================
// SERVICE WORKER + EASTER EGG — preserved from v1
// ===================================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ===================================================================
// PWA STANDALONE MODE DETECTION
// ===================================================================
(function initPWAMode() {
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isPWA) {
    document.documentElement.classList.add('pwa-standalone');
    window._trackEvent?.('pwa_standalone');
  }
})();

// ===================================================================
// Offline — silent, no toast (Track A works without network after first cache)
window._onWebLLMOffline = function() {};

// Zero-dep local analytics — IndexedDB event log
(function initLocalAnalytics() {
  const DB_NAME = 'grainulator-analytics';
  const STORE = 'events';
  let db = null;
  const open = indexedDB.open(DB_NAME, 1);
  open.onupgradeneeded = () => { open.result.createObjectStore(STORE, { autoIncrement: true }); };
  open.onsuccess = () => { db = open.result; };
  window._trackEvent = function(name, data) {
    if (!db) return;
    try {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).add({ event: name, data: data || {}, ts: Date.now() });
    } catch(e) {}
  };
  // Track page view
  window._trackEvent('page_view', { referrer: document.referrer, tier: document.documentElement.getAttribute('data-tier') });
})();

// ===================================================================
// iOS KEYBOARD — adjust layout when virtual keyboard opens
// ===================================================================
if (window.visualViewport) {
  let pendingVV = null;
  window.visualViewport.addEventListener('resize', () => {
    if (pendingVV) cancelAnimationFrame(pendingVV);
    pendingVV = requestAnimationFrame(() => {
      const offset = window.innerHeight - window.visualViewport.height;
      document.documentElement.style.setProperty('--kb-offset', Math.max(0, offset) + 'px');
      // Shrink app to visual viewport height when keyboard is open
      const appEl = document.getElementById('app');
      if (offset > 50) {
        appEl.style.height = window.visualViewport.height + 'px';
      } else {
        appEl.style.height = '';
      }
      autoScroll();
    });
  });
}

// Reduced motion: pause shader at start
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  motionTogglePaused = true;
  pauseShader();
}

// Page Visibility API pause
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { pauseShader(); }
  else if (!motionTogglePaused) { resumeShader(); }
});

// Hash-based question loading (input-first — #q= prefills, #demo scrolls to input)
(function loadFromHash() {
  const hash = location.hash;
  if (hash.startsWith('#q=')) {
    const q = decodeURIComponent(hash.slice(3));
    if (q) {
      window._queuedQuestion = q;
      chatInput.value = q;
      sendBtn.classList.add('active');
    }
  } else if (hash === '#demo') {
    setTimeout(function() { chatInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); }, 500);
    history.replaceState(null, '', '/');
  }
})();

// Easter egg (respects reduced-motion)
let kb = '';
document.addEventListener('keydown', (e) => {
  kb = (kb + e.key.toLowerCase()).slice(-10);
  if (kb.includes('grain')) {
    kb = '';
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    document.body.style.transition = 'filter 0.2s';
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    setTimeout(() => { document.body.style.filter = 'none'; }, 400);
  }
});


// ===================================================================
// DEBUG: ?debug=cascade panel
// ===================================================================
const CASCADE_DEBUG = new URLSearchParams(location.search).get('debug') === 'cascade';

function updateCascadeDebug(opts) {
  if (!CASCADE_DEBUG) return;
  let panel = document.getElementById('cascade-debug');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'cascade-debug';
    panel.style.cssText = 'position:fixed;top:8px;right:8px;z-index:9999;background:rgba(0,0,0,0.85);border:1px solid rgba(141,246,255,0.3);border-radius:6px;padding:0.6rem 0.8rem;font-family:monospace;font-size:0.6rem;color:rgba(141,246,255,0.8);max-width:260px;pointer-events:none;';
    document.body.appendChild(panel);
  }
  const lines = [];
  lines.push('cascade layer: ' + (opts.cascadeLayer || '?'));
  if (opts.score !== null && opts.score !== undefined) lines.push('fuzzy score: ' + opts.score.toFixed(3));
  lines.push('timing: ' + (opts.timing || 0).toFixed(1) + 'ms');
  if (opts.isTemplate) lines.push('(template fallback)');
  panel.innerHTML = lines.join('<br>');
}

// Model ready watcher — update input placeholder
(function watchModelReady() {
  let _val = window._modelReady;
  Object.defineProperty(window, '_modelReady', {
    get() { return _val; },
    set(v) {
      _val = v;
      if (v) {
        var m = MODELS.find(function(x) { return x.id === window._activeModelId; });
        chatInput.placeholder = 'Ask anything (' + (m ? m.label : 'AI') + ')...';
      }
    },
    configurable: true,
    enumerable: true
  });
})();
