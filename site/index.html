<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');

function activateFallback() {
  document.body.classList.add('webgl-fallback');
}

function isSoftwareRenderer(g) {
  var ext = g.getExtension('WEBGL_debug_renderer_info');
  if (!ext) return false;
  var renderer = g.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
  return /swiftshader|llvmpipe|software|basic render/i.test(renderer);
}

if (!gl || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  if (!gl) activateFallback();
} else if (isSoftwareRenderer(gl)) {
  activateFallback();
} else {

// Context loss handler (w711)
c.addEventListener('webglcontextlost', (e) => { e.preventDefault(); activateFallback(); });

// Mobile detection
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;

// Perf params — mobile gets lighter workload, desktop unchanged
const NUM       = isMobile ? 6    : 10;
const STEPS     = isMobile ? 64   : 96;  // bumped mobile (only 3 blobs now, cheaper)
const HIT_THRESH= isMobile ? '0.002' : '0.001';
const STEP_MULT = isMobile ? '0.9'   : '0.8';  // tighter steps = smoother surface
const NORM_EPS  = isMobile ? '0.002' : '0.001';
const GLITCH_ON = isMobile ? 0       : 1;  // disable glitch on mobile

// 3D raymarched lava lamp based on cineShader-Lava approach (w400-w402)
// opSmoothUnion on SDF spheres = actual opaque surfaces with normals

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;

#define NUM ${NUM}
#define STEPS ${STEPS}
#define HIT_THRESH ${HIT_THRESH}
#define STEP_MULT ${STEP_MULT}
#define NORM_EPS ${NORM_EPS}
#define GLITCH_ON ${GLITCH_ON}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdEllipsoid(vec3 p, vec3 rad) {
  float k0 = length(p / rad);
  float k1 = length(p / (rad * rad));
  return k0 * (k0 - 1.0) / k1;
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

vec3 rotY(vec3 p, float a) {
  float c = cos(a), s = sin(a);
  return vec3(c*p.x + s*p.z, p.y, -s*p.x + c*p.z);
}

vec3 rotX(vec3 p, float a) {
  float c = cos(a), s = sin(a);
  return vec3(p.x, c*p.y - s*p.z, s*p.y + c*p.z);
}

float map(vec3 p) {
  // sphere rotates slowly
  float sphereRot = t * 0.05;
  float wobble = sin(t * 0.023) * 0.08;
  vec3 sp = rotX(rotY(p, -sphereRot), -wobble);

  // techno pulse — not constant, arrives in waves like gravitational radiation
  // techno as a WOOSH — slow swell, not a sharp hit
  // like a wave passing through, not a kick drum
  float wooshPhase = fract(t * 130.0 / 60.0 / 4.0); // every 4 beats
  float woosh = sin(wooshPhase * 3.14159) * sin(wooshPhase * 3.14159); // smooth arc
  // only appears every ~30 seconds
  float envelope = pow(smoothstep(0.7, 0.9, sin(t * 0.06)), 3.0) * 0.2;
  float beat = woosh * envelope;

  // core wanders off-center — seed offsets all phases so start position is random
  float morphT = t * 0.02 + seed * 100.0; // seed jumps the timeline
  vec3 corePos = vec3(
    sin(morphT * 0.7) * 0.8 + cos(morphT * 0.3 + 1.5) * 0.4,
    sin(morphT * 0.5 + 0.8) * 0.6 + sin(morphT * 0.9 + 2.3) * 0.2,
    sin(morphT * 0.6 + 1.7) * 0.4
  );
  // morph between sphere and ellipsoid shapes
  float stretch = 0.5 + 0.5 * sin(morphT * 0.6);
  vec3 coreRad = vec3(
    0.4 + stretch * 0.15 + beat * 0.03,
    0.45 - stretch * 0.1 + beat * 0.03,
    0.4 + stretch * 0.08 * sin(morphT * 1.3) + beat * 0.03
  );
  float sphereRadius = 0.45; // small core — blobs are the show
  float d = sdEllipsoid(sp - corePos, coreRad);

  // surface noise — "a million tiny bumps" emerging from the core
  // creates the illusion of many small blobs without extra SDF loops
  vec3 noiseP = sp * 3.0 + t * 0.08;
  float surfNoise = sin(noiseP.x * 2.1 + noiseP.y * 1.7) *
                    sin(noiseP.y * 2.3 + noiseP.z * 1.9) *
                    sin(noiseP.z * 1.8 + noiseP.x * 2.5);
  surfNoise = surfNoise * 0.5 + 0.5; // 0-1
  // only displace outward from the surface (not inward)
  d -= surfNoise * 0.04 * smoothstep(0.15, -0.02, d); // subtle bumps on small core

  // blobs emerge radially from sphere surface
  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float hash1 = fract(fi * 412.531 + 0.513 + seed);
    float hash2 = fract(fi * 317.892 + 0.217 + seed * 1.7);
    float hash3 = fract(fi * 253.147 + 0.891 + seed * 2.3);

    // anchor point on sphere — golden angle + polar spread
    float theta = fi * 2.39996 + seed * 6.28;
    float phi = acos(1.0 - 2.0 * hash2);
    vec3 anchor = vec3(sin(phi)*cos(theta), cos(phi), sin(phi)*sin(theta));
    // slow drift
    float driftA = sin(t * 0.01 + fi * 2.1) * 0.15;
    float driftB = cos(t * 0.008 + fi * 1.7) * 0.15;
    anchor = normalize(anchor + vec3(driftA, driftB * 0.5, -driftA * 0.7));

    vec3 radialDir = anchor;

    // lifecycle: 60-120s
    float cycleTime = 60.0 + hash1 * 60.0;
    // seed * 7.3 spreads blobs across the full cycle on load
    float phase = fract(t / cycleTime + fi * 0.27 + seed * 7.3 + hash2 * 0.5);

    float radialOffset;
    bool isFalling = false;
    float shapePhase;

    if (phase < 0.40) {
      // dome forming on surface
      float rr = phase / 0.40;
      radialOffset = rr * rr * (3.0 - 2.0 * rr) * 0.3;
      shapePhase = 0.0;
    } else if (phase < 0.65) {
      // rising outward — smooth HD
      float rr = (phase - 0.40) / 0.25;
      radialOffset = 0.3 + rr * rr * (3.0 - 2.0 * rr) * 1.5;
      shapePhase = 1.0;
    } else if (phase < 0.80) {
      // at max distance — cooling
      float rr = (phase - 0.65) / 0.15;
      radialOffset = 1.8 - rr * 0.15;
      shapePhase = 2.0;
    } else {
      // falling back
      float rr = (phase - 0.80) / 0.20;
      radialOffset = 1.65 - rr * rr * 1.65;
      shapePhase = 3.0;
      isFalling = true;
    }

    // blob emerges from core surface, not from origin
    vec3 blobCenter = corePos + anchor * (sphereRadius + radialOffset);
    vec3 evalP = sp;

    // glitch — the star of the show
    // falling blobs always glitch + random patches appear across surface
#if GLITCH_ON
    {
      float glitchAmt = 0.0;

      // falling blobs glitch (cooling = stiffening = digital breakdown)
      if (isFalling) {
        float fadeIn = smoothstep(0.2, 0.8, radialOffset);
        float fadeOut = smoothstep(2.0, 1.0, radialOffset);
        glitchAmt = fadeIn * fadeOut * 0.45; // stronger than before
      }

      // random glitch patches across ALL blobs — not just falling
      // these come and go like data corruption
      float glitchWave = sin(t * 0.3 + fi * 3.7) * sin(t * 0.13 + fi * 2.1);
      float glitchBurst = smoothstep(0.6, 0.9, glitchWave); // rare spikes
      glitchAmt = max(glitchAmt, glitchBurst * 0.35);

      if (glitchAmt > 0.01) {
        vec3 toBlob = sp - blobCenter;
        float nearBlob = smoothstep(2.0, 0.2, length(toBlob));
        float finalAmt = glitchAmt * nearBlob;
        if (finalAmt > 0.005) {
          // vary voxel size — sometimes coarse (8-bit), sometimes fine
          float vs = mix(0.35, 0.12, fract(sin(fi * 73.1 + floor(t * 2.0)) * 438.5));
          vec3 snapped = floor(sp / vs + 0.5) * vs;
          evalP = mix(sp, snapped, finalAmt);
        }
      }
    }
#endif

    // smaller blobs — many small ones, not few jumbo ones
    vec3 domeRad     = vec3(0.20, 0.12, 0.20);
    vec3 teardropRad = vec3(0.14, 0.25, 0.14);
    vec3 flatRad     = vec3(0.22, 0.12, 0.22);
    vec3 dripRad     = vec3(0.11, 0.25, 0.11);

    vec3 blobRad;
    if (shapePhase < 1.0) {
      blobRad = mix(domeRad, teardropRad, shapePhase);
    } else if (shapePhase < 2.0) {
      blobRad = mix(teardropRad, flatRad, shapePhase - 1.0);
    } else if (shapePhase < 3.0) {
      blobRad = mix(flatRad, dripRad, shapePhase - 2.0);
    } else {
      blobRad = dripRad;
    }
    blobRad *= (0.6 + hash1 * 0.5) * (1.0 + beat * 0.04);

    // orient ellipsoid along radial direction
    vec3 up = radialDir;
    vec3 ref = abs(up.y) < 0.9 ? vec3(0.0, 1.0, 0.0) : vec3(1.0, 0.0, 0.0);
    vec3 tangentX = normalize(cross(up, ref));
    vec3 tangentZ = cross(tangentX, up);

    vec3 toP = evalP - blobCenter;
    vec3 localP = vec3(dot(toP, tangentX), dot(toP, up), dot(toP, tangentZ));

    float blobD = sdEllipsoid(localP, blobRad);

    // lower k = blobs stay individual, only merge when very close
    float surfaceProximity = smoothstep(1.5, 0.0, radialOffset);
    float k = mix(0.25, 0.5, surfaceProximity); // 0.5 near surface, 0.25 far
    d = smin(d, blobD, k);
  }

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(NORM_EPS, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

  // beat for shading + lensing
  float wooshShade = fract(t * 130.0 / 60.0 / 4.0);
  float beatShade = sin(wooshShade * 3.14159) * sin(wooshShade * 3.14159);
  beatShade *= pow(smoothstep(0.7, 0.9, sin(t * 0.06)), 3.0) * 0.2;

  // gravitational lensing — Schwarzschild-inspired ray bending
  // the core wanders, so the lens follows it (not screen center)
  // project core 3D position to approximate screen position
  float morphT2 = t * 0.02 + seed * 100.0; // match map() timeline
  vec2 coreScreen = vec2(
    sin(morphT2 * 0.7) * 0.25 + cos(morphT2 * 0.3 + 1.5) * 0.12,
    sin(morphT2 * 0.5 + 0.8) * 0.18
  );
  vec2 toCore2D = coreScreen - uv;
  float r2 = dot(toCore2D, toCore2D);
  // mass pulses with the beat — gravitational waves
  float lensMass = 0.12 + beatShade * 0.08;
  float deflection = lensMass / (r2 + 0.08);
  uv += normalize(toCore2D + 0.001) * deflection * 0.04;

  // camera looking at sphere center
  vec3 ro = vec3(0.0, 0.0, 3.8);
  vec3 lookAt = vec3(0.0, 0.0, 0.0);
  vec3 fwd = normalize(lookAt - ro);
  vec3 rgt = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
  vec3 up2 = cross(rgt, fwd);
  vec3 rd = normalize(fwd * 1.2 + rgt * uv.x + up2 * uv.y);

  float dist = 0.0;
  float hit = -1.0;
  float lastH = 1.0;
  for (int i = 0; i < STEPS; i++) {
    vec3 p = ro + rd * dist;
    float h = map(p);
    lastH = h;
    if (h < HIT_THRESH) { hit = dist; break; }
    if (dist > 20.0) break;
    dist += h * STEP_MULT;
  }

  // background — dark space with warm core glow
  float centerDist = length(uv);
  vec3 col = mix(
    vec3(0.06, 0.04, 0.015),
    vec3(0.008, 0.006, 0.003),
    smoothstep(0.0, 1.2, centerDist)
  );
  float coreGlow = exp(-centerDist * 2.5);
  col += vec3(0.06, 0.035, 0.01) * coreGlow * (1.0 + beatShade * 0.5);

  vec3 bgCol = col;
  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    // light from sphere core
    vec3 toCore = normalize(-p);
    float diff = max(dot(n, toCore), 0.0);
    diff = sqrt(diff);
    float amb = 0.20 + 0.10 * (1.0 - max(dot(n, toCore), 0.0));
    float fres = pow(1.0 - max(dot(n, -rd), 0.0), 2.5);
    float sss = max(dot(n, -toCore), 0.0) * 0.25;
    vec3 H = normalize(toCore - rd);
    float spec = pow(max(dot(n, H), 0.0), 16.0) * 0.15;

    float distFromCenter = length(p);
    float proximityToSurface = 1.0 - smoothstep(1.5, 4.0, distFromCenter);

    vec3 waxWarm = vec3(0.25, 0.60, 0.08);
    vec3 waxCool = vec3(0.10, 0.32, 0.04);
    vec3 waxBase = mix(waxCool, waxWarm, proximityToSurface);
    vec3 waxBright = vec3(0.40, 1.0, 0.25);
    vec3 waxCol = mix(waxBase, waxBright, fres * 0.6);

    float coreLight = max(dot(n, toCore), 0.0);
    waxCol += vec3(0.10, 0.18, 0.03) * coreLight * proximityToSurface;

    float innerGlow = (1.0 - proximityToSurface) * sss;
    waxCol += vec3(0.15, 0.08, 0.02) * innerGlow * 2.0;

    col = waxCol * (diff * 0.45 + amb + sss * 0.5);
    col += vec3(0.2, 0.4, 0.1) * spec * 0.5;

    float fog = exp(-hit * 0.06);
    vec3 fogCol = vec3(0.025, 0.018, 0.008);
    col = mix(fogCol, col, fog);

    float edgeAA = smoothstep(HIT_THRESH, 0.0, lastH);
    col = mix(bgCol, col, edgeAA);

    // neon blue rim — pulses on beat
    float rimInner = pow(fres, 1.5);
    float rimOuter = pow(fres, 2.5);
    float rimPulse = 1.0 + beatShade * 0.4; // 40% brighter on beat
    col += waxBright * rimInner * 0.2 * rimPulse;
    col += vec3(0.15, 0.45, 1.0) * rimOuter * 1.5 * rimPulse;
    col += vec3(0.08, 0.25, 0.8) * pow(fres, 4.0) * 1.0 * rimPulse;
  }

  float vig = 1.0 - dot(uv * 0.6, uv * 0.6);
  col *= smoothstep(0.0, 0.5, vig);

  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)) + t) * 43758.5453);
  col += grain * 0.005 - 0.0025;

  gl_FragColor = vec4(col, 1.0);
}
`;

const compile = (src, type) => {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
};

const prog = gl.createProgram();
gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');
const seedVal = Math.random();
gl.uniform1f(seedLoc, seedVal);
// Resolution: reduce DPR on mobile for fewer fragment shader invocations
const dpr = isMobile ? Math.min(devicePixelRatio, 2.0) : devicePixelRatio;

const resize = () => {
  c.width = innerWidth * dpr;
  c.height = innerHeight * dpr;
  gl.viewport(0, 0, c.width, c.height);
};
resize();
addEventListener('resize', resize);

// idle timeout — pause after 90s to save battery (w713)
let lastInteraction = Date.now();
let paused = false;
document.addEventListener('mousemove', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });
document.addEventListener('touchstart', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });

const render = (time) => {
  if (Date.now() - lastInteraction > 90000) { paused = true; return; }
  gl.uniform1f(tLoc, time * 0.001);
  gl.uniform2f(rLoc, c.width, c.height);
  // uniforms set in render loop: t, r
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
};
requestAnimationFrame(render);

}

// copy command
const cmd = document.getElementById('cmd');
cmd.addEventListener('click', (e) => {
  e.preventDefault();
  navigator.clipboard.writeText('/plugin install grainulator').then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'copied.';
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); }, 1600);
  });
});
cmd.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cmd.click(); }
});

// register service worker for PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// easter egg: type "grain" anywhere
let kb = '';
document.addEventListener('keydown', (e) => {
  kb = (kb + e.key.toLowerCase()).slice(-10);
  if (kb.includes('grain')) {
    kb = '';
    document.body.style.transition = 'filter 0.2s';
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    setTimeout(() => { document.body.style.filter = 'none'; }, 400);
  }
});
</script>
