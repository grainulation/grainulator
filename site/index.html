<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100vh;overflow:hidden;background:transparent}
body{height:100vh;overflow:hidden;background:#060d10;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Canvas — fades in after load */
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;opacity:0;transition:opacity 1.5s ease}
canvas.active{opacity:1}

/* Dim overlay — JS controls opacity for CHAT_ACTIVE / focus mode */
.dim-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;background:#0c1a1e;opacity:0;transition:opacity 0.6s ease;pointer-events:none}

/* Top progress bar — model download */

/* App shell — flexbox column, full viewport height, iOS safe */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:-webkit-fill-available;position:relative;z-index:10;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace}

/* Header — install left, new chat right */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:calc(0.5rem + env(safe-area-inset-top,0px)) 0.8rem 0.5rem;z-index:15;position:relative;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04)}
/* splash hero removed */
.header-btn{font-size:0.65rem;padding:0.35rem 0.7rem;height:38px;color:rgba(141,246,255,1);border:1px solid rgba(141,246,255,0.2);border-radius:4px;background:rgba(255,255,255,0.25);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:0.4rem;text-decoration:none;white-space:nowrap;transition:all 0.2s;box-sizing:border-box}
.header-btn:hover{border-color:rgba(141,246,255,0.4);color:#8df6ff}
.header-btn img{width:28px;height:28px;opacity:0.9}
.header-btn .btn-text{overflow:hidden;max-width:0;opacity:0;transition:max-width 0.4s ease,opacity 0.3s ease}
.header-btn.revealed .btn-text{max-width:300px;opacity:1}
.new-chat-btn:disabled{opacity:0.25;cursor:default;pointer-events:none}
.new-chat-btn .btn-text{max-width:300px;opacity:1}

/* Chat area — hidden until CHAT_ACTIVE */
.chat-area{flex:1 1 0%;min-height:0;overflow-y:auto;padding:1rem 1rem 5rem;display:flex;flex-direction:column;gap:0.8rem;scroll-behavior:smooth;opacity:0;transition:opacity 0.4s ease}
.app.chat-active .chat-area{opacity:1}

/* Messages */
.msg{max-width:85%;border-radius:12px;padding:0.8rem 1rem;font-size:0.8rem;line-height:1.6;animation:msg-in 0.3s ease forwards;opacity:0}
@keyframes msg-in{to{opacity:1}}
.msg-user{align-self:flex-end;background:rgba(141,246,255,0.1);color:#fff;border:1px solid rgba(141,246,255,0.15)}
.msg-ai{align-self:flex-start;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.06)}
.msg-ai table{border-collapse:collapse;width:100%;margin:0.5rem 0;font-size:0.7rem}
.msg-ai th,.msg-ai td{border:1px solid rgba(141,246,255,0.2);padding:0.3rem 0.5rem;text-align:left}
.msg-ai th{background:rgba(141,246,255,0.08);color:#8df6ff}
.msg-ai code{background:rgba(141,246,255,0.1);padding:0.1rem 0.3rem;border-radius:2px;font-size:0.85em}
.msg-ai pre{background:rgba(0,0,0,0.3);padding:0.5rem;border-radius:4px;overflow-x:auto}
.msg-ai pre code{background:none;padding:0}
.msg-ai ul,.msg-ai ol{padding-left:1.2rem;margin:0.3rem 0}
.msg-ai p{margin:0.3rem 0}
.msg-system{align-self:center;background:none;color:rgba(141,246,255,0.5);font-size:0.65rem;text-align:center;max-width:100%;padding:0.4rem}

/* Thinking dots */
.thinking-dots{display:flex;gap:4px;padding:0.5rem 0}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:rgba(141,246,255,0.4);animation:dot-pulse 1.4s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot-pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1.2)}}

/* Claims toggle (2-level disclosure) */
.claims-toggle{font-size:0.7rem;color:rgba(141,246,255,0.6);background:none;border:1px solid rgba(141,246,255,0.12);border-radius:4px;min-height:36px;padding:0.4rem 0.8rem;cursor:pointer;margin-top:0.5rem;font-family:inherit;transition:all 0.2s}
.claims-toggle[aria-expanded="true"]{color:#8df6ff;border-color:rgba(141,246,255,0.3)}
.claims-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.3s ease}
.claims-panel.open{grid-template-rows:1fr}
.claims-panel-inner{overflow:hidden}
.claim-row{font-size:0.7rem;color:rgba(255,255,255,0.6);padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:0.5rem;align-items:baseline}
.claim-row .badge{font-size:0.55rem;padding:0.1rem 0.35rem;border-radius:2px;text-transform:uppercase;font-weight:700;flex-shrink:0}

/* Claim type badges */
.badge-constraint{background:rgba(244,63,94,0.15);color:#f43f5e}
.badge-factual{background:rgba(59,130,246,0.15);color:#3b82f6}
.badge-risk{background:rgba(251,191,36,0.15);color:#fbbf24}
.badge-recommendation{background:rgba(34,197,94,0.15);color:#22c55e}
.badge-estimate{background:rgba(167,139,250,0.15);color:#a78bfa}
.badge-feedback{background:rgba(156,163,175,0.15);color:#9ca3af}

/* Input bar — blooms up from bottom with spring animation */
.input-bar{position:fixed;bottom:0;left:0;right:0;z-index:15;display:flex;align-items:center;padding:0.5rem 0.5rem calc(0.5rem + max(env(safe-area-inset-bottom,0px), var(--kb-offset, 0px)));background:transparent;border-top:none;transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)}
.app.chat-active .input-bar{background:rgba(12,26,30,0.95);border-top:1px solid rgba(255,255,255,0.06)}
.input-bar.visible{transform:translateY(0)}
.app.chat-active .compile-bar{position:relative;flex-shrink:0}
.app.chat-active .input-bar{padding-bottom:calc(0.5rem + max(env(safe-area-inset-bottom,0px), var(--kb-offset, 0px)))}
.input-wrap{position:relative;flex:1}
.chat-input{width:100%;font-family:inherit;font-size:max(1rem,16px);color:rgba(141,246,255,1);background:rgba(255,255,255,0.25);border:1px solid rgba(141,246,255,0.2);border-radius:4px;padding:0.7rem 3rem 0.7rem 1rem;outline:none;transition:border-color 0.3s;resize:none;overflow:hidden;min-height:44px;max-height:120px}
.chat-input:focus{border-color:rgba(141,246,255,0.5)}
.chat-input::placeholder{color:rgba(255,255,255,0.25)}
.send-btn{position:absolute;right:8px;top:8px;width:28px;height:28px;border-radius:50%;background:rgba(141,246,255,0.25);border:1px solid rgba(141,246,255,0.3);color:#8df6ff;cursor:pointer;display:none;align-items:center;justify-content:center}
.send-btn.active{display:flex}
.send-btn:active{color:#fff}
.send-btn svg{width:14px;height:14px}

/* Model progress bar (system message style) */
.model-bar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:0.3rem;overflow:hidden}
.model-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(141,246,255,0.4),rgba(141,246,255,0.8));border-radius:2px;transition:width 0.4s ease}

/* Compile bar — sticky above input */
.compile-bar{display:none;padding:0.3rem 0.5rem;background:rgba(12,26,30,0.9);border-top:1px solid rgba(141,246,255,0.1);justify-content:center}
.app.chat-active .compile-bar.visible{display:flex}
.compile-msg-btn{font-family:inherit;font-size:0.65rem;color:#fff;background:rgba(141,246,255,0.25);border:1px solid rgba(141,246,255,0.3);padding:0.4rem 1rem;border-radius:3px;cursor:pointer;transition:all 0.2s;min-height:32px;width:100%}
.compile-msg-btn:hover{border-color:rgba(141,246,255,0.4)}
.compile-msg-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Compiler pass lines in chat */
.pass-line{font-family:monospace;font-size:0.7rem;color:rgba(255,255,255,0.5);padding:0.3rem 0;opacity:0;transform:translateX(-8px);transition:all 0.3s ease}
.pass-line.done{opacity:1;transform:translateX(0)}
.pass-line .check{color:#8df6ff;margin-right:0.4rem}
.pass-line .fail{color:#f43f5e;margin-right:0.4rem}

/* Verdict */
.verdict-title{font-family:monospace;font-size:0.7rem;color:#8df6ff;margin-bottom:0.4rem;font-weight:700}
.verdict-body{font-family:monospace;font-size:0.7rem;color:rgba(255,255,255,0.65);line-height:1.6}
.conflict-flag{color:#fbbf24}

/* Handoff section */
.handoff-section{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.06)}
.handoff-btn{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:0.7rem;color:rgba(141,246,255,1);background:none;border:1px solid rgba(141,246,255,0.2);padding:0.6rem 1rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-btn:hover,.handoff-btn:focus-visible{color:#8df6ff;border-color:rgba(141,246,255,0.5);box-shadow:0 0 15px rgba(141,246,255,0.1)}
.handoff-primary{font-family:monospace;font-size:0.7rem;color:#8df6ff;background:rgba(141,246,255,0.08);border:1px solid rgba(141,246,255,0.3);padding:0.6rem 1rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-primary:hover{background:rgba(141,246,255,0.15);border-color:rgba(141,246,255,0.5)}
.handoff-secondary{font-family:monospace;font-size:0.65rem;color:rgba(255,255,255,0.5);background:none;border:1px solid rgba(255,255,255,0.1);padding:0.5rem 0.8rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-secondary:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)}

/* Follow-up chips */
.follow-up-chips{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem}
.chip{font-family:monospace;font-size:0.65rem;color:rgba(141,246,255,1);background:none;border:1px solid rgba(141,246,255,0.2);padding:0.4rem 0.8rem;border-radius:12px;cursor:pointer;transition:all 0.3s;min-height:36px}
.chip:hover{color:#8df6ff;border-color:rgba(141,246,255,0.5);box-shadow:0 0 12px rgba(141,246,255,0.1)}

/* footer links removed — github link is the install button */

/* Mobile fixes */

  .app{padding-top:0}
  .chat-area{padding:0.5rem;flex:1 1 0%;overflow-y:auto}

/* Streaming cursor */
.stream-cursor{display:inline-block;width:2px;height:1em;background:#8df6ff;margin-left:2px;animation:blink 0.8s step-end infinite;vertical-align:text-bottom}

.skip-link:focus{top:0}

/* toast removed */

@property --blob1-x{syntax:'<percentage>';inherits:false;initial-value:30%}

<a class="skip-link" href="#main-content">Skip to content</a>
<canvas id="c" aria-hidden="true" role="presentation"></canvas>
<div class="dim-overlay" id="dimOverlay"></div>

<!-- A11y live regions -->
<div role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="AI model download progress" class="sr-only" id="model-progress"></div>
<div aria-live="polite" id="progress-announcer" class="sr-only"></div>
<div aria-live="assertive" id="state-announcer" class="sr-only"></div>
<div aria-live="polite" id="compiler-announcer" class="sr-only"></div>

<div class="app" id="app">
  <header class="app-header">
    <a class="header-btn revealed" id="ctaInstall" href="https://github.com/grainulation/grainulator" target="_blank" rel="noopener" aria-label="View on GitHub"><img src="glitchy.png" alt="" width="28" height="28"><span class="btn-text">/plugin install grainulator</span></a>
    <button class="header-btn new-chat-btn" id="newChatBtn" type="button" aria-label="New chat"><span class="btn-text">new chat</span></button>
  </header>

  <main id="main-content" class="chat-area" role="log" aria-label="Research conversation">
    <!-- Messages render here -->
  </main>

  <div class="compile-bar" id="compileBar"><button class="compile-msg-btn" id="compileMsgBtn" type="button">compile findings</button></div>
  <div class="input-bar" id="inputBar">
    <input type="file" id="fileInput" accept=".txt,.md,.json,.csv" class="sr-only">
    <div class="input-wrap">
      <label for="chatInput" class="sr-only">Research question</label>
      <textarea
        class="chat-input"
        id="chatInput"
        rows="1"
        placeholder="Ask anything..."
        autocomplete="off"
        spellcheck="false"
        enterkeyhint="send"

// ===================================================================

// ===================================================================
// Rx7: MULTI-TURN EXPLORE — claim accumulation + turn tracking

window._nextClaimIndex = 1; // generates d001, d002, ...

window._compilationResult = null;

// Feature flag: ?cascade=on enables live model inference (off by default)

const CASCADE_OFF = !(new URLSearchParams(location.search).get('cascade') === 'on');

const c = document.getElementById('c');
const isMobileDevice = window.matchMedia('(max-width:768px)').matches || navigator.maxTouchPoints > 0;

if (gl && !document.body.classList.contains('webgl-fallback')) {

// Mobile detection
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;

// 8 blobs ALWAYS — one per product in the ecosystem
const NUM       = 8;
const STEPS     = isMobile ? 56   : 72;
const HIT_THRESH= isMobile ? '0.002' : '0.001';
const STEP_MULT = isMobile ? '0.85'  : '0.8';
const NORM_EPS  = isMobile ? '0.003' : '0.002';
const GLITCH_ON = isMobile ? 0       : 1;
const IS_MOBILE = isMobile ? 1       : 0;

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;
uniform float u_preloadProgress;

#define NUM ${NUM}
#define STEPS ${STEPS}
#define HIT_THRESH ${HIT_THRESH}
#define STEP_MULT ${STEP_MULT}
#define NORM_EPS ${NORM_EPS}
#define GLITCH_ON ${GLITCH_ON}
#define IS_MOBILE ${IS_MOBILE}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

float hash(float n) { return fract(sin(n) * 43758.5453); }

float g_nearestBlob = 0.0;

vec3 getNeonColor(float idx) {
  int i = int(mod(idx, 8.0));
  if (i == 0) return vec3(0.984, 0.749, 0.141);
  if (i == 1) return vec3(0.957, 0.247, 0.369);
  if (i == 2) return vec3(0.133, 0.773, 0.369);
  if (i == 3) return vec3(0.231, 0.510, 0.965);
  if (i == 4) return vec3(0.655, 0.545, 0.980);
  if (i == 5) return vec3(0.984, 0.573, 0.235);
  if (i == 6) return vec3(0.133, 0.827, 0.933);
  return vec3(0.612, 0.639, 0.686);
}

float map(vec3 p) {
  float d = 1e10;

  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float h1 = hash(fi * 412.531 + seed * 3.7);
    float h2 = hash(fi * 317.892 + seed * 5.1);
    float h3 = hash(fi * 253.147 + seed * 7.9);
    float h4 = hash(fi * 173.29 + seed * 2.1);

    float baseX = (h1 * 2.0 - 1.0) * 2.5;
    float baseY = (h2 * 2.0 - 1.0) * 2.5;
    float baseZ = (h4 - 0.5) * 0.3;

#if IS_MOBILE
    float sx = 0.06 + h1 * 0.08;
    float sy = 0.05 + h2 * 0.07;
    float sz = 0.04 + h3 * 0.06;
#else
    float sx = 0.03 + h1 * 0.04;
    float sy = 0.025 + h2 * 0.035;
    float sz = 0.02 + h3 * 0.03;
#endif
    float px = h2 * 6.28 + seed * 100.0;
    float py = h3 * 6.28 + seed * 100.0;
    float pz = h1 * 6.28 + seed * 100.0;

    float dx = sin(t*sx + px)*0.35 + sin(t*sx*0.37 + py + 1.7)*0.2;
    float dy = sin(t*sy + py + 0.5)*0.3 + cos(t*sy*0.43 + px + 2.1)*0.2;
    float dz = cos(t*sz + pz + 1.0)*0.15;

    vec3 blobPos = vec3(baseX + dx, baseY + dy, baseZ + dz);

    // Blob growth driven by preload progress
    float growFactor = 1.0 + u_preloadProgress * 0.6;

#if IS_MOBILE
    float blobR = (0.8 + h4 * 1.0) * growFactor;
#else
    float blobR = (0.20 + h4 * 0.30) * growFactor;
#endif

    vec3 evalP = p;

#if GLITCH_ON
    {
      float gw = sin(t*0.3 + fi*3.7) * sin(t*0.13 + fi*2.1);
      float burst = smoothstep(0.65, 0.9, gw);
      if (burst > 0.01) {
        vec3 toB = p - blobPos;
        float near = smoothstep(1.5, 0.1, length(toB));
        float amt = burst * near * 0.28;
        if (amt > 0.005) {
          float vs = mix(0.28, 0.10, fract(sin(fi*73.1 + floor(t*2.0))*438.5));
          vec3 snapped = floor(p/vs + 0.5) * vs;
          evalP = mix(p, snapped, amt);
        }
      }
    }
#endif

    vec3 localP = evalP - blobPos;
    float baseDist = length(localP) - blobR;
    float blobD = baseDist;
    if (baseDist < blobR * 1.5) {
      vec3 nc = localP * (2.5 + fi * 0.3) + t * 0.06 + fi * 7.0;
      float warp = sin(nc.x * 1.7 + nc.y * 1.3) * sin(nc.y * 2.1 + nc.z * 0.9);
      blobD = baseDist - warp * blobR * 0.35;
    }
    float k = 0.3 + 0.1 * sin(fi * 1.7 + t * 0.05);
    if (blobD < d) g_nearestBlob = fi;
    d = smin(d, blobD, k);
  }

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(NORM_EPS, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

  vec3 ro = vec3(0.0, 0.0, 3.8);
  vec3 fwd = vec3(0.0, 0.0, -1.0);
  vec3 rgt = vec3(1.0, 0.0, 0.0);
  vec3 up2 = vec3(0.0, 1.0, 0.0);
  vec3 rd = normalize(fwd * 1.2 + rgt * uv.x + up2 * uv.y);

  float dist = 0.0;
  float hit = -1.0;
  float lastH = 1.0;
  for (int i = 0; i < STEPS; i++) {
    vec3 p = ro + rd * dist;
    float h = map(p);
    lastH = h;
    if (h < HIT_THRESH) { hit = dist; break; }
    if (dist > 15.0) break;
    dist += h * STEP_MULT;
  }

  vec3 col = vec3(0.005, 0.004, 0.003);
  vec2 gridUV = gl_FragCoord.xy;
  float gridSize = 40.0;
  float lineW = 1.0;
  float gx = abs(mod(gridUV.x, gridSize) - gridSize * 0.5);
  float gy = abs(mod(gridUV.y, gridSize) - gridSize * 0.5);
  float gridLine = 1.0 - smoothstep(0.0, lineW, min(gx, gy));
  col += vec3(1.0) * gridLine * 0.035;
  vec3 bgCol = col;

  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    float NdotV = max(dot(n, -rd), 0.0);
    float fres = pow(1.0 - NdotV, 2.5);

    vec3 neon = getNeonColor(g_nearestBlob);

    vec3 waxCol = neon * mix(0.06, 0.18, fres * 0.5);
    float hemiAmt = 0.5 + 0.5 * n.y;
    vec3 hemiAmb = neon * mix(0.02, 0.05, hemiAmt);
    float sss = pow(max(dot(rd, n), 0.0), 2.0) * 0.15;
    col = waxCol + hemiAmb + neon * sss * 0.12;

    float fog = exp(-hit * 0.05);
    col = mix(vec3(0.006, 0.005, 0.003), col, fog);

    float edgeAA = smoothstep(HIT_THRESH, 0.0, lastH);
    col = mix(bgCol, col, edgeAA);

    float rimWide = pow(fres, 1.3);
    float rimTight = pow(fres, 2.0);
    float rimHot = pow(fres, 3.5);
    col += neon * rimWide * 0.35;
    col += neon * rimTight * 1.8;
    col += neon * rimHot * 1.2;
  }

  float vig = 1.0 - dot(uv * 0.55, uv * 0.55);
  col *= smoothstep(0.0, 0.5, vig);

  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + t) * 43758.5453);
  col += grain * 0.004 - 0.002;

  gl_FragColor = vec4(col, 1.0);
}
`;

const compileShader = (src, type) => {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
};

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');
const preloadLoc = gl.getUniformLocation(prog, 'u_preloadProgress');

gl.uniform1f(seedLoc, seedVal);

const dpr = isMobileDevice ? Math.min(devicePixelRatio, 1.5) : Math.min(devicePixelRatio, 2);

const resize = () => {

};
resize();

let lastInteraction = Date.now();
let paused = false;
let lastFrame = 0;
const wake = () => { lastInteraction = Date.now(); if (paused && !shaderPaused) { paused = false; shaderAnimId = requestAnimationFrame(render); } };
window._shaderWake = wake;
document.addEventListener('mousemove', wake);
document.addEventListener('touchstart', wake);
document.addEventListener('click', wake);

window._shaderRender = null; // hoisted reference
const FRAME_INTERVAL = isMobileDevice ? 66 : 33; // 15fps mobile, 30fps desktop
const render = (time) => {
  if (shaderPaused) return;
  if (Date.now() - lastInteraction > 15000) { paused = true; return; }
  if (time - lastFrame < FRAME_INTERVAL) { shaderAnimId = requestAnimationFrame(render); return; }
  lastFrame = time;
  gl.uniform1f(tLoc, time * 0.001);
  gl.uniform2f(rLoc, c.width, c.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  shaderAnimId = requestAnimationFrame(render);
};
shaderAnimId = requestAnimationFrame(render);
window._shaderRender = render;

// Lava bloom — fade canvas in. Input blooms when model ready (not on timer).
setTimeout(function() { c.classList.add('active'); }, 100);

// Expose preload uniform setter
window._setPreloadProgress = (v) => {
  gl.useProgram(prog);
  gl.uniform1f(preloadLoc, Math.min(1.0, Math.max(0.0, v)));
};

}

// ===================================================================
// A11Y: ANNOUNCEMENTS + PROGRESS

const MILESTONES = [25, 50, 75, 100];
let lastMilestone = 0;

function updateModelProgress(pct) {
  const bar = document.getElementById('model-progress');
  if (bar) bar.setAttribute('aria-valuenow', String(Math.round(pct)));
}

function announceProgress(pct) {
  const milestone = MILESTONES.find(m => pct >= m && m > lastMilestone);
  if (milestone) {
    lastMilestone = milestone;
    document.getElementById('progress-announcer').textContent =
      milestone === 100 ? 'Model download complete.' : `Model download ${milestone}% complete.`;

// A11y: flash rate limiting
const FLASH_MIN_INTERVAL = 500;
let lastFlashTime = 0;
function compilerFlash() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const now = performance.now();
  if (now - lastFlashTime < FLASH_MIN_INTERVAL) return;
  lastFlashTime = now;

  overlay.style.opacity = '1';

function pauseShader() {
  if (shaderAnimId) { cancelAnimationFrame(shaderAnimId); shaderAnimId = null; }

function addMessage(type, content, safe) {

// Extract structured claims from natural language using keyword heuristics
function extractClaimsFromText(text, question) {
  var sentences = text.split(/[.!?]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 20; });
  var claims = [];
  var seen = new Set();

  sentences.forEach(function(s) {
    var lower = s.toLowerCase();
    var type = null;

    if (/\brisk|danger|fail|vulnerab|threat|downside|concern|careful/i.test(s)) type = 'risk';
    else if (/\bshould|recommend|suggest|consider|best practice|advise|opt for/i.test(s)) type = 'recommendation';
    else if (/\brequir|must|need to|constraint|cannot|limitation|restrict/i.test(s)) type = 'constraint';
    else if (/\bestimate|approx|typically|around \d|usually takes|\d+[-–]\d+\s*(week|month|day|hour)/i.test(s)) type = 'estimate';
    else if (s.length > 30) type = 'factual';

    if (type && !seen.has(lower.substring(0, 40))) {
      seen.add(lower.substring(0, 40));
      claims.push({ type: type, text: s + '.' });
    }
  });

  return claims.slice(0, 6);
}

function showWelcomeChips() {
  addMessage('ai', 'What are you exploring? Ask any complex question — I\'ll gather evidence, flag risks, and grade confidence.<br><br>Try something like:<br>• <em>How do we make our product accessible without delaying the launch?</em><br>• <em>What\'s the right code review process for a growing team?</em><br>• <em>Should our remote team switch to async-first standups?</em>');
}

// Generate contextual next-step chips using mini compiler analysis
function generateNextStepChips(aiMsg) {
  document.querySelectorAll('.msg .follow-up-chips').forEach(function(el) { el.remove(); });

  var claims = window._allClaims || [];
  if (claims.length < 3) return;

  // Mini compiler: analyze what's actually missing
  var types = {};
  var tiers = {};
  var topics = {};
  claims.forEach(function(c) {
    types[c.type] = (types[c.type] || 0) + 1;
    tiers[c.tier || 'stated'] = (tiers[c.tier || 'stated'] || 0) + 1;
    if (c.topic) topics[c.topic] = (topics[c.topic] || 0) + 1;
  });
  var typeKeys = Object.keys(types);
  var hasRisk = !!types.risk;
  var hasRec = !!types.recommendation;
  var hasConstraint = !!types.constraint;
  var hasEstimate = !!types.estimate;
  var monoculture = typeKeys.length <= 2;
  var weakEvidence = !tiers.tested && !tiers.documented && !tiers.production;
  var lastQuestion = window._conversationHistory.length > 0 ? window._conversationHistory[0].question : '';
  var topicWord = lastQuestion.split(' ').filter(function(w) { return w.length > 4; })[0] || 'this';

  var suggestions = [];

  // Only suggest what's actually missing — max 2 chips
  if (!hasRisk && claims.length >= 3) {
    suggestions.push('what risks are we missing on ' + topicWord + '?');
  }
  if (monoculture && hasRec && !hasConstraint) {
    suggestions.push('what constraints limit ' + topicWord + '?');
  }
  if (hasRec && claims.length >= 4 && !window._challengedIds?.size) {
    suggestions.push('challenge the strongest recommendation');
  }
  if (typeKeys.length >= 3 && claims.length >= 6 && weakEvidence) {
    suggestions.push('any blind spots in our evidence?');
  }
  if (!hasEstimate && claims.length >= 5) {
    suggestions.push('what would this cost or take?');
  }

  if (suggestions.length === 0) return;
  suggestions = suggestions.slice(0, 2);

  var container = document.createElement('div');
  container.className = 'follow-up-chips';
  suggestions.forEach(function(text) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = text;
    btn.addEventListener('click', function() {
      chatInput.value = text;
      sendBtn.classList.add('active');
      chatInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
    });
    container.appendChild(btn);
  });
  aiMsg.appendChild(container);
}

function synthesizeSummary(claims, question) {
  if (!claims || claims.length === 0) return 'No claims found for this query.';
  const risks = claims.filter(function(c) { return c.type === 'risk'; });
  const recs = claims.filter(function(c) { return c.type === 'recommendation'; });
  const facts = claims.filter(function(c) { return c.type === 'factual'; });
  const constraints = claims.filter(function(c) { return c.type === 'constraint'; });

  var summary = 'Based on ' + claims.length + ' findings';
  if (question) summary += ' about <strong>' + escapeHtml(question) + '</strong>';
  summary += ':<br><br>';

  if (constraints.length > 0) summary += constraints[0].text + '<br><br>';

// ===================================================================
// IN-BROWSER COMPILER — 7-pass pipeline
// ===================================================================
const COMPILER_PASSES = [
  { name: 'parse claims', fn: (claims) => ({ parsed: claims.length, ok: true }) },
  { name: 'type distribution', fn: (claims) => {
    const types = {};
    claims.forEach(c => types[c.type] = (types[c.type] || 0) + 1);
    const total = claims.length;
    const dominant = Object.entries(types).sort((a,b) => b[1]-a[1])[0];
    const monoculture = dominant && (dominant[1] / total) > 0.6;
    return { types, monoculture, monocultureType: monoculture ? dominant[0] : null, ok: true };
  }},
  { name: 'evidence strength', fn: (claims) => {
    const tierWeight = { stated: 1, web: 2, documented: 3, tested: 4, production: 5 };
    const avg = claims.reduce((s,c) => s + (tierWeight[c.tier]||1), 0) / claims.length;
    return { avgStrength: avg.toFixed(1), weak: avg < 2.5, ok: true };
  }},
  { name: 'tension detection', fn: (claims) => {
    // Generalized: find claims with opposing sentiment about similar topics
    const tensions = [];
    for (let i = 0; i < claims.length; i++) {
      for (let j = i+1; j < claims.length; j++) {
        const a = claims[i], b = claims[j];
        // Heuristic: risk vs recommendation, or constraint vs estimate on overlapping words
        const opposing = (a.type === 'risk' && b.type === 'recommendation') ||
                         (a.type === 'recommendation' && b.type === 'risk') ||
                         (a.type === 'constraint' && b.type === 'estimate');
        if (opposing) {
          const wordsA = new Set(a.text.toLowerCase().split(/\W+/).filter(w => w.length > 4));
          const wordsB = new Set(b.text.toLowerCase().split(/\W+/).filter(w => w.length > 4));
          const overlap = [...wordsA].filter(w => wordsB.has(w));
          if (overlap.length >= 2) {
            tensions.push({ pair: [a.id, b.id], overlap: overlap.slice(0, 3) });
          }
        }
      }
    }
    return { tensions, count: tensions.length, ok: true };
  }},
  { name: 'coverage check', fn: (claims) => {
    const requiredTypes = ['constraint', 'factual', 'risk', 'recommendation'];
    const present = new Set(claims.map(c => c.type));
    const missing = requiredTypes.filter(t => !present.has(t));
    return { missing, complete: missing.length === 0, ok: true };
  }},
  { name: 'confidence score', fn: (claims, prev) => {
    let score = 70;
    if (prev[1].monoculture) score -= 15;
    if (prev[2].weak) score -= 10;
    if (prev[3].count > 0) score -= 5 * prev[3].count;
    if (!prev[4].complete) score -= 10;
    score = Math.max(10, Math.min(100, score));
    return { score, ok: score >= 40 };
  }},
  { name: 'generate verdict', fn: (claims, prev) => {
    const score = prev[5].score;
    let verdict;
    if (score >= 80) verdict = 'High confidence. Research is well-balanced with strong evidence.';
    else if (score >= 60) verdict = 'Moderate confidence. Some gaps remain — consider additional research passes.';
    else if (score >= 40) verdict = 'Low confidence. Significant gaps or tensions detected. More evidence needed.';
    else verdict = 'Insufficient. Claims lack diversity or evidence strength for a reliable brief.';
    return { verdict, score, tensions: prev[3].tensions, missing: prev[4].missing, ok: true };
  }}
];

async function runCompile() {
  window._trackEvent?.('compile_run');

async function detectTier() {
  if (!navigator.gpu) return 'minimal';
  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) return 'minimal';
    const maxBuf = adapter.limits?.maxBufferSize || Infinity;
    if (maxBuf < 256 * 1024 * 1024) return 'reduced-gpu';
    return 'full';
  } catch { return 'minimal'; }
}

async function loadModel(modelId) {
  if (window._modelLoading && window._activeModelId === modelId) return;
  if (window._modelAbort) { window._modelAbort.abort(); }
  await new Promise(function(r) { setTimeout(r, 50); });
  window._modelAbort = new AbortController();
  window._modelReady = false;
  if (window._modelWorker) { window._modelWorker.terminate(); window._modelWorker = null; }
  window._modelEngine = null;
  window._activeModelId = modelId;
  window._modelLoading = true;

  try {
    var { CreateWebWorkerMLCEngine } = await import('https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/+esm');
    if (window._modelAbort.signal.aborted) throw new Error('Cancelled');

    var worker = new Worker('/llm-worker.js', { type: 'module' });
    window._modelWorker = worker;
    var engine = await CreateWebWorkerMLCEngine(worker, modelId, {
      initProgressCallback: function(report) {
        if (window._modelAbort.signal.aborted) { worker.terminate(); throw new Error('Cancelled'); }
      }
    });

    if (window._modelAbort.signal.aborted) throw new Error('Cancelled');
    window._modelEngine = engine;
    window._modelReady = true;
    window._modelLoading = false;
    console.log('WebLLM ready:', modelId);

  } catch (err) {
    console.warn('WebLLM load:', err.message);
    window._modelLoading = false;
  }
}

function isFollowUp(question) {
  var lower = question.toLowerCase().trim();
  // Explicit follow-up patterns (any turn)
  if (/^(yes|no|yeah|nah|ok|sure|right|exactly|agreed|makes sense)\b/i.test(lower)) return true;
  if (/^(we are|we do|we have|we\'re|that\'s|this is|doing that|already)\b/i.test(lower)) return true;
  // Wheat-style commands — but NOT challenge (that needs special handling)
  if (/^(any blind|what are the risk|what about|how about|can we|dig deeper|witness)/i.test(lower)) return true;
  // Short messages are follow-ups ONLY if they have fewer than 3 significant words
  if (lower.length < 40 && window._turnCount > 0 && significantWords(question).length < 3) return true;
  return false;
}

function generateFollowUpResponse(question) {
  var prevClaims = window._allClaims;
  var risks = prevClaims.filter(function(c) { return c.type === 'risk'; });
  var recs = prevClaims.filter(function(c) { return c.type === 'recommendation'; });
  var constraints = prevClaims.filter(function(c) { return c.type === 'constraint'; });
  var lastQ = window._conversationHistory.length > 0 ? window._conversationHistory[window._conversationHistory.length - 1].question : '';

  var lower = question.toLowerCase();
  var text = '';
  var claims = [];

  if (/blindspot|gap|missing|blind[- ]spot|what else/i.test(lower)) {
    var blindSpotAngles = [
      { text: 'What happens if this fails? Is there a rollback plan? Most teams skip this until it\'s too late.', claim: { type: 'risk', text: 'No rollback plan has been discussed — if the pilot fails, the path back needs to be defined.' } },
      { text: 'Who are the stakeholders who haven\'t weighed in yet? Decisions made without buy-in get relitigated later.', claim: { type: 'constraint', text: 'Stakeholder buy-in beyond the directly involved teams has not been validated.' } },
      { text: 'What\'s the second-order effect? If this succeeds, what new problems does it create?', claim: { type: 'risk', text: 'Success may introduce new complexity — second-order effects have not been mapped.' } },
      { text: 'Are we optimizing for the right time horizon? What looks good for Q1 might hurt in Q4.', claim: { type: 'constraint', text: 'The evaluation time horizon is unclear — short-term wins may conflict with long-term goals.' } },
      { text: 'What would a skeptic say? If someone opposed this, what would their strongest argument be?', claim: { type: 'risk', text: 'The strongest counter-argument has not been articulated or addressed.' } },
    ];
    var bsAngle = blindSpotAngles[window._turnCount % blindSpotAngles.length];
    var firstQ = window._conversationHistory.length > 0 ? window._conversationHistory[0].question : '';
    text = 'Looking at the ' + prevClaims.length + ' claims';
    if (firstQ) text += ' about <em>' + escapeHtml(firstQ.substring(0, 60)) + '</em>';
    text += ':';
    if (risks.length === 0) text += '<br><br>We haven\'t identified any risks yet — that\'s a significant gap.';
    if (constraints.length === 0) text += '<br><br>No constraints captured — what are the hard boundaries?';
    text += '<br><br>' + bsAngle.text;
    claims = [bsAngle.claim];
  } else if (/witness|verify|evidence|prove|check/i.test(lower)) {
    text = 'To strengthen the evidence, we\'d want to look at:';
    text += '<br><br>1. Case studies from teams of similar size who made this change';
    text += '<br>2. Metrics from the pilot teams — what are they actually measuring?';
    text += '<br>3. Feedback from the 8 teams NOT in the pilot — are they bought in or resistant?';
    claims = [
      { type: 'recommendation', text: 'Collect quantitative metrics from pilot teams before expanding — anecdotal feedback is insufficient for org-wide decisions.' },
      { type: 'risk', text: 'Selection bias in pilot teams (volunteers vs assigned) may not represent how the remaining teams will respond.' }
    ];
  } else if (/we are|we do|we have|we\'re|doing that|already/i.test(lower)) {
    text = 'Good — that\'s noted. Building on what you\'ve shared so far:';
    if (recs.length > 0) text += '<br><br>Given that context, the recommendation to <em>' + escapeHtml(recs[recs.length-1].text.toLowerCase().substring(0, 80)) + '</em> seems aligned with your approach.';
    text += '<br><br>The key question now is: what\'s your success criteria? How will you know when it\'s time to expand from 2 teams to the next batch?';
    claims = [
      { type: 'constraint', text: 'Success criteria for the pilot phase need to be defined before expansion decisions are made.' },
      { type: 'recommendation', text: 'Define a clear go/no-go checklist for scaling from pilot to broader rollout.' }
    ];
  } else {
    // Generic follow-up — reference compile state if we just compiled
    var firstQ = window._conversationHistory.length > 0 ? window._conversationHistory[0].question : '';
    var compResult = window._compilationResult;
    text = 'Building on that';
    if (firstQ) text += ' — your original question was about <em>' + escapeHtml(firstQ.substring(0, 80)) + '</em>';
    text += '.';

    if (compResult && compResult.missing && compResult.missing.length > 0) {
      // Post-compile: guide user to fill gaps
      text += '<br><br>The last compile flagged missing claim types: <strong>' + compResult.missing.join(', ') + '</strong>. Let\'s fill those gaps.';
      if (compResult.missing.indexOf('risk') !== -1) {
        text += '<br><br>What could go wrong with this approach? What are the failure modes?';
        claims = [{ type: 'risk', text: 'Failure modes and rollback scenarios have not been explored for ' + (firstQ || 'this decision') + '.' }];
      } else {
        text += '<br><br>Try asking about ' + compResult.missing[0] + 's specifically.';
        claims = [];
      }
    } else {
      text += '<br><br>So far we have ' + prevClaims.length + ' claims.';
      if (risks.length > 0) text += ' We\'ve flagged ' + risks.length + ' risk' + (risks.length > 1 ? 's' : '') + '.';
      if (recs.length > 0) text += ' ' + recs.length + ' recommendation' + (recs.length > 1 ? 's' : '') + '.';
      text += '<br><br>To go deeper, try asking about costs, timeline, team impact, or alternatives.';

    }

  return { text: text, claims: claims };
}

function isOffTopic(q) {
  var lower = q.toLowerCase().trim();
  if (lower.length < 2) return true; // single char
  if (/^(hi|hey|hello|sup|yo|howdy|greetings|help|thanks|thank you|bye)\b/i.test(lower)) return true;
  if (/^(what is this|who are you|help me|can you help|write me|make me|how do i use|tell me about yourself)/i.test(lower)) return true;
  if (/^(what is \d|how much is|calculate|math|joke|poem|story|sing|draw)/i.test(lower)) return true;
  if (/^(can you access|can you read|can you see|can you delete|what files)/i.test(lower)) return true;
  if (/\bmy \d+ year old\b|\bmy kid\b|\bmy child\b|\bfor kids\b|\bfor beginners\b/i.test(lower)) return true;
  if (/\breplace (software |)engineers\b|\breplace (developers|programmers)\b/i.test(lower)) return true;
  if (/<[^>]+>/.test(q)) return true; // HTML/XSS
  if (/^(ignore|forget|disregard|override|bypass)/i.test(lower)) return true; // prompt injection
  if (!/[a-zA-Z]{3,}/.test(q)) return true; // no real words (emoji, symbols only)
  // Single word without ? — not a question, redirect
  if (lower.split(/\s+/).length === 1 && !/\?$/.test(lower)) return true;
  return false;
}

function isSlashCommand(q) {
  return /^\/(research|challenge|blind-spot|witness|brief|status|resolve|feedback)\b/i.test(q.trim());
}

function handleOffTopic(question) {
  removeThinking();

function handleSlashCommand(question) {
  var match = question.match(/^\/(\w[\w-]*)\s*(.*)/);
  if (!match) return false;
  var cmd = match[1].toLowerCase();
  var arg = match[2].trim();

  if (cmd === 'blind-spot' || cmd === 'blindspot') {
    // Route to blind-spot handler
    removeThinking();
    var followUp = generateFollowUpResponse('/blind-spot');
    var aiMsg = addMessage('ai', followUp.text);
    var claims = followUp.claims.map(function(c) {
      var idx = window._nextClaimIndex++;
      return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: 'stated', text: c.text };
    });
    window._allClaims = window._allClaims.concat(claims);
    window._turnCount++;
    window._liveClaims = window._allClaims;
    if (claims.length > 0) aiMsg.appendChild(renderClaimsToggle(claims));
    generateNextStepChips(aiMsg);
    showCompileButton();
    saveSession();
    autoScroll();
    return true;
  }

  if (cmd === 'challenge') {
    removeThinking();
    // Cycle through unchallenged claims (recs first, then factuals, then constraints)
    window._challengedIds = window._challengedIds || {};
    var challengeable = window._allClaims.filter(function(c) {
      return !window._challengedIds[c.id] && (c.type === 'recommendation' || c.type === 'factual' || c.type === 'constraint');
    });
    if (challengeable.length === 0) {
      // Reset and cycle again
      window._challengedIds = {};
      challengeable = window._allClaims.filter(function(c) { return c.type === 'recommendation' || c.type === 'factual'; });
    }
    var target = challengeable.length > 0 ? challengeable[0] : null;
    if (target) window._challengedIds[target.id] = true;
    var prompts = [
      'What if the opposite is true? What evidence would disprove this?',
      'Who benefits from this claim, and who bears the risk if it\'s wrong?',
      'Under what conditions does this break down? What are the edge cases?',
      'Is this based on current data, or could it be outdated?'
    ];
    var prompt = prompts[Math.floor(Math.random() * prompts.length)];
    var text = target
      ? 'Challenging <em>' + escapeHtml(target.text.substring(0, 100)) + '</em>...<br><br>' + prompt
      : 'All claims have been challenged. Try adding more evidence or run a blind-spot analysis.';
    var aiMsg2 = addMessage('ai', text);
    if (target) {
      var claims2 = [{ id: 'd' + String(window._nextClaimIndex++).padStart(3, '0'), type: 'risk', tier: 'stated', text: 'The recommendation may not hold under different team size, timeline, or resource constraints.' }];
      window._allClaims = window._allClaims.concat(claims2);
      window._turnCount++;
      window._liveClaims = window._allClaims;
      aiMsg2.appendChild(renderClaimsToggle(claims2));
    }
    generateNextStepChips(aiMsg2);
    showCompileButton();
    saveSession();
    autoScroll();
    return true;
  }

  // For /research, strip the prefix and treat as a normal question
  if (cmd === 'research' && arg) {
    return false; // let it fall through to normal cascade with arg as question
  }

  return false;
}

    var claims3 = response.claims.map(function(c) {
      var idx = window._nextClaimIndex++;
      return { id: 'd' + String(idx).padStart(3, '0'), type: c.type, tier: 'stated', text: c.text };
    });
    window._allClaims = window._allClaims.concat(claims3);
    window._turnCount++;
    window._conversationHistory.push({ turn: window._turnCount, question: question, source: 'template' });
    window._liveClaims = window._allClaims;
    if (claims3.length > 0) aiMsg3.appendChild(renderClaimsToggle(claims3));
    generateNextStepChips(aiMsg3);
    showCompileButton();
    saveSession();
    autoScroll();
  }
}

function generateConversationalIntro(claims, question) {
  var risks = claims.filter(function(c) { return c.type === 'risk'; });
  var recs = claims.filter(function(c) { return c.type === 'recommendation'; });
  var facts = claims.filter(function(c) { return c.type === 'factual'; });

  var parts = [];
  if (facts.length > 0) parts.push(escapeHtml(facts[0].text));
  if (facts.length > 1) parts.push(escapeHtml(facts[1].text));
  if (risks.length > 0) parts.push('One thing to watch out for: ' + escapeHtml(risks[0].text).toLowerCase());
  if (recs.length > 0) parts.push(escapeHtml(recs[0].text));
  return parts.join('<br><br>') || 'Here\'s what I found on that topic.';
}

function generateConversationalFallback(question) {
  var q = escapeHtml(question);
  var templates = [
    {
      text: 'There are a few angles to consider with <em>' + q + '</em>.<br><br>The trade-offs depend on your team size, existing infrastructure, and how much migration cost you can absorb. Most teams that navigate this well start with a bounded pilot before committing fully.',
      claims: [
        { type: 'constraint', text: 'The right approach depends on team context, existing infrastructure, and acceptable migration cost.' },
        { type: 'recommendation', text: 'Start with a bounded pilot to validate assumptions before full commitment.' },
        { type: 'risk', text: 'Moving too fast without a pilot risks partial adoption that creates more problems than it solves.' }
      ]
    },
    {
      text: 'This comes down to a few key trade-offs.<br><br>For <em>' + q + '</em>, the main tension is usually between what\'s technically ideal and what your team can actually execute on your timeline. The best choice is rarely the most sophisticated one — it\'s the one that fits.',
      claims: [
        { type: 'factual', text: 'The best solution is usually the one that fits the team\'s capacity and timeline, not the most technically elegant.' },
        { type: 'recommendation', text: 'Be explicit about what you\'re optimizing for — speed, reliability, cost, or developer experience.' },
        { type: 'risk', text: 'Optimizing for everything at once often means optimizing for nothing.' }
      ]
    },
    {
      text: 'Let me think through this.<br><br>With <em>' + q + '</em>, the conventional wisdom doesn\'t always hold up. What matters most is understanding your specific constraints — what\'s non-negotiable, what\'s flexible, and where the real risks are.',
      claims: [
        { type: 'constraint', text: 'Conventional wisdom may not apply — validate against your specific constraints.' },
        { type: 'recommendation', text: 'Identify what\'s non-negotiable vs. flexible before evaluating options.' },
        { type: 'factual', text: 'Practical outcomes correlate more with constraint awareness than with choosing the "best" technology.' }
      ]
    }
  ];

  return templates[Math.floor(Math.random() * templates.length)];
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});

// ===================================================================
// PWA STANDALONE MODE DETECTION
// ===================================================================
(function initPWAMode() {
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isPWA) {
    document.documentElement.classList.add('pwa-standalone');
    window._trackEvent?.('pwa_standalone');
  }
})();

// ===================================================================
// Offline — silent, no toast (Track A works without network after first cache)
window._onWebLLMOffline = function() {};

// Zero-dep local analytics — IndexedDB event log
(function initLocalAnalytics() {
  const DB_NAME = 'grainulator-analytics';
  const STORE = 'events';
  let db = null;
  const open = indexedDB.open(DB_NAME, 1);
  open.onupgradeneeded = () => { open.result.createObjectStore(STORE, { autoIncrement: true }); };
  open.onsuccess = () => { db = open.result; };
  window._trackEvent = function(name, data) {
    if (!db) return;
    try {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).add({ event: name, data: data || {}, ts: Date.now() });
    } catch(e) {}
  };
  // Track page view
  window._trackEvent('page_view', { referrer: document.referrer, tier: document.documentElement.getAttribute('data-tier') });
})();

// ===================================================================
// iOS KEYBOARD — adjust layout when virtual keyboard opens
// ===================================================================
if (window.visualViewport) {
  let pendingVV = null;
  window.visualViewport.addEventListener('resize', () => {
    if (pendingVV) cancelAnimationFrame(pendingVV);
    pendingVV = requestAnimationFrame(() => {
      const offset = window.innerHeight - window.visualViewport.height;
      document.documentElement.style.setProperty('--kb-offset', Math.max(0, offset) + 'px');
      // Shrink app to visual viewport height when keyboard is open
      const appEl = document.getElementById('app');
      if (offset > 50) {
        appEl.style.height = window.visualViewport.height + 'px';
      } else {
        appEl.style.height = '';
      }
      autoScroll();
    });
  });
}

// Reduced motion: pause shader at start
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  motionTogglePaused = true;
  pauseShader();
}

// Page Visibility API pause
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { pauseShader(); }
  else if (!motionTogglePaused) { resumeShader(); }
});

// Hash-based question loading (input-first — #q= prefills, #demo scrolls to input)
(function loadFromHash() {
  const hash = location.hash;
  if (hash.startsWith('#q=')) {
    const q = decodeURIComponent(hash.slice(3));
    if (q) {
      window._queuedQuestion = q;
      chatInput.value = q;
      sendBtn.classList.add('active');
    }
  } else if (hash === '#demo') {
    setTimeout(function() { chatInput.scrollIntoView({ block: 'center', behavior: 'smooth' }); }, 500);
    history.replaceState(null, '', '/');
  }
})();

// Easter egg (respects reduced-motion)
let kb = '';
document.addEventListener('keydown', (e) => {
  kb = (kb + e.key.toLowerCase()).slice(-10);
  if (kb.includes('grain')) {
    kb = '';
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    document.body.style.transition = 'filter 0.2s';
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    setTimeout(() => { document.body.style.filter = 'none'; }, 400);
  }
});

// DEBUG: ?debug=cascade panel

const CASCADE_DEBUG = new URLSearchParams(location.search).get('debug') === 'cascade';

function updateCascadeDebug(opts) {
  if (!CASCADE_DEBUG) return;
  let panel = document.getElementById('cascade-debug');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'cascade-debug';
    panel.style.cssText = 'position:fixed;top:8px;right:8px;z-index:9999;background:rgba(0,0,0,0.85);border:1px solid rgba(141,246,255,0.3);border-radius:6px;padding:0.6rem 0.8rem;font-family:monospace;font-size:0.6rem;color:rgba(141,246,255,0.8);max-width:260px;pointer-events:none;';
    document.body.appendChild(panel);
  }
  const lines = [];
  lines.push('cascade layer: ' + (opts.cascadeLayer || '?'));
  if (opts.score !== null && opts.score !== undefined) lines.push('fuzzy score: ' + opts.score.toFixed(3));
  lines.push('timing: ' + (opts.timing || 0).toFixed(1) + 'ms');
  if (opts.isTemplate) lines.push('(template fallback)');

// Model ready watcher — update input placeholder
(function watchModelReady() {
  let _val = window._modelReady;
  Object.defineProperty(window, '_modelReady', {
    get() { return _val; },
    set(v) {
      _val = v;
      if (v) {
        var m = MODELS.find(function(x) { return x.id === window._activeModelId; });
        chatInput.placeholder = 'Ask anything...';
      }
    },
    configurable: true,
    enumerable: true
  });
})();

// ===================================================================
// SELF-TEST PANEL — ?test=true or ~ key
// ===================================================================
(function initSelfTest() {
  var active = new URLSearchParams(location.search).get('test') === 'true';
  document.addEventListener('keydown', function(e) {
    if (e.key === '`' && e.ctrlKey) { toggleTestPanel(); }
  });
  if (active) setTimeout(toggleTestPanel, 2000);

  var panel = null;
  var results = [];

  function toggleTestPanel() {
    if (panel) { panel.remove(); panel = null; return; }
    panel = document.createElement('div');
    panel.id = 'test-panel';
    panel.style.cssText = 'position:fixed;top:0;right:0;bottom:0;width:min(400px,90vw);z-index:9999;background:rgba(6,13,16,0.97);border-left:1px solid rgba(141,246,255,0.2);overflow-y:auto;font-family:monospace;font-size:0.65rem;color:rgba(255,255,255,0.8);padding:1rem;display:flex;flex-direction:column;gap:0.5rem';
    panel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem"><strong style="color:#8df6ff">QA Test Panel</strong><button id="test-close" style="background:none;border:none;color:#f43f5e;cursor:pointer;font-size:0.8rem">✕</button></div><button id="test-run-all" style="background:rgba(141,246,255,0.08);border:1px solid rgba(141,246,255,0.2);color:#8df6ff;padding:0.4rem;border-radius:3px;cursor:pointer;font-family:inherit;font-size:0.6rem">Run all tests</button><div id="test-results" style="flex:1;overflow-y:auto"></div>';
    document.body.appendChild(panel);
    document.getElementById('test-close').onclick = toggleTestPanel;
    document.getElementById('test-run-all').onclick = runAllTests;
    if (active) setTimeout(runAllTests, 500);
  }

  function log(msg, type) {
    var el = document.getElementById('test-results');
    if (!el) return;
    var line = document.createElement('div');
    line.style.cssText = 'padding:0.2rem 0;border-bottom:1px solid rgba(255,255,255,0.04)';
    var prefix = type === 'pass' ? '<span style="color:#22c55e">✓</span> ' : type === 'fail' ? '<span style="color:#f43f5e">✗</span> ' : type === 'info' ? '<span style="color:#8df6ff">→</span> ' : '';
    line.innerHTML = prefix + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
    results.push({ msg: msg, type: type, ts: Date.now() });
  }

  function simulateSend(text) {
    var input = document.getElementById('chatInput');
    var nativeSet = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value').set;
    nativeSet.call(input, text);
    input.dispatchEvent(new Event('input', { bubbles: true }));
    input.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
  }

  function getLastAiResponse() {
    var msgs = document.querySelectorAll('.msg-ai');
    if (msgs.length === 0) return '';
    return msgs[msgs.length - 1].textContent.substring(0, 200);
  }

  function waitFor(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function clickNewChat() {
    // Suppress confirm dialog during tests
    var origConfirm = window.confirm;
    window.confirm = function() { return true; };
    document.getElementById('newChatBtn').click();
    window.confirm = origConfirm;
  }

  async function runTest(name, steps) {
    log('<strong>' + name + '</strong>', 'info');
    clickNewChat();
    await waitFor(500);

    for (var i = 0; i < steps.length; i++) {
      var step = steps[i];
      simulateSend(step.input);
      await waitFor(1500);

      var response = getLastAiResponse();
      var claims = window._allClaims ? window._allClaims.length : 0;

      // Run assertions
      if (step.expectContains) {
        var found = step.expectContains.some(function(s) { return response.toLowerCase().indexOf(s.toLowerCase()) !== -1; });
        if (found) {
          log('  "' + step.input.substring(0, 40) + '" → response contains expected text', 'pass');
        } else {
          log('  "' + step.input.substring(0, 40) + '" → expected [' + step.expectContains.join('|') + '] not found in: ' + response.substring(0, 80), 'fail');
        }
      }
      if (step.expectNotContains) {
        var bad = step.expectNotContains.some(function(s) { return response.toLowerCase().indexOf(s.toLowerCase()) !== -1; });
        if (!bad) {
          log('  no unwanted text in response', 'pass');
        } else {
          log('  response contains unwanted text: ' + response.substring(0, 80), 'fail');
        }
      }
      if (step.expectMinClaims != null) {
        if (claims >= step.expectMinClaims) {
          log('  claims: ' + claims + ' (min ' + step.expectMinClaims + ')', 'pass');
        } else {
          log('  claims: ' + claims + ' (expected min ' + step.expectMinClaims + ')', 'fail');
        }
      }
      // Log response snippet for review
      log('  <span style="color:rgba(255,255,255,0.4)">' + response.substring(0, 100) + '</span>');
    }
  }

  async function runAllTests() {
    results = [];
    var el = document.getElementById('test-results');
    if (el) el.innerHTML = '';
    log('Starting test suite...', 'info');
    var startTime = Date.now();

    // Test 1: Research question produces claims
    await runTest('Research question → claims', [
      { input: 'should we migrate from mysql to postgres?', expectMinClaims: 3, expectNotContains: ['I\'m a research sprint demo'] },
    ]);

    // Test 2: Off-topic gets scope explanation
    await runTest('Off-topic → scope explanation', [
      { input: 'hello', expectContains: ['research sprint demo', 'complex question'], expectNotContains: ['trade-offs', 'conventional wisdom'] },
    ]);

    // Test 3: Follow-up references context
    await runTest('Multi-turn context', [
      { input: 'should we adopt kubernetes?', expectMinClaims: 3 },
      { input: 'we have 5 teams', expectContains: ['noted', 'building on', 'context'] },
      { input: 'any blind spots?', expectContains: ['claims so far', 'claims'] },
    ]);

    // Test 4: Edge case doesn't crash
    await runTest('Edge cases', [
      { input: 'a', expectContains: ['research sprint demo'] },
      { input: '🔥🔥🔥', expectContains: ['research sprint demo'] },
    ]);

    // Test 5: Slash commands work
    await runTest('Slash commands', [
      { input: '/research api authentication', expectMinClaims: 3, expectNotContains: ['/research'] },
      { input: '/challenge', expectContains: ['challenging', 'opposite', 'disprove'] },
    ]);

    // Test 6: Compile bar appears (needs 5+ claims, 2+ types)
    await runTest('Compile bar visibility', [
      { input: 'should we use graphql or rest?', expectMinClaims: 3 },
      { input: 'what are the risks?', expectMinClaims: 4 },
      { input: 'dig deeper', expectMinClaims: 5 },
    ]);
    var compileVisible = document.querySelector('.compile-bar.visible');
    if (compileVisible) {
      log('Compile bar visible after 5+ claims with 2+ types', 'pass');
    } else {
      log('Compile bar NOT visible (need 5+ claims, 2+ types)', 'fail');
    }

    // Test 7: Chips don't accumulate
    await runTest('Chip accumulation check', [
      { input: 'should we build or buy our auth system?', expectMinClaims: 3 },
      { input: 'we tried building before and it failed', expectMinClaims: 4 },
      { input: 'what about cost?', expectMinClaims: 5 },
    ]);
    var allChipContainers = document.querySelectorAll('.msg .follow-up-chips');
    if (allChipContainers.length <= 1) {
      log('Only 1 chip container (no accumulation)', 'pass');
    } else {
      log('Found ' + allChipContainers.length + ' chip containers (accumulation bug)', 'fail');
    }

    // Test 8: Non-English
    await runTest('Non-English input', [
      { input: 'deberíamos usar kubernetes o docker swarm?', expectMinClaims: 3, expectNotContains: ['I\'m a research sprint demo'] },
    ]);

    // Summary
    var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    var passes = results.filter(function(r) { return r.type === 'pass'; }).length;
    var fails = results.filter(function(r) { return r.type === 'fail'; }).length;
    log('<strong>Done in ' + elapsed + 's — ' + passes + ' passed, ' + fails + ' failed</strong>', fails > 0 ? 'fail' : 'pass');

    // Expose results for console access
    window.__testResults = results;
  }

  window.__test = { run: runAllTests, toggle: toggleTestPanel };
})();
</script>
