<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden;background:transparent}
body{height:100%;overflow:hidden;background:#060d10;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Canvas — fades in after load */
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:0;transition:opacity 1.5s ease}
canvas.active{opacity:1}

/* Dim overlay — JS controls opacity for CHAT_ACTIVE / focus mode */
.dim-overlay{position:fixed;inset:0;z-index:1;background:#0c1a1e;opacity:0;transition:opacity 0.6s ease;pointer-events:none}

/* Top progress bar — model download */
.top-progress{position:fixed;top:0;left:0;right:0;height:4px;z-index:20;pointer-events:none;transition:opacity 0.4s ease}
.top-progress-fill{height:100%;width:0%;background:#8df6ff;transition:width 0.4s ease;opacity:0.8}

/* App shell — flexbox column, full viewport height, iOS safe */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;height:-webkit-fill-available;position:relative;z-index:10;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace}

/* Header — install left, new chat right */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.8rem;z-index:15;position:relative;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.04)}
.splash-hero{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;opacity:1;z-index:16;filter:drop-shadow(0 0 20px rgba(141,246,255,0.3));transition:opacity 0.8s ease;pointer-events:none}
.splash-hero.fade{opacity:0}
.header-btn{font-size:0.65rem;padding:0.35rem 0.7rem;min-height:32px;color:rgba(141,246,255,0.7);border:1px solid rgba(141,246,255,0.2);border-radius:4px;background:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:0.4rem;text-decoration:none;white-space:nowrap;transition:all 0.2s}
.header-btn:hover{border-color:rgba(141,246,255,0.4);color:#8df6ff}
.header-btn img{width:20px;height:20px;opacity:0.9}
.header-btn .btn-text{overflow:hidden;max-width:0;opacity:0;transition:max-width 0.4s ease,opacity 0.3s ease}
.header-btn.revealed .btn-text{max-width:300px;opacity:1}
.new-chat-btn{border-color:rgba(141,246,255,0.15);color:rgba(141,246,255,0.5)}
.new-chat-btn .btn-text{max-width:300px;opacity:1}

/* Chat area — hidden until CHAT_ACTIVE */
.chat-area{flex:1 1 0%;min-height:0;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.8rem;scroll-behavior:smooth;opacity:0;transition:opacity 0.4s ease}
.app.chat-active .chat-area{opacity:1}

/* Messages */
.msg{max-width:85%;border-radius:12px;padding:0.8rem 1rem;font-size:0.8rem;line-height:1.6;animation:msg-in 0.3s ease forwards;opacity:0}
@keyframes msg-in{to{opacity:1}}
.msg-user{align-self:flex-end;background:rgba(141,246,255,0.1);color:#fff;border:1px solid rgba(141,246,255,0.15)}
.msg-ai{align-self:flex-start;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.06)}
.msg-system{align-self:center;background:none;color:rgba(141,246,255,0.5);font-size:0.65rem;text-align:center;max-width:100%;padding:0.4rem}

/* Thinking dots */
.thinking-dots{display:flex;gap:4px;padding:0.5rem 0}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:rgba(141,246,255,0.4);animation:dot-pulse 1.4s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dot-pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1.2)}}

/* Claims toggle (2-level disclosure) */
.claims-toggle{font-size:0.7rem;color:rgba(141,246,255,0.6);background:none;border:1px solid rgba(141,246,255,0.12);border-radius:4px;min-height:36px;padding:0.4rem 0.8rem;cursor:pointer;margin-top:0.5rem;font-family:inherit;transition:all 0.2s}
.claims-toggle[aria-expanded="true"]{color:#8df6ff;border-color:rgba(141,246,255,0.3)}
.claims-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.3s ease}
.claims-panel.open{grid-template-rows:1fr}
.claims-panel-inner{overflow:hidden}
.claim-row{font-size:0.7rem;color:rgba(255,255,255,0.6);padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:0.5rem;align-items:baseline}
.claim-row .badge{font-size:0.55rem;padding:0.1rem 0.35rem;border-radius:2px;text-transform:uppercase;font-weight:700;flex-shrink:0}

/* Claim type badges */
.badge-constraint{background:rgba(244,63,94,0.15);color:#f43f5e}
.badge-factual{background:rgba(59,130,246,0.15);color:#3b82f6}
.badge-risk{background:rgba(251,191,36,0.15);color:#fbbf24}
.badge-recommendation{background:rgba(34,197,94,0.15);color:#22c55e}
.badge-estimate{background:rgba(167,139,250,0.15);color:#a78bfa}
.badge-feedback{background:rgba(156,163,175,0.15);color:#9ca3af}

/* Input bar — blooms up from bottom with spring animation */
.input-bar{position:fixed;bottom:0;left:0;right:0;z-index:15;display:flex;align-items:center;padding:0.5rem 0.5rem calc(0.5rem + env(safe-area-inset-bottom,0px) + var(--kb-offset, 0px));background:rgba(12,26,30,0.95);border-top:1px solid rgba(255,255,255,0.06);transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)}
.input-bar.visible{transform:translateY(0)}
.app.chat-active .compile-bar{position:relative;flex-shrink:0}
.app.chat-active .input-bar{position:relative;bottom:auto;left:auto;right:auto;z-index:auto;flex-shrink:0;padding-bottom:calc(0.5rem + env(safe-area-inset-bottom,0px))}
.input-wrap{position:relative;flex:1}
.chat-input{width:100%;font-family:inherit;font-size:max(1rem,16px);color:#fff;background:rgba(255,255,255,0.06);border:1px solid rgba(141,246,255,0.2);border-radius:4px;padding:0.7rem 3rem 0.7rem 1rem;outline:none;transition:border-color 0.3s;resize:none;overflow:hidden;min-height:44px;max-height:120px}
.chat-input:focus{border-color:rgba(141,246,255,0.5)}
.chat-input::placeholder{color:rgba(255,255,255,0.25)}
.send-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:none;border:none;color:#8df6ff;cursor:pointer;display:none;align-items:center;justify-content:center}
.send-btn.active{display:flex}
.send-btn:active{color:#fff}
.send-btn svg{width:20px;height:20px}

/* Model progress bar (system message style) */
.model-bar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:0.3rem;overflow:hidden}
.model-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(141,246,255,0.4),rgba(141,246,255,0.8));border-radius:2px;transition:width 0.4s ease}

/* Compile bar — sticky above input */
.compile-bar{display:none;padding:0.3rem 0.5rem;background:rgba(12,26,30,0.9);border-top:1px solid rgba(141,246,255,0.1);justify-content:center}
.compile-bar.visible{display:flex}
.compile-msg-btn{font-family:inherit;font-size:0.65rem;color:#8df6ff;background:rgba(141,246,255,0.06);border:1px solid rgba(141,246,255,0.15);padding:0.4rem 1rem;border-radius:3px;cursor:pointer;transition:all 0.2s;min-height:32px;width:100%}
.compile-msg-btn:hover{border-color:rgba(141,246,255,0.4)}
.compile-msg-btn:disabled{opacity:0.3;cursor:not-allowed}

/* Compiler pass lines in chat */
.pass-line{font-family:monospace;font-size:0.7rem;color:rgba(255,255,255,0.5);padding:0.3rem 0;opacity:0;transform:translateX(-8px);transition:all 0.3s ease}
.pass-line.done{opacity:1;transform:translateX(0)}
.pass-line .check{color:#8df6ff;margin-right:0.4rem}
.pass-line .fail{color:#f43f5e;margin-right:0.4rem}

/* Verdict */
.verdict-title{font-family:monospace;font-size:0.7rem;color:#8df6ff;margin-bottom:0.4rem;font-weight:700}
.verdict-body{font-family:monospace;font-size:0.7rem;color:rgba(255,255,255,0.65);line-height:1.6}
.conflict-flag{color:#fbbf24}

/* Handoff section */
.handoff-section{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.06)}
.handoff-btn{font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;font-size:0.7rem;color:rgba(141,246,255,0.7);background:none;border:1px solid rgba(141,246,255,0.2);padding:0.6rem 1rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-btn:hover,.handoff-btn:focus-visible{color:#8df6ff;border-color:rgba(141,246,255,0.5);box-shadow:0 0 15px rgba(141,246,255,0.1)}
.handoff-primary{font-family:monospace;font-size:0.7rem;color:#8df6ff;background:rgba(141,246,255,0.08);border:1px solid rgba(141,246,255,0.3);padding:0.6rem 1rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-primary:hover{background:rgba(141,246,255,0.15);border-color:rgba(141,246,255,0.5)}
.handoff-secondary{font-family:monospace;font-size:0.65rem;color:rgba(255,255,255,0.5);background:none;border:1px solid rgba(255,255,255,0.1);padding:0.5rem 0.8rem;border-radius:4px;cursor:pointer;transition:all 0.3s;min-height:44px}
.handoff-secondary:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)}

/* Follow-up chips */
.follow-up-chips{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem}
.chip{font-family:monospace;font-size:0.65rem;color:rgba(141,246,255,0.7);background:none;border:1px solid rgba(141,246,255,0.2);padding:0.4rem 0.8rem;border-radius:12px;cursor:pointer;transition:all 0.3s;min-height:36px}
.chip:hover{color:#8df6ff;border-color:rgba(141,246,255,0.5);box-shadow:0 0 12px rgba(141,246,255,0.1)}

<script>
// ===================================================================
// XSS HELPER — escape user-supplied strings before inserting into HTML
// ===================================================================
function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===================================================================
// SHADER PAUSE STATE — declared early to avoid temporal dead zone (BUG #8)
// ===================================================================
let shaderAnimId = null;
let shaderPaused = false;
let motionTogglePaused = false;
let inferenceRunning = false;

// UX State Machine: LAVA_ONLY -> LAVA_WITH_INPUT -> CHAT_ACTIVE
let uxState = 'LAVA_ONLY';
let modelReady = false;

// Splash: ghost fades out, install text slides in
(function runSplash() {
  var hero = document.getElementById('splashHero');
  var installBtn = document.getElementById('ctaInstall');
  setTimeout(function() {
    hero.classList.add('fade');
    installBtn.classList.add('revealed');
  }, 800);
  setTimeout(function() { hero.remove(); }, 1600);
})();

function transitionTo(newState) {
  if (uxState === newState) return;
  uxState = newState;
  var appEl = document.getElementById('app');
  var dimOverlay = document.getElementById('dimOverlay');
  var inputBarEl = document.getElementById('inputBar');
  var chatInputEl = document.getElementById('chatInput');

  if (newState === 'LAVA_WITH_INPUT') {
    modelReady = true;
    chatInputEl.disabled = false;
    chatInputEl.placeholder = 'Ask a question...';
    inputBarEl.classList.add('visible');
    if (!document.hidden) chatInputEl.focus();
  }

  if (newState === 'CHAT_ACTIVE') {
    inputBarEl.classList.add('visible');
    chatInputEl.disabled = false;
    if (chatInputEl.placeholder === 'loading...' || /\d+% loading/.test(chatInputEl.placeholder)) chatInputEl.placeholder = 'Ask a question...';
    appEl.classList.add('chat-active');
    dimOverlay.style.opacity = '0.95';
    pauseShader();
    // Show slash command examples on first chat open
    if (!window._welcomeShown) {
      window._welcomeShown = true;
      showWelcomeChips();
    }
  }
}

function enterFocusMode() {
  const dimOverlay = document.getElementById('dimOverlay');
  dimOverlay.style.opacity = '0.92';
}

// ===================================================================
// Rx7: MULTI-TURN EXPLORE — claim accumulation + turn tracking
// ===================================================================
window._allClaims = [];
window._turnCount = 0;
window._nextClaimIndex = 1; // generates d001, d002, ...
window._conversationHistory = [];
window._compilationResult = null;

// Feature flag: ?cascade=off disables all cascade/model logic
const CASCADE_OFF = new URLSearchParams(location.search).has('cascade') && new URLSearchParams(location.search).get('cascade') === 'off';

// ===================================================================
// WEBGL SHADER — preserved from v1
// ===================================================================
const c = document.getElementById('c');
const isMobileDevice = window.matchMedia('(max-width:768px)').matches || navigator.maxTouchPoints > 0;
// Mobile: no preserveDrawingBuffer for perf
const gl = c.getContext('webgl', { preserveDrawingBuffer: !isMobileDevice });

function activateFallback() {
  document.body.classList.add('webgl-fallback');
}

function isSoftwareRenderer(g) {
  const ext = g.getExtension('WEBGL_debug_renderer_info');
  if (!ext) return false;
  const renderer = g.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
  return /swiftshader|llvmpipe|software|basic render/i.test(renderer);
}

if (!gl) {
  activateFallback();
  // No WebGL — bloom input immediately (Track A works without GPU)
  transitionTo('LAVA_WITH_INPUT');
} else if (isSoftwareRenderer(gl)) {
  activateFallback();
  transitionTo('LAVA_WITH_INPUT');
}

if (gl && !document.body.classList.contains('webgl-fallback')) {

// Context loss handler (w711) — stop rAF loop + CSS fallback
c.addEventListener('webglcontextlost', (e) => { e.preventDefault(); pauseShader(); activateFallback(); });

// Mobile detection
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;

// 8 blobs ALWAYS — one per product in the ecosystem
const NUM       = 8;
const STEPS     = isMobile ? 56   : 72;
const HIT_THRESH= isMobile ? '0.002' : '0.001';
const STEP_MULT = isMobile ? '0.85'  : '0.8';
const NORM_EPS  = isMobile ? '0.003' : '0.002';
const GLITCH_ON = isMobile ? 0       : 1;
const IS_MOBILE = isMobile ? 1       : 0;

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;
uniform float u_preloadProgress;

#define NUM ${NUM}
#define STEPS ${STEPS}
#define HIT_THRESH ${HIT_THRESH}
#define STEP_MULT ${STEP_MULT}
#define NORM_EPS ${NORM_EPS}
#define GLITCH_ON ${GLITCH_ON}
#define IS_MOBILE ${IS_MOBILE}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

float hash(float n) { return fract(sin(n) * 43758.5453); }

float g_nearestBlob = 0.0;

vec3 getNeonColor(float idx) {
  int i = int(mod(idx, 8.0));
  if (i == 0) return vec3(0.984, 0.749, 0.141);
  if (i == 1) return vec3(0.957, 0.247, 0.369);
  if (i == 2) return vec3(0.133, 0.773, 0.369);
  if (i == 3) return vec3(0.231, 0.510, 0.965);
  if (i == 4) return vec3(0.655, 0.545, 0.980);
  if (i == 5) return vec3(0.984, 0.573, 0.235);
  if (i == 6) return vec3(0.133, 0.827, 0.933);
  return vec3(0.612, 0.639, 0.686);
}

float map(vec3 p) {
  float d = 1e10;

  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float h1 = hash(fi * 412.531 + seed * 3.7);
    float h2 = hash(fi * 317.892 + seed * 5.1);
    float h3 = hash(fi * 253.147 + seed * 7.9);
    float h4 = hash(fi * 173.29 + seed * 2.1);

    float baseX = (h1 * 2.0 - 1.0) * 2.5;
    float baseY = (h2 * 2.0 - 1.0) * 2.5;
    float baseZ = (h4 - 0.5) * 0.3;

#if IS_MOBILE
    float sx = 0.06 + h1 * 0.08;
    float sy = 0.05 + h2 * 0.07;
    float sz = 0.04 + h3 * 0.06;
#else
    float sx = 0.03 + h1 * 0.04;
    float sy = 0.025 + h2 * 0.035;
    float sz = 0.02 + h3 * 0.03;
#endif
    float px = h2 * 6.28 + seed * 100.0;
    float py = h3 * 6.28 + seed * 100.0;
    float pz = h1 * 6.28 + seed * 100.0;

    float dx = sin(t*sx + px)*0.35 + sin(t*sx*0.37 + py + 1.7)*0.2;
    float dy = sin(t*sy + py + 0.5)*0.3 + cos(t*sy*0.43 + px + 2.1)*0.2;
    float dz = cos(t*sz + pz + 1.0)*0.15;

    vec3 blobPos = vec3(baseX + dx, baseY + dy, baseZ + dz);

    // Blob growth driven by preload progress
    float growFactor = 1.0 + u_preloadProgress * 0.6;

#if IS_MOBILE
    float blobR = (0.8 + h4 * 1.0) * growFactor;
#else
    float blobR = (0.20 + h4 * 0.30) * growFactor;
#endif

    vec3 evalP = p;

#if GLITCH_ON
    {
      float gw = sin(t*0.3 + fi*3.7) * sin(t*0.13 + fi*2.1);
      float burst = smoothstep(0.65, 0.9, gw);
      if (burst > 0.01) {
        vec3 toB = p - blobPos;
        float near = smoothstep(1.5, 0.1, length(toB));
        float amt = burst * near * 0.28;
        if (amt > 0.005) {
          float vs = mix(0.28, 0.10, fract(sin(fi*73.1 + floor(t*2.0))*438.5));
          vec3 snapped = floor(p/vs + 0.5) * vs;
          evalP = mix(p, snapped, amt);
        }
      }
    }
#endif

    vec3 localP = evalP - blobPos;
    float baseDist = length(localP) - blobR;
    float blobD = baseDist;
    if (baseDist < blobR * 1.5) {
      vec3 nc = localP * (2.5 + fi * 0.3) + t * 0.06 + fi * 7.0;
      float warp = sin(nc.x * 1.7 + nc.y * 1.3) * sin(nc.y * 2.1 + nc.z * 0.9);
      blobD = baseDist - warp * blobR * 0.35;
    }
    float k = 0.3 + 0.1 * sin(fi * 1.7 + t * 0.05);
    if (blobD < d) g_nearestBlob = fi;
    d = smin(d, blobD, k);
  }

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(NORM_EPS, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

  vec3 ro = vec3(0.0, 0.0, 3.8);
  vec3 fwd = vec3(0.0, 0.0, -1.0);
  vec3 rgt = vec3(1.0, 0.0, 0.0);
  vec3 up2 = vec3(0.0, 1.0, 0.0);
  vec3 rd = normalize(fwd * 1.2 + rgt * uv.x + up2 * uv.y);

  float dist = 0.0;
  float hit = -1.0;
  float lastH = 1.0;
  for (int i = 0; i < STEPS; i++) {
    vec3 p = ro + rd * dist;
    float h = map(p);
    lastH = h;
    if (h < HIT_THRESH) { hit = dist; break; }
    if (dist > 15.0) break;
    dist += h * STEP_MULT;
  }

  vec3 col = vec3(0.005, 0.004, 0.003);
  vec2 gridUV = gl_FragCoord.xy;
  float gridSize = 40.0;
  float lineW = 1.0;
  float gx = abs(mod(gridUV.x, gridSize) - gridSize * 0.5);
  float gy = abs(mod(gridUV.y, gridSize) - gridSize * 0.5);
  float gridLine = 1.0 - smoothstep(0.0, lineW, min(gx, gy));
  col += vec3(1.0) * gridLine * 0.035;
  vec3 bgCol = col;

  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    float NdotV = max(dot(n, -rd), 0.0);
    float fres = pow(1.0 - NdotV, 2.5);

    vec3 neon = getNeonColor(g_nearestBlob);

    vec3 waxCol = neon * mix(0.06, 0.18, fres * 0.5);
    float hemiAmt = 0.5 + 0.5 * n.y;
    vec3 hemiAmb = neon * mix(0.02, 0.05, hemiAmt);
    float sss = pow(max(dot(rd, n), 0.0), 2.0) * 0.15;
    col = waxCol + hemiAmb + neon * sss * 0.12;

    float fog = exp(-hit * 0.05);
    col = mix(vec3(0.006, 0.005, 0.003), col, fog);

    float edgeAA = smoothstep(HIT_THRESH, 0.0, lastH);
    col = mix(bgCol, col, edgeAA);

    float rimWide = pow(fres, 1.3);
    float rimTight = pow(fres, 2.0);
    float rimHot = pow(fres, 3.5);
    col += neon * rimWide * 0.35;
    col += neon * rimTight * 1.8;
    col += neon * rimHot * 1.2;
  }

  float vig = 1.0 - dot(uv * 0.55, uv * 0.55);
  col *= smoothstep(0.0, 0.5, vig);

  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + t) * 43758.5453);
  col += grain * 0.004 - 0.002;

  gl_FragColor = vec4(col, 1.0);
}
`;

const compileShader = (src, type) => {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
};

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');
const preloadLoc = gl.getUniformLocation(prog, 'u_preloadProgress');
const seedVal = Math.random();
gl.uniform1f(seedLoc, seedVal);
gl.uniform1f(preloadLoc, 0.0);

const dpr = isMobileDevice ? Math.min(devicePixelRatio, 1.5) : Math.min(devicePixelRatio, 2);

const resize = () => {
  // Use canvas client dimensions (CSS size from inset:0) for full-screen including safe areas
  const w = c.clientWidth || innerWidth;
  const h = c.clientHeight || innerHeight;
  c.width = w * dpr;
  c.height = h * dpr;
  gl.viewport(0, 0, c.width, c.height);
};
resize();
addEventListener('resize', resize);

let lastInteraction = Date.now();
let paused = false;
let lastFrame = 0;
const wake = () => { lastInteraction = Date.now(); if (paused) { paused = false; shaderAnimId = requestAnimationFrame(render); } };
window._shaderWake = wake;
document.addEventListener('mousemove', wake);
document.addEventListener('touchstart', wake);
document.addEventListener('click', wake);

window._shaderRender = null; // hoisted reference
const FRAME_INTERVAL = isMobileDevice ? 66 : 33; // 15fps mobile, 30fps desktop
const render = (time) => {
  if (shaderPaused) return;
  if (Date.now() - lastInteraction > 15000) { paused = true; return; }
  if (time - lastFrame < FRAME_INTERVAL) { shaderAnimId = requestAnimationFrame(render); return; }
  lastFrame = time;
  gl.uniform1f(tLoc, time * 0.001);
  gl.uniform2f(rLoc, c.width, c.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  shaderAnimId = requestAnimationFrame(render);
};
shaderAnimId = requestAnimationFrame(render);
window._shaderRender = render;

// Lava bloom — fade canvas in. Input blooms when model ready (not on timer).
setTimeout(function() { c.classList.add('active'); }, 100);

// Expose preload uniform setter
window._setPreloadProgress = (v) => {
  gl.useProgram(prog);
  gl.uniform1f(preloadLoc, Math.min(1.0, Math.max(0.0, v)));
};

}

// ===================================================================
// A11Y: ANNOUNCEMENTS + PROGRESS
// ===================================================================
const MILESTONES = [25, 50, 75, 100];
let lastMilestone = 0;

function updateModelProgress(pct) {
  const bar = document.getElementById('model-progress');
  if (bar) bar.setAttribute('aria-valuenow', String(Math.round(pct)));
}

function announceProgress(pct) {
  const milestone = MILESTONES.find(m => pct >= m && m > lastMilestone);
  if (milestone) {
    lastMilestone = milestone;
    document.getElementById('progress-announcer').textContent =
      milestone === 100 ? 'Model download complete.' : `Model download ${milestone}% complete.`;
  }
}

function announceState(msg) {
  document.getElementById('state-announcer').textContent = msg;
}

function announceCompilerPass(msg) {
  document.getElementById('compiler-announcer').textContent = msg;
}

// A11y: flash rate limiting
const FLASH_MIN_INTERVAL = 500;
let lastFlashTime = 0;
function compilerFlash() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const now = performance.now();
  if (now - lastFlashTime < FLASH_MIN_INTERVAL) return;
  lastFlashTime = now;
  const overlay = document.getElementById('flash-overlay');
  overlay.style.background = 'rgba(80, 0, 0, 0.3)';
  overlay.style.opacity = '1';
  requestAnimationFrame(() => { overlay.style.transition = 'opacity 300ms ease-out'; overlay.style.opacity = '0'; });
}

// ===================================================================
// SHADER PAUSE CONTROL
// ===================================================================
function pauseShader() {
  if (shaderAnimId) { cancelAnimationFrame(shaderAnimId); shaderAnimId = null; }
  shaderPaused = true;
}
function resumeShader() {
  if (!motionTogglePaused && shaderPaused) {
    shaderPaused = false;
    // Always restart the render loop — wake handles idle, but we also need direct restart
    if (window._shaderWake) window._shaderWake();
    if (!shaderAnimId && window._shaderRender) shaderAnimId = requestAnimationFrame(window._shaderRender);
  }
}

// ===================================================================
// CHAT UI — mobile-first chat interface
// ===================================================================
const ctaInstall = document.getElementById('ctaInstall');
const chatArea = document.getElementById('main-content');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

// motion-toggle removed — shader auto-pauses on chat

function addMessage(type, content, safe) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  if (typeof content === 'string') {
    if (safe !== false && type !== 'user') {
      div.innerHTML = content;
    } else {
      div.textContent = content;
    }
  } else {
    div.appendChild(content);
  }
  chatArea.appendChild(div);
  // Focus mode after 5+ user messages
  if (chatArea.querySelectorAll('.msg-user').length >= 5) enterFocusMode();
  autoScroll();
  return div;
}

function addThinking() {
  const div = addMessage('ai', '<div class="thinking-dots"><span></span><span></span><span></span></div>');
  div.id = 'thinkingMsg';
  return div;
}

function removeThinking() {
  const t = document.getElementById('thinkingMsg');
  if (t) t.remove();
}

function autoScroll() {
  requestAnimationFrame(function() {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// Extract structured claims from natural language using keyword heuristics
function extractClaimsFromText(text, question) {
  var sentences = text.split(/[.!?]+/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 20; });
  var claims = [];
  var seen = new Set();

  sentences.forEach(function(s) {
    var lower = s.toLowerCase();
    var type = null;

    if (/\brisk|danger|fail|vulnerab|threat|downside|concern|careful/i.test(s)) type = 'risk';
    else if (/\bshould|recommend|suggest|consider|best practice|advise|opt for/i.test(s)) type = 'recommendation';
    else if (/\brequir|must|need to|constraint|cannot|limitation|restrict/i.test(s)) type = 'constraint';
    else if (/\bestimate|approx|typically|around \d|usually takes|\d+[-–]\d+\s*(week|month|day|hour)/i.test(s)) type = 'estimate';
    else if (s.length > 30) type = 'factual';

    if (type && !seen.has(lower.substring(0, 40))) {
      seen.add(lower.substring(0, 40));
      claims.push({ type: type, text: s + '.' });
    }
  });

  return claims.slice(0, 6);
}

function showWelcomeChips() {
  addMessage('ai', 'What are you exploring? Ask anything — I\'ll gather evidence, flag risks, and grade confidence.');
}

// Generate wheat-style next step chips based on current sprint state
function generateNextStepChips(aiMsg) {
  var claims = window._allClaims || [];
  var risks = claims.filter(function(c) { return c.type === 'risk'; });
  var recs = claims.filter(function(c) { return c.type === 'recommendation'; });
  var types = {};
  claims.forEach(function(c) { types[c.type] = (types[c.type] || 0) + 1; });

  var suggestions = [];
  if (claims.length >= 3 && risks.length === 0) suggestions.push('what are the risks?');
  if (claims.length >= 3 && recs.length > 0) suggestions.push('challenge that recommendation');
  if (claims.length >= 5) suggestions.push('any blind spots?');
  if (claims.length >= 3 && claims.length < 8) suggestions.push('dig deeper');
  if (Object.keys(types).length <= 2 && claims.length >= 3) suggestions.push('diversify the evidence');

  if (suggestions.length === 0) return;
  suggestions = suggestions.slice(0, 3);

  var container = document.createElement('div');
  container.className = 'follow-up-chips';
  suggestions.forEach(function(text) {
    var btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = text;
    btn.addEventListener('click', function() {
      chatInput.value = text;
      sendBtn.classList.add('active');
      chatInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
    });
    container.appendChild(btn);
  });
  aiMsg.appendChild(container);
}

function synthesizeSummary(claims, question) {
  if (!claims || claims.length === 0) return 'No claims found for this query.';
  const risks = claims.filter(function(c) { return c.type === 'risk'; });
  const recs = claims.filter(function(c) { return c.type === 'recommendation'; });
  const facts = claims.filter(function(c) { return c.type === 'factual'; });
  const constraints = claims.filter(function(c) { return c.type === 'constraint'; });

  var summary = 'Based on ' + claims.length + ' findings';
  if (question) summary += ' about <strong>' + escapeHtml(question) + '</strong>';
  summary += ':<br><br>';

  if (constraints.length > 0) summary += constraints[0].text + '<br><br>';
  if (facts.length > 0) summary += facts[0].text + '<br><br>';
  if (risks.length > 0) summary += '<span style="color:#fbbf24">Risk:</span> ' + risks[0].text + '<br><br>';
  if (recs.length > 0) summary += '<span style="color:#22c55e">Recommendation:</span> ' + recs[0].text;

  return summary;
}

function renderClaimsToggle(claims) {
  var wrapper = document.createElement('div');
  var btn = document.createElement('button');
  btn.className = 'claims-toggle';
  btn.setAttribute('aria-expanded', 'false');
  btn.textContent = '\u25B8 View ' + claims.length + ' claims';

  var panel = document.createElement('div');
  panel.className = 'claims-panel';
  var inner = document.createElement('div');
  inner.className = 'claims-panel-inner';

  claims.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'claim-row';
    var badge = document.createElement('span');
    badge.className = 'badge badge-' + c.type;
    badge.textContent = c.type + (c.unverified ? ' (ai)' : '');
    var textSpan = document.createElement('span');
    textSpan.textContent = c.text || '';
    row.appendChild(badge);
    row.appendChild(textSpan);
    inner.appendChild(row);
  });

  panel.appendChild(inner);

  btn.addEventListener('click', function() {
    var expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!expanded));
    panel.classList.toggle('open');
    btn.textContent = expanded ? '\u25B8 View ' + claims.length + ' claims' : '\u25BE Hide claims';
  });

  wrapper.appendChild(btn);
  wrapper.appendChild(panel);
  return wrapper;
}

function showCompileButton() {
  if (window._allClaims.length < 3) return;
  var bar = document.getElementById('compileBar');
  bar.classList.add('visible');
  var btn = document.getElementById('compileMsgBtn');
  btn.textContent = 'compile ' + window._allClaims.length + ' claims';
  btn.disabled = false;
  btn.onclick = runCompile;
}

// New chat button
document.getElementById('newChatBtn').addEventListener('click', function() {
  if (window._allClaims && window._allClaims.length > 0) {
    if (!confirm('Start new chat? (' + window._allClaims.length + ' claims will be cleared)')) return;
  }
  resetExploreState();
  clearSession();
  chatArea.innerHTML = '';
  chatInput.value = '';
  chatInput.focus();
  sendBtn.classList.remove('active');
  // Reset UX state — resume shader, remove chat overlay
  var appEl = document.getElementById('app');
  appEl.classList.remove('chat-active');
  document.getElementById('dimOverlay').style.opacity = '0';
  uxState = 'LAVA_WITH_INPUT';
  resumeShader();
});

// Send button + input wiring
chatInput.addEventListener('input', function() {
  var hasContent = chatInput.value.trim().length > 0 || !!_attachedFileText;
  sendBtn.classList.toggle('active', hasContent);
  // Auto-expand textarea
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  // Character counter
  var counter = document.getElementById('charCounter');
  if (this.value.length > 4000) {
    counter.style.display = 'block';
    counter.textContent = this.value.length + '/5000';
  } else {
    counter.style.display = 'none';
  }
});

sendBtn.addEventListener('click', function() {
  chatInput.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
});

// File attachment
var _attachedFileText = '';
var _attachedFileName = '';
// File attach via hidden input (no visible button — drag-drop or programmatic only)
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 1048576) { showToast('File too large (1MB max)'); return; }
  var reader = new FileReader();
  reader.onload = function(evt) {
    _attachedFileText = evt.target.result;
    _attachedFileName = file.name;
    var old = document.querySelector('.file-chip');
    if (old) old.remove();
    var chip = document.createElement('div');
    chip.className = 'file-chip';
    var nameSpan = document.createElement('span');
    nameSpan.textContent = file.name;
    var removeBtn = document.createElement('span');
    removeBtn.className = 'remove';
    removeBtn.setAttribute('role', 'button');
    removeBtn.textContent = '\u00d7';
    removeBtn.addEventListener('click', function() { _attachedFileText = ''; _attachedFileName = ''; chip.remove(); sendBtn.classList.toggle('active', !!chatInput.value.trim()); });
    chip.appendChild(nameSpan);
    chip.appendChild(removeBtn);
    document.getElementById('inputBar').insertBefore(chip, document.querySelector('.input-wrap'));
    sendBtn.classList.add('active');
  };
  reader.readAsText(file);
  e.target.value = '';
});

// iOS keyboard fix
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() {
    var kbOffset = window.innerHeight - window.visualViewport.height;
    document.documentElement.style.setProperty('--kb-offset', Math.max(0, kbOffset) + 'px');
  });
}

// Session restore — if saved session exists, go straight to chat
requestAnimationFrame(function() {
  var saved = loadSavedSession();
  if (saved && saved.allClaims && saved.allClaims.length > 0) {
    restoreSession(saved);
    transitionTo('CHAT_ACTIVE');
  }
  // Otherwise: stay in LAVA_ONLY until demos.json loads or model ready
  // LAVA_WITH_INPUT is triggered by DEMO_LIBRARY load (see fetch below)
  // or by WebLLM ready state
});

ver and batch processing on ECS Fargate."},{"id":"r005","type":"estimate","tier":"tested","text":"At 10M invocations/month with 256MB memory and 500ms average duration, Lambda costs approximately $18/month versus $120/month for equivalent always-on ECS tasks."}]},{"question":"Should we adopt a modular monolith pattern instead of microservices?","claims":[{"id":"r001","type":"factual","tier":"web","text":"Shopify's migration from microservices back to a modular monolith reduced their deployment pipeline from 40 minutes to 12 minutes and eliminated 80% of inter-service timeout errors."},{"id":"r002","type":"constraint","tier":"documented","text":"Module boundaries in a modular monolith must be enforced at the code level (e.g., ArchUnit tests, package-private visibility) since there are no network boundaries to prevent coupling."},{"id":"r003","type":"risk","tier":"stated","text":"Without strict governance, developers may bypass module boundaries through shared database tables, recreating the coupling problems the pattern was meant to solve."},{"id":"r004","type":"recommendation","tier":"documented","text":"Define module APIs as interfaces with DTOs, enforce boundaries with ArchUnit or similar static analysis, and use a shared event bus for cross-module communication."},{"id":"r005","type":"estimate","tier":"stated","text":"Restructuring the existing codebase into well-bounded modules is estimated at 6-8 weeks, with an additional 2 weeks to set up boundary enforcement tooling."}]},{"question":"Should we migrate from React to Vue 3 for our customer portal?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"Vue 3's Composition API provides similar capabilities to React Hooks but with explicit reactivity tracking, eliminating the stale closure bugs common in useEffect."},{"id":"r002","type":"risk","tier":"web","text":"The React ecosystem has 4x more npm packages and Stack Overflow answers than Vue, meaning the team will encounter fewer community solution r":"documented","text":"The enterprise contract requires data residency in EU regions; both AWS and GCP offer Frankfurt and Dublin regions, but some managed services have different feature availability per region."},{"id":"r002","type":"risk","tier":"web","text":"Multi-cloud deployments increase infrastructure complexity by 40-60% due to provider-specific networking, IAM, and monitoring configurations that cannot be fully abstracted."},{"id":"r003","type":"factual","tier":"web","text":"Gartner estimates that fewer than 10% of enterprises achieve true workload portability across clouds; most multi-cloud strategies end up as multi-vendor with siloed workloads."},{"id":"r004","type":"recommendation","tier":"documented","text":"Commit to AWS as the primary cloud and use GCP only for ML workloads where TPU access provides measurable cost/performance advantages."},{"id":"r005","type":"estimate","tier":"stated","text":"Running equivalent workloads on two cloud providers increases operational costs by approximately 35% compared to single-cloud, primarily from duplicate tooling and training."}]},{"question":"Should we use managed NAT Gateway or deploy our own NAT instances?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"AWS NAT Gateway charges $0.045/GB of data processed plus $0.045/hour per gateway; at 10TB/month egress, this costs approximately $900/month."},{"id":"r002","type":"factual","tier":"tested","text":"A fck-nat instance on t4g.nano costs $3.07/month and handled up to 5Gbps in benchmarks, reducing NAT costs by 99% for the same throughput."},{"id":"r003","type":"risk","tier":"web","text":"Self-managed NAT instances are single points of failure unless deployed in an auto-scaling group with health checks, adding operational complexity."},{"id":"r004","type":"recommendation","tier":"tested","text":"Deploy fck-nat instances in an ASG with 30-second health checks for non-production environments; use managed NAT Gateway for production where uptime SLA matters."},{"id":"r005","type":"estimate","tier":"tested","text":"Switching dev/staging environments to fck-nat saves approximately $2,100/month across 3 environments with no measurable impact on connectivity reliability."}]},{"question":"Should we implement GitOps with ArgoCD or Flux for our Kubernetes deployments?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"ArgoCD provides a built-in web UI for visualizing deployment status, sync state, and resource health, while Flux is purely CLI/API-driven and requires Grafana dashboards for visibility."},{"id":"r002","type":"factual","tier":"web","text":"Flux's multi-tenancy model uses native Kubernetes RBAC and namespaces, making it simpler to isolate team deployments without additional access control layers."},{"id":"r003","type":"risk","tier":"tested","text":"ArgoCD's application-of-apps pattern for managing 50+ microservices caused sync storms where a single Git push triggered cascading reconciliation across all apps, taking 8 minutes to stabilize."},{"id":"r004","type":"recommendation","tier":"documented","text":"Use ArgoCD for its superior UI and adoption if the team is fewer than 5 clusters; switch to Flux for large-scale multi-cluster deployments where its lightweight controller model scales better."},{"id":"r005","type":"estimate","tier":"stated","text":"Setting up ArgoCD with SSO, RBAC, and a multi-environment promotion pipeline takes approximately 2 weeks of platform engineering time."}]},{"question":"Should we migrate from JavaScript to TypeScript for our Node.js backend?","claims":[{"id":"r001","type":"factual","tier":"web","text":"A study of 600 open-source projects found that TypeScript projects had 15% fewer bugs in production compared to equivalent JavaScript projects, primarily from catching null/undefined errors at compile time."},{"id":"r002","type":"constraint","tier":"documented","text":"The existing codebase has 120K lines of JavaScript across 340 files; TypeScript migration can be incremental using allowJs and checkJs compiler options."},{"id":"r003","type":"risk","tier":"tested","text":"Adding TypeScript increased CI build time from 45 seconds to 2 minutes 10 seconds due to type-checking; using tsc --noEmit in a parallel CI step mitigated the impact on the main build."},{"id":"r004","type":"recommendation","tier":"documented","text":"Enable strict mode from the start and migrate file-by-file starting with shared utility modules, then API route handlers, then database models."},{"id":"r005","type":"estimate","tier":"stated","text":"At a rate of 15-20 files per week with one dedicated engineer, full migration would take approximately 4-5 months."}]},{"question":"Should we adopt Go or stay with Node.js for our high-throughput API gateway?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"The Go prototype handled 45,000 concurrent connections with 8MB of memory, while the Node.js equivalent required 180MB for the same workload due to V8 heap overhead."},{"id":"r002","type":"constraint","tier":"stated","text":"The team has 8 Node.js engineers and 0 Go engineers; hiring Go developers in our market takes an average of 6 weeks longer than hiring Node.js developers."},{"id":"r003","type":"risk","tier":"web","text":"Go's error handling verbosity and lack of generics maturity (introduced in 1.18) means common patterns like middleware chains require more boilerplate than Express.js equivalents."},{"id":"r004","type":"recommendation","tier":"tested","text":"Rewrite only the API gateway in Go for its superior concurrency and memory profile; keep business logic services in Node.js/TypeScript where developer velocity matters more."},{"id":"r005","type":"estimate","tier":"stated","text":"A Go API gateway with equivalent middleware (auth, rate limiting, logging, tracing) would take approximately 6 weeks to build with 2 engineers learning Go in parallel."}]},{"question":"Should we use Python or Rust for our data processing pipeline?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"The Rust implementation processed the 2GB daily ETL batch in 4 minutes compared to 47 minutes for the Python/Pandas implementation, a 12x speedup."},{"id":"r002","type":"constraint","tier":"stated","text":"The data engineering team consists of 5 Python specialists with no Rust experience; the ML team's feature engineering code is tightly coupled to the pipeline's Python API."},{"id":"r003","type":"risk","tier":"web","text":"Rust's steep learning curve (6-12 months to proficiency) and smaller data ecosystem mean fewer off-the-shelf connectors for Snowflake, dbt, and Airflow integration."},{"id":"r004","type":"recommendation","tier":"documented","text":"Use Polars (Rust-backed Python library) to get 80% of Rust's performance while keeping the Python API surface, and only drop to native Rust for the 2-3 hottest code paths."},{"id":"r005","type":"estimate","tier":"tested","text":"Switching from Pandas to Polars reduced the ETL batch time from 47 to 8 minutes with only 3 days of code changes, covering most of the performance gap without a full Rust rewrite."}]},{"question":"Should we use Deno instead of Node.js for our next backend service?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"Deno 2.0 supports npm packages natively and is backwards-compatible with most Node.js modules, eliminating the ecosystem gap that previously made Deno impractical for production use."},{"id":"r002","type":"factual","tier":"tested","text":"Deno's built-in TypeScript support, formatter, linter, and test runner eliminated 6 devDependencies (ts-node, eslint, prettier, jest, ts-jest, nodemon) from the project configuration."},{"id":"r003","type":"risk","tier":"web","text":"Deno Deploy's edge runtime has different APIs than the standard Deno runtime, causing subtle incompatibilities when deploying code that works locally."},{"id":"r004","type":"recommendation","tier":"stated","text":"Use Deno for new CLI tools and internal services where its superior developer experience and security model shine, but keep Node.js for customer-facing APIs with complex dependency trees."},{"id":"r005","type":"estimate","tier":"stated","text":"Porting an existing Express.js service to Deno's Oak framework takes approximately 1-2 weeks depending on the number of npm-specific APIs used."}]},{"question":"Should we adopt Bun as our JavaScript runtime?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"Bun's package install completed in 1.2 seconds compared to npm's 18 seconds and pnpm's 6 seconds for the same 340-package lockfile."},{"id":"r002","type":"risk","tier":"web","text":"Bun's Node.js compatibility layer has known gaps in crypto, net, and child_process modules that affect production frameworks like NestJS and Fastify."},{"id":"r003","type":"risk","tier":"tested","text":"The Bun runtime crashed with a segfault under sustained load testing at 10K concurrent connections, which Node.js handled without issues."},{"id":"r004","type":"recommendation","tier":"stated","text":"Use Bun as a development tool (package manager, test runner, bundler) for its speed benefits, but deploy on Node.js in production until Bun's stability improves."},{"id":"r005","type":"estimate","tier":"stated","text":"Switching the development toolchain to Bun takes approximately 1 day per project and is fully reversible since it uses the same package.json format."}]},{"question":"How should we structure our CI/CD pipeline for a microservices architecture?","claims":[{"id":"r001","type":"constraint","tier":"documented","text":"Each microservice must be independently buildable, testable, and deployable; shared CI pipelines that block on unrelated service failures defeat the purpose of microservices."},{"id":"r002","type":"factual","tier":"tested","text":"Moving from a single monorepo pipeline to per-service pipelines reduced average CI wait time from 22 minutes to 6 minutes by only running affected service tests."},{"id":"r003","type":"risk","tier":"web","text":"Per-service pipelines can diverge in quality gates and configuration over time; without a shared pipeline-as-code template, teams may skip security scanning or integration tests."},{"id":"r004","type":"recommendation","tier":"documented","text":"Use a shared CI template library (GitHub reusable workflows or GitLab CI includes) that enforces mandatory stages (lint, test, scan, build) while allowing per-service customization."},{"id":"r005","type":"estimate","tier":"stated","text":"Building the shared template library and migrating 12 services takes approximately 3 weeks, after which new services can onboard in under 1 hour."}]},{"question":"Should we adopt feature flags with LaunchDarkly or build our own system?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"LaunchDarkly evaluates flags locally via a streaming SDK, adding less than 1ms of latency per evaluation compared to remote API calls that add 50-100ms."},{"id":"r002","type":"constraint","tier":"stated","text":"The compliance team requires that feature flag state be auditable with timestamps and user attribution; LaunchDarkly provides this out of the box."},{"id":"r003","type":"risk","tier":"web","text":"LaunchDarkly pricing scales with monthly active users; at 500K MAU, costs reach approximately $3,000/month which may exceed the value for a team using only boolean flags."},{"id":"r004","type":"recommendation","tier":"tested","text":"Start with LaunchDarkly for its targeting rules and audit trail; if costs become prohibitive, migrate to OpenFeature with Flagd as the backend, preserving SDK compatibility."},{"id":"r005","type":"estimate","tier":"stated","text":"Integrating LaunchDarkly SDK across 8 backend services and 2 frontend apps takes approximately 1 week including percentage rollout configuration."}]},{"question":"Should we implement canary deployments or blue-green for our production releases?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"Canary deployments route a small percentage (1-5%) of traffic to the new version and gradually increase, allowing real-user validation before full rollout."},{"id":"r002","type":"factual","tier":"tested","text":"Blue-green deployments require maintaining two identical production environments, which doubled the infrastructure cost from $8,000 to $16,000/month during the deployment window."},{"id":"r003","type":"risk","tier":"web","text":"Canary deployments with database schema changes are dangerous: the old and new versions must both work with the same schema, requiring backwards-compatible migrations."},{"id":"r004","type":"recommendation","tier":"documented","text":"Use canary deployments for stateless API services with Istio traffic splitting, and blue-green for database-heavy services where instant rollback to the old schema is critical."},{"id":"r005","type":"estimate","tier":"stated","text":"Setting up Istio-based canary deployments with automated metric-based promotion takes approximately 2 weeks of platform engineering work."}]},{"question":"Should we adopt Nix for reproducible development environments?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"Nix flakes eliminated 'works on my machine' issues entirely: new engineer onboarding dropped from 2 days of environment setup to 15 minutes with a single 'nix develop' command."},{"id":"r002","type":"risk","tier":"web","text":"Nix has one of the steepest learning curves in the DevOps ecosystem; the functional language for writing derivations is unlike any mainstream programming language."},{"id":"r003","type":"risk","tier":"tested","text":"Nix store consumed 45GB of disk space after 3 months of development, and garbage collection required manual intervention to avoid breaking cached builds."},{"id":"r004","type":"recommendation","tier":"stated","text":"Use devenv or devbox as a simplified Nix frontend that provides reproducible environments without requiring engineers to learn the Nix language."},{"id":"r005","type":"estimate","tier":"stated","text":"Creating Nix flakes for the 5 main project repositories takes approximately 1 week for someone experienced with Nix, or 3 weeks for a team learning from scratch."}]},{"question":"Should we implement zero trust networking for our cloud infrastructure?","claims":[{"id":"r001","type":"constraint","tier":"documented","text":"SOC 2 Type II audit requires that all internal service-to-service communication is authenticated and encrypted, which zero trust satisfies by default."},{"id":"r002","type":"factual","tier":"web","text":"Google's BeyondCorp implementation eliminated VPN usage entirely, reducing authentication-related support tickets by 60% while improving security posture."},{"id":"r003","type":"risk","tier":"tested","text":"Implementing mTLS between all services increased p99 latency by 8ms per hop due to TLS handshake overhead; connection pooling reduced this to 1ms for established connections."},{"id":"r004","type":"recommendation","tier":"documented","text":"Deploy Istio service mesh for automatic mTLS between services, and use Tailscale for developer access to replace the existing OpenVPN setup."},{"id":"r005","type":"estimate","tier":"stated","text":"Full zero trust implementation across 20 services including mTLS, SPIFFE identity, and network policy enforcement is estimated at 8-10 weeks."}]},{"question":"Should we use RBAC or ABAC for our multi-tenant authorization system?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"RBAC assigns permissions to roles and roles to users, requiring N roles for N permission combinations; ABAC evaluates policies against attributes, handling combinatorial permissions without role explosion."},{"id":"r002","type":"constraint","tier":"stated","text":"The current system has 12 roles with 45 permissions; tenants are requesting custom roles, which will push RBAC to 50+ roles within 6 months."},{"id":"r003","type":"risk","tier":"web","text":"ABAC policy engines (OPA, Cedar) add a decision-point network call per authorization check, which can become a performance bottleneck at 10K+ requests/second without caching."},{"id":"r004","type":"recommendation","tier":"documented","text":"Adopt Cedar (AWS-backed ABAC engine) with embedded evaluation to avoid network overhead, using RBAC as the base layer and ABAC for tenant-specific custom policies."},{"id":"r005","type":"estimate","tier":"stated","text":"Migrating from the current RBAC system to a hybrid RBAC+ABAC model with Cedar is estimated at 6 weeks including policy migration and regression testing."}]},{"question":"How should we manage secrets in our Kubernetes-based infrastructure?","claims":[{"id":"r001","type":"constraint","tier":"documented","text":"Kubernetes native secrets are base64-encoded (not encrypted) and stored in etcd; without encryption-at-rest configured, anyone with etcd access can read all secrets."},{"id":"r002","type":"factual","tier":"tested","text":"HashiCorp Vault with the Kubernetes auth method provided automatic secret rotation with zero-downtime: database credentials rotated every 24 hours without pod restarts."},{"id":"r003","type":"risk","tier":"web","text":"Vault adds significant operational complexity: it requires its own HA cluster, unseal procedures, and audit log management, which is a burden for teams under 20 engineers."},{"id":"r004","type":"recommendation","tier":"documented","text":"For teams under 20 engineers, use AWS Secrets Manager with the External Secrets Operator to sync secrets into Kubernetes; adopt Vault only when secret rotation and dynamic credentials become requirements."},{"id":"r005","type":"estimate","tier":"stated","text":"Setting up External Secrets Operator with AWS Secrets Manager takes 2-3 days; a full Vault deployment with HA and auto-unseal takes 2-3 weeks."}]},{"question":"Should we implement container image signing and verification in our CI pipeline?","claims":[{"id":"r001","type":"constraint","tier":"documented","text":"SLSA Level 3 compliance requires that all build artifacts are signed with non-forgeable provenance, which includes container images deployed to production."},{"id":"r002","type":"factual","tier":"documented","text":"Cosign (from Sigstore) provides keyless signing using OIDC identity, eliminating the need to manage and rotate signing keys manually."},{"id":"r003","type":"risk","tier":"web","text":"Sigstore's public transparency log (Rekor) records all signing events publicly; organizations signing proprietary software may inadvertently leak internal project names and release cadences."},{"id":"r004","type":"recommendation","tier":"tested","text":"Use Cosign with a private Sigstore deployment for signing, and Kyverno admission controller to enforce signature verification on all pod deployments in production clusters."},{"id":"r005","type":"estimate","tier":"stated","text":"Adding Cosign signing to CI and Kyverno verification to 3 clusters takes approximately 1 week of platform engineering effort."}]},{"question":"Should we adopt OIDC federation instead of long-lived CI/CD credentials?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"GitHub Actions OIDC tokens are valid for 15 minutes and scoped to the specific repository and workflow, compared to IAM access keys that have no expiration and broad scope."},{"id":"r002","type":"constraint","tier":"documented","text":"AWS IAM role trust policies for OIDC providers support condition keys that restrict which repository, branch, and environment can assume the role."},{"id":"r003","type":"risk","tier":"web","text":"OIDC token audience and subject claims vary between CI providers; a misconfigured trust policy (e.g., missing branch condition) could allow any repository in the org to assume the production deployment role."},{"id":"r004","type":"recommendation","tier":"documented","text":"Replace all long-lived IAM access keys in CI/CD with OIDC federation, using separate IAM roles per environment with branch-level conditions on the trust policy."},{"id":"r005","type":"estimate","tier":"stated","text":"Migrating 6 CI pipelines from IAM access keys to OIDC federation takes approximately 2-3 days including trust policy configuration and testing."}]},{"question":"What testing strategy should we use for our GraphQL API?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"GraphQL's type system enables auto-generated test cases from the schema: tools like graphql-codegen produce typed query builders that catch breaking changes at compile time."},{"id":"r002","type":"constraint","tier":"stated","text":"The API has 85 queries and 40 mutations across 12 domain modules; exhaustive integration testing of all query combinations is infeasible."},{"id":"r003","type":"risk","tier":"tested","text":"Unit testing individual resolvers with mocked data missed a critical N+1 query bug that only manifested when 3 nested resolvers were composed in a real GraphQL execution."},{"id":"r004","type":"recommendation","tier":"tested","text":"Use resolver-level unit tests for business logic, but add integration tests that execute full GraphQL queries against a test database for the 20 most critical user flows."},{"id":"r005","type":"estimate","tier":"stated","text":"Setting up a GraphQL integration test harness with database seeding and snapshot testing takes approximately 1 week; ongoing maintenance is about 2 hours per new feature."}]},{"question":"Should we adopt test-driven development across our engineering team?","claims":[{"id":"r001","type":"recommendation","tier":"stated","text":"TDD works best for well-understood domains with clear input/output contracts like payment processing and data transformation, where writing tests first clarifies the specification."},{"id":"r002","type":"recommendation","tier":"web","text":"For exploratory work like UI prototyping or new feature spikes, TDD adds friction; teams should use test-after for discovery phases and TDD for hardening phases."},{"id":"r003","type":"recommendation","tier":"stated","text":"Mandate TDD for all code touching financial calculations, PII handling, and authentication flows where correctness is non-negotiable."},{"id":"r004","type":"recommendation","tier":"web","text":"Make TDD optional for internal tools and admin interfaces where the cost of a bug is low and iteration speed matters more than correctness guarantees."},{"id":"r005","type":"recommendation","tier":"stated","text":"Pair TDD adoption with 2 weeks of team workshops using real codebase examples, not toy kata exercises, to build muscle memory for the red-green-refactor cycle."}]},{"question":"Should we invest in property-based testing for our financial calculation engine?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"Property-based tests using fast-check discovered 3 edge cases in the currency rounding logic that 200+ manually-written unit tests had missed over 2 years."},{"id":"r002","type":"constraint","tier":"documented","text":"Property-based tests require defining invariants (e.g., 'total always equals sum of line items'), which forces the team to articulate business rules that are often implicit."},{"id":"r003","type":"risk","tier":"web","text":"Property-based test failures produce minimal counterexamples that can be hard to debug; engineers unfamiliar with the approach may waste time on shrinking artifacts rather than fixing the actual bug."},{"id":"r004","type":"recommendation","tier":"tested","text":"Add property-based tests specifically for the pricing engine, tax calculator, and currency conversion modules where mathematical invariants are well-defined and edge cases are most dangerous."},{"id":"r005","type":"estimate","tier":"stated","text":"Writing property-based tests for the 4 core financial modules takes approximately 2 weeks and is expected to find 5-10 previously unknown edge cases based on similar adoption experiences."}]},{"question":"Should we adopt visual regression testing for our design system?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"Chromatic caught 14 unintentional visual changes in the first month that would have shipped to production, including a button color regression caused by a CSS specificity conflict."},{"id":"r002","type":"risk","tier":"web","text":"Visual regression tests are notoriously flaky: sub-pixel rendering differences across OS versions and font antialiasing cause false positives that erode developer trust."},{"id":"r003","type":"constraint","tier":"documented","text":"The design system has 85 components with an average of 4 visual states each (default, hover, disabled, error), requiring 340 baseline screenshots to maintain."},{"id":"r004","type":"recommendation","tier":"tested","text":"Use Chromatic with Storybook for the component library with a 0.1% pixel threshold to reduce false positives, and run visual tests only on PRs that modify CSS or component files."},{"id":"r005","type":"estimate","tier":"stated","text":"Setting up Chromatic for 85 components including baseline screenshots and CI integration takes approximately 3 days; Chromatic costs $149/month for the team plan."}]},{"question":"Should we adopt contract testing between our frontend and backend teams?","claims":[{"id":"r001","type":"factual","tier":"documented","text":"Pact contract tests verify that the frontend's expected API shape matches the backend's actual responses, catching breaking changes before they reach integration testing."},{"id":"r002","type":"factual","tier":"tested","text":"After adopting Pact, the team reduced integration environment failures by 70% because API contract violations were caught in unit test CI runs within 3 minutes."},{"id":"r003","type":"risk","tier":"web","text":"Contract tests require both consumer and provider teams to maintain their side of the contract; if one team falls behind, the tests become stale and lose their value."},{"id":"r004","type":"recommendation","tier":"documented","text":"Adopt Pact for the 5 highest-traffic API endpoints first, with a shared Pact Broker that blocks provider deployments if contract verification fails."},{"id":"r005","type":"estimate","tier":"stated","text":"Integrating Pact for 5 endpoints with a Pact Broker takes approximately 1 week; expanding to all 30 endpoints takes an additional 2-3 weeks."}]},{"question":"How should we structure our code review process for a 30-person engineering team?","claims":[{"id":"r001","type":"factual","tier":"web","text":"Google's research found that code reviews taking longer than 24 hours to get a first response correlated with 40% higher developer dissatisfaction and 15% longer cycle times."},{"id":"r002","type":"constraint","tier":"stated","text":"The team operates across 3 time zones (US Pacific, US Eastern, EU Central) with a maximum overlap window of 4 hours per day."},{"id":"r003","type":"risk","tier":"web","text":"Requiring 2 approvals for every PR creates bottlenecks: studies show that the second reviewer finds meaningful issues in only 12% of reviews."},{"id":"r004","type":"recommendation","tier":"documented","text":"Require 1 approval for standard PRs with automated CODEOWNERS assignment, and 2 approvals only for changes touching auth, payments, or infrastructure code."},{"id":"r005","type":"estimate","tier":"stated","text":"Implementing tiered review requirements with CODEOWNERS and branch protection rules takes approximately 2 days across all repositories."}]},{"question":"Should we adopt pair programming as a standard practice?","claims":[{"id":"r001","type":"factual","tier":"web","text":"A meta-analysis of 18 studies found that pair programming produces 15% fewer defects than solo programming but takes 15-60% more total person-hours depending on task complexity."},{"id":"r002","type":"risk","tier":"stated","text":"Mandating pair programming for all tasks created resentment among senior engineers who felt it slowed them down on well-understood maintenance work."},{"id":"r003","type":"recommendation","tier":"web","text":"Use pair programming selectively: onboarding new team members, tackling complex design problems, and knowledge transfer for bus-factor-1 codebases."},{"id":"r004","type":"recommendation","tier":"stated","text":"Offer pair programming as an opt-in tool rather than a mandate, and track which types of tasks benefit most to build team-specific guidelines."},{"id":"r005","type":"estimate","tier":"web","text":"Teams that pair program 30% of the time report a 25% reduction in knowledge silos and a 20% improvement in code review turnaround time."}]},{"question":"Should we switch from Scrum to Shape Up for our product development process?","claims":[{"id":"r001","type":"factual","tier":"web","text":"Shape Up uses 6-week cycles with 2-week cooldowns, giving teams fixed time horizons and autonomy over scope, compared to Scrum's 2-week sprints with prescribed ceremonies."},{"id":"r002","type":"risk","tier":"stated","text":"Shape Up's 6-week cycle means that a poorly-scoped bet can waste 6 weeks before the team can course-correct, compared to 2 weeks in Scrum."},{"id":"r003","type":"constraint","tier":"stated","text":"The current Scrum ceremonies (standup, sprint planning, retro, grooming) consume approximately 8 hours per engineer per 2-week sprint, or 20% of available time."},{"id":"r004","type":"recommendation","tier":"web","text":"Trial Shape Up with one team for 2 cycles (12 weeks) while other teams continue Scrum; compare cycle time, shipped features, and developer satisfaction scores."},{"id":"r005","type":"estimate","tier":"stated","text":"Transitioning one team to Shape Up requires 1 week of process design (shaping table, betting table) and 1 cycle (6 weeks) to reach steady state."}]},{"question":"How should we handle technical debt in our sprint planning?","claims":[{"id":"r001","type":"factual","tier":"web","text":"Teams that allocate less than 15% of sprint capacity to tech debt reduction see compounding velocity loss of approximately 5% per quarter as the codebase degrades."},{"id":"r002","type":"recommendation","tier":"stated","text":"Reserve 20% of each sprint for tech debt, but let the team choose which debt to address based on what they encounter during feature work."},{"id":"r003","type":"risk","tier":"stated","text":"Dedicated 'tech debt sprints' create a backlog of deferred cleanup that never gets prioritized against feature work."},{"id":"r004","type":"recommendation","tier":"web","text":"Tag tech debt items with impact scores (frequency of encounter * time wasted per encounter) and address the highest-impact items first during the 20% allocation."},{"id":"r005","type":"estimate","tier":"stated","text":"A team consistently spending 20% on tech debt typically sees velocity stabilize within 2 quarters and improve by 10-15% within 4 quarters."}]},{"question":"Should we establish an internal developer platform team?","claims":[{"id":"r001","type":"factual","tier":"web","text":"Organizations with dedicated platform teams report 30% faster onboarding for new engineers and 40% fewer production incidents caused by misconfigured infrastructure."},{"id":"r002","type":"constraint","tier":"stated","text":"A minimum viable platform team requires 3-4 engineers; with a 50-person eng org, this represents 6-8% of total engineering capacity diverted from product work."},{"id":"r003","type":"risk","tier":"web","text":"Platform teams that build without close product team feedback create ivory-tower abstractions that nobody uses, wasting the entire investment."},{"id":"r004","type":"recommendation","tier":"documented","text":"Start with a 2-person platform team focused on the top 3 developer pain points identified in the last eng survey, and grow based on measured adoption."},{"id":"r005","type":"estimate","tier":"stated","text":"A 2-person platform team can deliver a self-service deployment pipeline, shared CI templates, and a developer portal within the first quarter."}]},{"question":"Should we use GitHub Copilot or Cursor for AI-assisted development?","claims":[{"id":"r001","type":"factual","tier":"tested","text":"In a 4-week trial, Copilot users completed boilerplate-heavy tasks 35% faster, but the AI suggestions required manual correction in 40% of cases for business logic."},{"id":"r002","type":"factual","tier":"tested","text":"Cursor's codebase-aware context window produced more accurate suggestions for project-specific patterns, reducing correction rate to 20% for the same business logic tasks."},{"id":"r003","type":"risk","tier":"web","text":"AI code assistants can introduce subtle security vulnerabilities: a Stanford study found that developers using AI assistance produced less secure code in 40% of security-relevant tasks."},{"id":"r004","type":"recommendation","tier":"stated","text":"Adopt Cursor for its superior context awareness, but require all AI-generated code in security-sensitive modules to go through a dedicated security review."},{"id":"r005","type":"estimate","tier":"stated","text":"Cursor licenses cost $20/user/month; at 50 engineers, the $1,000/month investment is expected to save 2-3 hours per developer per week in code authoring time."}]},{"question":"Should we deploy an LLM in production for our customer support chatbot?","claims":[{"id":"r001","type":"constraint","tier":"documented","text":"The chatbot must not hallucinate product pricing, warranty terms, or return policies; any factual claims must be grounded in the product knowledge base."},{"id":"r002","type":"factual","tier":"tested","text":"GPT-4o with RAG against the product docs achieved 94% answer accuracy in testing, but the remaining 6% included confidently-stated incorrect warranty durations."},{"id":"r003","type":"risk","tier":"web","text":"LLM API costs scale linearly with traffic; at 50K conversations/month with an average of 8 turns, GPT-4o API costs approximately $4,000/month."},{"id":"r004","type":"recommendation", // FUZZY MATCHER — cascade Layer 0 (from fuzzy.js)

// Fuzzy matcher for demo library
// Uses Levenshtein distance + word overlap scoring
// Returns the best-matching demo or null if no good match

// ── Utility: Levenshtein distance ────────────────────────────────────────────

function levenshtein(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;

  const matrix = [];

  for (let i = 0; i <= b.length; i++) {
    matrix[i] = [i];
  }
  for (let j = 0; j <= a.length; j++) {
    matrix[0][j] = j;
  }

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      const cost = b[i - 1] === a[j - 1] ? 0 : 1;
      matrix[i][j] = Math.min(
        matrix[i - 1][j] + 1,       // deletion
        matrix[i][j - 1] + 1,       // insertion
        matrix[i - 1][j - 1] + cost  // substitution
      );
    }
  }

  return matrix[b.length][a.length];
}

// ── Utility: Normalize text for comparison ───────────────────────────────────

const STOP_WORDS = new Set([
  'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being',
  'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could',
  'should', 'may', 'might', 'shall', 'can', 'need', 'dare', 'ought',
  'used', 'to', 'of', 'in', 'for', 'on', 'with', 'at', 'by', 'from',
  'as', 'into', 'through', 'during', 'before', 'after', 'above', 'below',
  'between', 'out', 'off', 'over', 'under', 'again', 'further', 'then',
  'once', 'and', 'but', 'or', 'nor', 'not', 'so', 'yet', 'both',
  'each', 'few', 'more', 'most', 'other', 'some', 'such', 'no',
  'only', 'own', 'same', 'than', 'too', 'very', 'just', 'because',
  'how', 'what', 'which', 'who', 'whom', 'this', 'that', 'these',
  'those', 'it', 'its', 'we', 'our', 'my', 'your', 'they', 'their',
  'about', 'up', 'if', 'when', 'where', 'why', 'all', 'any'
]);

function normalize(text) {
  return text
    .toLowerCase()
    .replace(/[^\w\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function significantWords(text) {
  return normalize(text)
    .split(' ')
    .filter(function (w) { return w.length > 1 && !STOP_WORDS.has(w); });
}

// ── Core: Score a query against a single library entry ───────────────────────

function scoreEntry(queryWords, queryNorm, entry) {
  const entryWords = significantWords(entry.question);
  const entryNorm = normalize(entry.question);

  // Word overlap: Jaccard-like — shared significant words / total unique words
  const querySet = {};
  const entrySet = {};
  let shared = 0;

  queryWords.forEach(function (w) { querySet[w] = true; });
  entryWords.forEach(function (w) { entrySet[w] = true; });

  Object.keys(querySet).forEach(function (w) {
    if (entrySet[w]) shared++;
  });

  const totalUnique = Object.keys(
    Object.assign({}, querySet, entrySet)
  ).length;

  const wordOverlap = totalUnique > 0 ? shared / totalUnique : 0;

  // Zero-overlap gate: no shared words = no match (fixes tie-breaking at index 0)
  if (shared === 0) return 0;

  // Normalized Levenshtein distance (0 = identical, 1 = completely different)
  const maxLen = Math.max(queryNorm.length, entryNorm.length);
  const levDist = maxLen > 0 ? levenshtein(queryNorm, entryNorm) / maxLen : 0;

  // Composite score: word overlap weighted heavily, Levenshtein as tiebreaker
  const score = 0.7 * wordOverlap + 0.3 * (1 - levDist);

  return score;
}

function fuzzyMatchDemo(query, library) {
  if (!query || !library || library.length === 0) return null;

  const queryWords = significantWords(query);
  const queryNorm = normalize(query);

  if (queryWords.length === 0) return null;

  let bestScore = 0;
  let bestEntry = null;

  for (let i = 0; i < library.length; i++) {
    const score = scoreEntry(queryWords, queryNorm, library[i]);
    if (score > bestScore) {
      bestScore = score;
      bestEntry = library[i];
    }
  }

  // Threshold: require minimum 0.25 score to avoid nonsense matches
  if (bestScore > 0.25 && bestEntry) {
    return { match: bestEntry, score: bestScore };
  }

  return null;
}

      turnCount: window._turnCount,

  try { localStorage.removeItem('grainulator-session'); } catch(e) {}

function loadSavedSession() {
  try {
    const raw = localStorage.getItem('grainulator-session');
    if (!raw) return null;
    const session = JSON.parse(raw);
    // Check if < 7 days old
    const sevenDays = 7 * 24 * 60 * 60 * 1000;
    if (Date.now() - session.savedAt > sevenDays) {
      clearSession();
      return null;
    }
    return session;
  } catch(e) { return null; }
