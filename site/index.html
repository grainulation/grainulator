<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');

function activateFallback() {
  document.body.classList.add('webgl-fallback');
}

function isSoftwareRenderer(g) {
  var ext = g.getExtension('WEBGL_debug_renderer_info');
  if (!ext) return false;
  var renderer = g.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
  return /swiftshader|llvmpipe|software|basic render/i.test(renderer);
}

if (!gl || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  if (!gl) activateFallback();
} else if (isSoftwareRenderer(gl)) {
  activateFallback();
} else {

// Context loss handler (w711)
c.addEventListener('webglcontextlost', (e) => { e.preventDefault(); activateFallback(); });

// Mobile detection
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;

// 8 blobs ALWAYS — one per product in the ecosystem
const NUM       = 8;
const STEPS     = isMobile ? 56   : 72;
const HIT_THRESH= isMobile ? '0.002' : '0.001';
const STEP_MULT = isMobile ? '0.85'  : '0.8';
const NORM_EPS  = isMobile ? '0.003' : '0.002';
const GLITCH_ON = isMobile ? 0       : 1;

// 3D raymarched lava lamp based on cineShader-Lava approach (w400-w402)
// opSmoothUnion on SDF spheres = actual opaque surfaces with normals

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;

#define NUM ${NUM}
#define STEPS ${STEPS}
#define HIT_THRESH ${HIT_THRESH}
#define STEP_MULT ${STEP_MULT}
#define NORM_EPS ${NORM_EPS}
#define GLITCH_ON ${GLITCH_ON}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

float hash(float n) { return fract(sin(n) * 43758.5453); }

// global: nearest blob index (set in map, read in main for coloring)
float g_nearestBlob = 0.0;

// per-blob neon color — each blob gets its own neon hue
vec3 getNeonColor(float idx) {
  // 8 blobs = 8 products, direct mapping
  int i = int(mod(idx, 8.0));
  if (i == 0) return vec3(0.984, 0.749, 0.141);      // wheat   #fbbf24
  if (i == 1) return vec3(0.957, 0.247, 0.369);      // barn    #f43f5e
  if (i == 2) return vec3(0.133, 0.773, 0.369);      // farmer  #22c55e
  if (i == 3) return vec3(0.231, 0.510, 0.965);      // mill    #3b82f6
  if (i == 4) return vec3(0.655, 0.545, 0.980);      // silo    #a78bfa
  if (i == 5) return vec3(0.984, 0.573, 0.235);      // harvest #fb923c
  if (i == 6) return vec3(0.133, 0.827, 0.933);      // orchard #22d3ee
  return vec3(0.612, 0.639, 0.686);                   // grain   #9ca3af
}

float map(vec3 p) {
  float d = 1e10;

  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float h1 = hash(fi * 412.531 + seed * 3.7);
    float h2 = hash(fi * 317.892 + seed * 5.1);
    float h3 = hash(fi * 253.147 + seed * 7.9);
    float h4 = hash(fi * 173.29 + seed * 2.1);

    // random position spread across full viewport
    float angle = fi * 2.39996 + seed * 6.28;
    float radius = 0.8 + h1 * 1.8; // wider spread for bigger blobs
    float baseX = cos(angle) * radius * (0.7 + h2 * 0.6);
    float baseY = sin(angle) * radius * (0.7 + h3 * 0.6);
    float baseZ = (h4 - 0.5) * 0.6;

    // slow organic drift — 3 layered sines per axis
    float sx = 0.03 + h1 * 0.04;
    float sy = 0.025 + h2 * 0.035;
    float sz = 0.02 + h3 * 0.03;
    float px = h2 * 6.28 + seed * 100.0;
    float py = h3 * 6.28 + seed * 100.0;
    float pz = h1 * 6.28 + seed * 100.0;

    float dx = sin(t*sx + px)*0.5 + sin(t*sx*0.37 + py + 1.7)*0.3 + cos(t*sx*0.71 + pz)*0.15;
    float dy = sin(t*sy + py + 0.5)*0.4 + cos(t*sy*0.43 + px + 2.1)*0.25 + sin(t*sy*0.67 + pz + 1.2)*0.15;
    float dz = cos(t*sz + pz + 1.0)*0.2 + sin(t*sz*0.53 + px)*0.1;

    vec3 blobPos = vec3(baseX + dx, baseY + dy, baseZ + dz);

    // random sizes
    // random size per blob on load: 0.2, 0.3, or 1.0
    float sizeRoll = fract(h4 * 3.7 + seed * 11.0);
    float blobR = sizeRoll < 0.33 ? 0.2 : (sizeRoll < 0.66 ? 0.3 : 1.0);

    vec3 evalP = p;

    // glitch — per-blob, rare, artistic
#if GLITCH_ON
    {
      float gw = sin(t*0.3 + fi*3.7) * sin(t*0.13 + fi*2.1);
      float burst = smoothstep(0.65, 0.9, gw);
      if (burst > 0.01) {
        vec3 toB = p - blobPos;
        float near = smoothstep(1.5, 0.1, length(toB));
        float amt = burst * near * 0.28;
        if (amt > 0.005) {
          float vs = mix(0.28, 0.10, fract(sin(fi*73.1 + floor(t*2.0))*438.5));
          vec3 snapped = floor(p/vs + 0.5) * vs;
          evalP = mix(p, snapped, amt);
        }
      }
    }
#endif

    // organic blob shape — cheap displacement, skip if far away
    vec3 localP = evalP - blobPos;
    float baseDist = length(localP) - blobR;
    float blobD = baseDist;
    // only compute noise near the surface (saves ~80% of sin calls)
    if (baseDist < blobR * 1.5) {
      vec3 nc = localP * (2.5 + fi * 0.3) + t * 0.06 + fi * 7.0;
      float warp = sin(nc.x * 1.7 + nc.y * 1.3) * sin(nc.y * 2.1 + nc.z * 0.9);
      blobD = baseDist - warp * blobR * 0.35;
    }
    float k = 0.3 + 0.1 * sin(fi * 1.7 + t * 0.05);
    if (blobD < d) g_nearestBlob = fi; // track closest blob for coloring
    d = smin(d, blobD, k);
  }

  return d;
}

vec3 calcNormal(vec3 p) {
  vec2 e = vec2(NORM_EPS, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

  vec3 ro = vec3(0.0, 0.0, 3.8);
  vec3 fwd = vec3(0.0, 0.0, -1.0);
  vec3 rgt = vec3(1.0, 0.0, 0.0);
  vec3 up2 = vec3(0.0, 1.0, 0.0);
  vec3 rd = normalize(fwd * 1.2 + rgt * uv.x + up2 * uv.y);

  float dist = 0.0;
  float hit = -1.0;
  float lastH = 1.0;
  for (int i = 0; i < STEPS; i++) {
    vec3 p = ro + rd * dist;
    float h = map(p);
    lastH = h;
    if (h < HIT_THRESH) { hit = dist; break; }
    if (dist > 15.0) break;
    dist += h * STEP_MULT;
  }

  // background — near-black
  vec3 col = vec3(0.005, 0.004, 0.003);
  vec3 bgCol = col;

  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    float NdotV = max(dot(n, -rd), 0.0);
    float fres = pow(1.0 - NdotV, 2.5);

    // neon color from nearest blob (tracked in map(), no second loop)
    vec3 neon = getNeonColor(g_nearestBlob);

    // wax body MATCHES the neon color — dark inside, bright edges
    vec3 waxCol = neon * mix(0.06, 0.18, fres * 0.5);
    float hemiAmt = 0.5 + 0.5 * n.y;
    vec3 hemiAmb = neon * mix(0.02, 0.05, hemiAmt);
    float sss = pow(max(dot(rd, n), 0.0), 2.0) * 0.15;
    col = waxCol + hemiAmb + neon * sss * 0.12;

    // fog
    float fog = exp(-hit * 0.05);
    col = mix(vec3(0.006, 0.005, 0.003), col, fog);

    // edge AA
    float edgeAA = smoothstep(HIT_THRESH, 0.0, lastH);
    col = mix(bgCol, col, edgeAA);

    // === NEON RIM — AFTER fog/AA, matching body color ===
    float rimWide = pow(fres, 1.3);
    float rimTight = pow(fres, 2.0);
    float rimHot = pow(fres, 3.5);
    col += neon * rimWide * 0.35;
    col += neon * rimTight * 1.8;
    col += neon * rimHot * 1.2;

  }

  // vignette
  float vig = 1.0 - dot(uv * 0.55, uv * 0.55);
  col *= smoothstep(0.0, 0.5, vig);

  // grain
  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233)) + t) * 43758.5453);
  col += grain * 0.004 - 0.002;

  gl_FragColor = vec4(col, 1.0);
}
`;

const compile = (src, type) => {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
};

const prog = gl.createProgram();
gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');
const seedVal = Math.random();
gl.uniform1f(seedLoc, seedVal);
// Resolution: reduce DPR on mobile for fewer fragment shader invocations
const dpr = isMobile ? Math.min(devicePixelRatio, 1.0) : Math.min(devicePixelRatio, 1.5);

const resize = () => {
  c.width = innerWidth * dpr;
  c.height = innerHeight * dpr;
  gl.viewport(0, 0, c.width, c.height);
};
resize();
addEventListener('resize', resize);

// idle timeout — pause after 90s to save battery (w713)
let lastInteraction = Date.now();
let paused = false;
document.addEventListener('mousemove', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });
document.addEventListener('touchstart', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });

const render = (time) => {
  if (Date.now() - lastInteraction > 90000) { paused = true; return; }
  gl.uniform1f(tLoc, time * 0.001);
  gl.uniform2f(rLoc, c.width, c.height);
  // uniforms set in render loop: t, r
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
};
requestAnimationFrame(render);

}

// copy command
const cmd = document.getElementById('cmd');
cmd.addEventListener('click', (e) => {
  e.preventDefault();
  navigator.clipboard.writeText('/plugin install grainulator').then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'copied.';
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); }, 1600);
  });
});
cmd.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cmd.click(); }
});

// register service worker for PWA install
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// easter egg: type "grain" anywhere
let kb = '';
document.addEventListener('keydown', (e) => {
  kb = (kb + e.key.toLowerCase()).slice(-10);
  if (kb.includes('grain')) {
    kb = '';
    document.body.style.transition = 'filter 0.2s';
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    setTimeout(() => { document.body.style.filter = 'none'; }, 400);
  }
});
</script>
</body>
