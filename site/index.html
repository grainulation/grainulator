<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');

function activateFallback() {
  document.body.classList.add('webgl-fallback');
}

function isSoftwareRenderer(g) {
  var ext = g.getExtension('WEBGL_debug_renderer_info');
  if (!ext) return false;
  var renderer = g.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
  return /swiftshader|llvmpipe|software|basic render/i.test(renderer);
}

if (!gl || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  if (!gl) activateFallback();
} else if (isSoftwareRenderer(gl)) {
  activateFallback();
} else {

// Context loss handler (w711)
c.addEventListener('webglcontextlost', (e) => { e.preventDefault(); activateFallback(); });

// Mobile detection
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || innerWidth < 768;

// Perf params — mobile gets lighter workload, desktop unchanged
const NUM       = isMobile ? 8    : 12;
const STEPS     = isMobile ? 48   : 96;
const HIT_THRESH= isMobile ? '0.003' : '0.001';
const STEP_MULT = isMobile ? '1.0'   : '0.8';
const NORM_EPS  = isMobile ? '0.003' : '0.001';
const GLITCH_ON = isMobile ? 0       : 1;  // disable glitch on mobile

// 3D raymarched lava lamp based on cineShader-Lava approach (w400-w402)
// opSmoothUnion on SDF spheres = actual opaque surfaces with normals

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform float seed;
uniform vec2 tilt; // device orientation: x=gamma(left/right), y=beta(front/back)

#define NUM ${NUM}
#define STEPS ${STEPS}
#define HIT_THRESH ${HIT_THRESH}
#define STEP_MULT ${STEP_MULT}
#define NORM_EPS ${NORM_EPS}
#define GLITCH_ON ${GLITCH_ON}

// smooth min — the merge magic (w400: k=0.4 is the sweet spot)
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float sdSphere(vec3 p, float s) {
  return length(p) - s;
}

// glitch state
float glitchAmount = 0.0; // 1.0 = full 8-bit, 0.0 = HD
#if GLITCH_ON
float glitchSeed = 0.0;

float glitchHash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
#endif

// the lava scene — all blobs combined via smooth union
float map(vec3 p) {
#if GLITCH_ON
  // patchy glitch: cell-based voxelization, each cell triggers independently
  if (glitchAmount > 0.01) {
    float cellSize = 0.8;
    vec2 cell = floor(p.xy / cellSize);
    float cellRand = glitchHash(cell + glitchSeed);
    float cellOn = step(0.6, cellRand);
    float cellPhase = cellRand * 0.4;
    float localAmount = clamp(glitchAmount - cellPhase, 0.0, 1.0) * cellOn;
    if (localAmount > 0.01) {
      float vs = localAmount * 0.35;
      vec3 snapped = floor(p / vs + 0.5) * vs;
      p = mix(p, snapped, localAmount);
    }
  }
#endif

  float d = 100.0;

  for (int i = 0; i < NUM; i++) {
    float fi = float(i);
    float hash1 = fract(fi * 412.531 + 0.513 + seed);
    float hash2 = fract(fi * 317.892 + 0.217 + seed * 1.7);
    float hash3 = fract(fi * 253.147 + 0.891 + seed * 2.3);

    // vertical convection: each blob rises and falls
    float speed = (hash1 - 0.5) * 0.4;
    float phase = fi * 1.37 + seed * 6.28;

    // heat source direction — on desktop heat is at bottom (0,-1,0)
    // on mobile, tilt rotates where the heat source is
    vec2 heatDir = vec2(-tilt.x, -1.0 + tilt.y); // default: heat below
    float heatLen = length(heatDir);
    heatDir = heatLen > 0.01 ? heatDir / heatLen : vec2(0.0, -1.0);

    // each blob has a thermal cycle:
    // 1. sits near heat source (bottom), warms up
    // 2. rises away from heat (upward)
    // 3. cools at the top, sinks back toward heat
    float cycle = sin(t * speed + phase); // -1 to 1
    float rising = cycle * 0.5 + 0.5;    // 0 = near heat, 1 = far from heat

    // quadratic easing: blobs linger near bottom (heating) then rise faster
    float eased = rising < 0.5
      ? 2.0 * rising * rising
      : 1.0 - 2.0 * (1.0 - rising) * (1.0 - rising);

    // position along heat axis (rise away from heat source)
    float travel = eased * 2.4 - 1.2; // -1.2 to +1.2

    // blobs move OPPOSITE to heat direction (float away from heat)
    vec3 offset;
    offset.x = -heatDir.x * travel + sin(t * 0.08 * (0.5 + hash2) + phase * 2.1) * 0.5;
    offset.y = -heatDir.y * travel + sin(t * 0.07 * (0.5 + hash3) + phase * 1.7) * 0.3;
    offset.z = cos(t * 0.1 * (0.5 + hash3) + phase * 1.7) * 0.3;

    // smaller blobs — more room to dance
    float size = mix(0.25, 0.55, hash1);

    d = smin(d, sdSphere(p - offset, size), 0.45);
  }

  // heat pool — where the heat source is (blobs emerge from here)
  vec2 hd = vec2(-tilt.x, -1.0 + tilt.y);
  float hl = length(hd);
  hd = hl > 0.01 ? hd / hl : vec2(0.0, -1.0);
  vec3 heatPos = vec3(hd.x * 2.2, hd.y * 2.2, 0.0);
  float pool = sdSphere(p - heatPos, 1.0);
  d = smin(d, pool, 0.5);

  // cool pool — opposite side where blobs collect before sinking
  vec3 coolPos = -heatPos * 0.9;
  float topPool = sdSphere(p - coolPos, 0.7);
  d = smin(d, topPool, 0.4);

  return d;
}

// normal from SDF
vec3 calcNormal(vec3 p) {
  vec2 e = vec2(NORM_EPS, 0.0);
  return normalize(vec3(
    map(p+e.xyy) - map(p-e.xyy),
    map(p+e.yxy) - map(p-e.yxy),
    map(p+e.yyx) - map(p-e.yyx)
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5*r) / min(r.x, r.y);

#if GLITCH_ON
  // glitch: progressive 8-bit -> HD self-correction
  float glitchCycle = 8.0;
  float glitchDuration = 1.5;
  float cyclePos = mod(t, glitchCycle);
  float cycleSeed = floor(t / glitchCycle);
  float triggerPoint = 2.0 + fract(sin(cycleSeed * 73.17) * 4378.5) * 4.0;
  float glitchProgress = (cyclePos - triggerPoint) / glitchDuration;
  if (glitchProgress > 0.0 && glitchProgress < 1.0) {
    glitchAmount = 1.0 - glitchProgress;
    glitchAmount = glitchAmount * glitchAmount;
    glitchSeed = cycleSeed;
  } else {
    glitchAmount = 0.0;
  }
#endif

  // camera — looking at lamp from front
  vec3 ro = vec3(0.0, 0.0, 6.0);
  vec3 rd = normalize(vec3(uv, -2.0));

  // raymarch
  float d = 0.0;
  float hit = -1.0;
  for (int i = 0; i < STEPS; i++) {
    vec3 p = ro + rd * d;
    float h = map(p);
    if (h < HIT_THRESH) { hit = d; break; }
    if (d > 20.0) break;
    d += h * STEP_MULT;
  }

  // liquid background — dark amber, brighter at bottom
  float bgY = uv.y * 0.5 + 0.5;
  vec3 col = mix(
    vec3(0.06, 0.04, 0.015),  // warm amber at bottom (bulb)
    vec3(0.015, 0.012, 0.008), // dark at top
    bgY
  );

  // bulb hotspot — follows heat source direction
  vec2 hd2 = vec2(-tilt.x, -1.0 + tilt.y);
  float hl2 = length(hd2);
  hd2 = hl2 > 0.01 ? hd2 / hl2 : vec2(0.0, -1.0);
  vec2 bulbPos = hd2 * 0.5;
  float bulb = exp(-dot(uv - bulbPos, uv - bulbPos) * 4.0);
  col += vec3(0.08, 0.05, 0.02) * bulb;

  if (hit > 0.0) {
    vec3 p = ro + rd * hit;
    vec3 n = calcNormal(p);

    // light from heat source direction
    vec2 ld = vec2(-tilt.x, -1.0 + tilt.y);
    float ll = length(ld);
    ld = ll > 0.01 ? ld / ll : vec2(0.0, -1.0);
    vec3 lightDir = normalize(vec3(ld.x * 0.5 + 0.2, ld.y, 0.8));
    float diff = max(dot(n, lightDir), 0.0);
    diff = sqrt(diff); // soften — wax is translucent (w409)

    // ambient — soft fill
    float amb = 0.25 + 0.15 * n.y;

    // rim/fresnel — backlit edges
    float fres = pow(1.0 - max(dot(n, -rd), 0.0), 2.5);

    // subsurface scatter fake
    float sss = max(dot(n, -lightDir), 0.0) * 0.2;

    // specular — very subtle waxy sheen
    vec3 H = normalize(lightDir - rd);
    float spec = pow(max(dot(n, H), 0.0), 16.0) * 0.12;

    // wax color — DARK center, BRIGHT edge (r1700, r1711: inverse of typical metaball)
    // thick wax = dark olive #2d6b30, thin edges = bright lime #66ff66
    float heightFade = (p.y + 3.0) / 6.0;
    vec3 waxDark = mix(
      vec3(0.20, 0.50, 0.06), // dark olive-green near bulb (warmer)
      vec3(0.12, 0.38, 0.05), // even darker olive at top (cooler)
      clamp(heightFade, 0.0, 1.0)
    );
    vec3 waxBright = vec3(0.40, 1.0, 0.25); // bright lime for thin edges

    // fresnel = 1 at glancing angles (thin wax) = where light passes through
    // the interior is DARK (opaque wax blocks light)
    // the rim is BRIGHT (backlit, light shines through thin margins)
    vec3 waxCol = mix(waxDark, waxBright, fres * 0.7);

    // bottom lighting heats the underside (r1701, r1710)
    float underLight = max(dot(n, vec3(0.0, -1.0, 0.0)), 0.0);
    waxCol += vec3(0.08, 0.15, 0.02) * underLight;

    // combine — matte, lit by the bulb below
    col = waxCol * (diff * 0.4 + amb + sss * 0.5);
    // fluorescent blue rim — Bullina lineata iridescence
    // inner rim: bright green, outer rim: electric blue glow
    float rimInner = pow(fres, 1.5);  // wider green halo
    float rimOuter = pow(fres, 3.0);  // tight blue edge
    col += waxBright * rimInner * 0.25;
    col += vec3(0.1, 0.35, 1.0) * rimOuter * 1.2; // strong fluorescent blue
    // blue bloom — spills slightly beyond the edge
    col += vec3(0.05, 0.15, 0.6) * pow(fres, 5.0) * 0.8;
    // very subtle specular — waxy, not shiny
    col += vec3(0.2, 0.4, 0.1) * spec * 0.5;

    // depth fog — amber-tinted liquid (r1704)
    float fog = exp(-hit * 0.08);
    vec3 fogCol = vec3(0.035, 0.028, 0.012);
    col = mix(fogCol, col, fog);
  }

  // vignette — gentle
  float vig = 1.0 - dot(uv * 0.6, uv * 0.6);
  col *= smoothstep(0.0, 0.5, vig);

  // grain
  float grain = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)) + t) * 43758.5453);
  col += grain * 0.005 - 0.0025;

  gl_FragColor = vec4(col, 1.0);
}
`;

const compile = (src, type) => {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error('Shader:', gl.getShaderInfoLog(s));
  return s;
};

const prog = gl.createProgram();
gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) console.error('Link:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const seedLoc = gl.getUniformLocation(prog, 'seed');
const seedVal = Math.random();
gl.uniform1f(seedLoc, seedVal);
const tiltLoc = gl.getUniformLocation(prog, 'tilt');

// device orientation — phone tilt moves the lava
let tiltX = 0, tiltY = 0;
const handleOrientation = (e) => {
  tiltX = (e.gamma || 0) / 90.0;
  tiltY = ((e.beta || 0) - 45) / 90.0;
  tiltX = Math.max(-1, Math.min(1, tiltX));
  tiltY = Math.max(-1, Math.min(1, tiltY));
};
window.addEventListener('deviceorientation', handleOrientation);
// iOS 13+ needs permission
if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.body.addEventListener('click', function once() {
    DeviceOrientationEvent.requestPermission().then((s) => {
      if (s === 'granted') window.addEventListener('deviceorientation', handleOrientation);
    }).catch(()=> {});
    document.body.removeEventListener('click', once);
  });
}

// Resolution: reduce DPR on mobile for fewer fragment shader invocations
const dpr = isMobile ? Math.min(devicePixelRatio, 1.5) : devicePixelRatio;

const resize = () => {
  c.width = innerWidth * dpr;
  c.height = innerHeight * dpr;
  gl.viewport(0, 0, c.width, c.height);
};
resize();
addEventListener('resize', resize);

// idle timeout — pause after 90s to save battery (w713)
let lastInteraction = Date.now();
let paused = false;
document.addEventListener('mousemove', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });
document.addEventListener('touchstart', () => { lastInteraction = Date.now(); if (paused) { paused = false; requestAnimationFrame(render); } });

const render = (time) => {
  if (Date.now() - lastInteraction > 90000) { paused = true; return; }
  gl.uniform1f(tLoc, time * 0.001);
  gl.uniform2f(rLoc, c.width, c.height);
  gl.uniform2f(tiltLoc, tiltX, tiltY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
};
requestAnimationFrame(render);

}

// copy command
const cmd = document.getElementById('cmd');
cmd.addEventListener('click', (e) => {
  e.preventDefault();
  navigator.clipboard.writeText('/plugin install grainulator').then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'copied.';
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); }, 1600);
  });
});
cmd.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cmd.click(); }
});

// easter egg: type "grain" anywhere
let kb = '';
document.addEventListener('keydown', (e) => {
  kb = (kb + e.key.toLowerCase()).slice(-10);
  if (kb.includes('grain')) {
    kb = '';
    document.body.style.transition = 'filter 0.2s';
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    setTimeout(() => { document.body.style.filter = 'none'; }, 400);
  }
});
</script>
