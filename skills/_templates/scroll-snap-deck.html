<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} — Grainulator Sprint</title>
<style>
:root {
  --bg: #0a0e1a;
  --fg: #e2e8f0;
  --fg2: #94a3b8;
  --fg3: #64748b;
  --accent: #4ecdc4;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-snap-type:y mandatory;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;line-height:1.6}

/* Skip nav */
.skip-nav{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:1000}
.skip-nav:focus{position:fixed;top:8px;left:8px;width:auto;height:auto;padding:12px 24px;background:var(--accent);color:#000;font-weight:700;font-size:.875rem;border-radius:8px;text-decoration:none;z-index:10000}

/* sr-only */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0, 0, 0, 0);white-space:nowrap;border-width:0}

/* Focus */
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Slides */
section[aria-roledescription="slide"]{min-height:100vh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;padding:48px 24px;position:relative}
section[aria-roledescription="slide"]:focus{outline:none}
section[aria-roledescription="slide"]:focus-visible{outline:2px solid var(--accent);outline-offset:-4px}

.slide-inner{max-width:900px;width:100%;text-align:center}

h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px}
h2{font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
h3{font-size:1.1rem;font-weight:700;margin-bottom:8px}

.gradient-text{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@supports not (-webkit-background-clip: text) {
  .gradient-text{color:#60a5fa}
}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 24px;text-align:left}
.card p{color:var(--fg2);font-size:.9rem}

/* Risk indicators */
.risk-indicator{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.risk-indicator.high{background:rgba(248,113,113,.1);color:#f87171}
.risk-indicator.medium{background:rgba(251,191,36,.1);color:#fbbf24}
.risk-indicator.low{background:rgba(52,211,153,.1);color:#34d399}

/* Tags with text labels */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;border:1px solid var(--border)}

/* Responsive */
@media(max-width:720px){
  html{scroll-snap-type:none}
  section[aria-roledescription="slide"]{min-height:auto;padding:40px 16px}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-snap-type:none;scroll-behavior:auto}
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}
}
</style>
</head>
<body>
<a href="#main-content" class="skip-nav">Skip to content</a>

<main id="main-content" role="main" aria-roledescription="carousel" aria-label="{{title}} presentation">

<!-- Slide 1: Title -->
<section aria-roledescription="slide" aria-label="Slide 1 of 4: Title" tabindex="0">
  <div class="slide-inner">
    <h1 class="gradient-text">{{title}}</h1>
    <p style="color:var(--fg2);font-size:1.1rem">{{subtitle}}</p>
  </div>
</section>

<!-- Slide 2: Executive Summary -->
<section aria-roledescription="slide" aria-label="Slide 2 of 4: Executive Summary" tabindex="0">
  <div class="slide-inner">
    <h2>Executive Summary</h2>
    <p style="color:var(--fg2)">{{summary}}</p>
  </div>
</section>

<!-- Slide 3: Findings -->
<section aria-roledescription="slide" aria-label="Slide 3 of 4: Key Findings" tabindex="0">
  <div class="slide-inner">
    <h2>Key Findings</h2>
    <div class="card">
      <h3>{{finding_title}}</h3>
      <p>{{finding_detail}}</p>
    </div>
  </div>
</section>

<!-- Slide 4: Risks & Recommendations -->
<section aria-roledescription="slide" aria-label="Slide 4 of 4: Risks and Recommendations" tabindex="0">
  <div class="slide-inner">
    <h2>Risks &amp; Recommendations</h2>
    <p style="color:var(--fg2)">{{risks_and_recs}}</p>
  </div>
</section>

</main>

<div id="slide-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<footer role="contentinfo" style="padding:24px;text-align:center;font-size:.75rem;color:var(--fg3);border-top:1px solid var(--border)">
  Compiled by Grainulator &middot; {{date}} &middot; {{claim_count}} claims
</footer>

<script>
/* IntersectionObserver for slide transitions -- announces current slide */
(() => {
  var announcer = document.getElementById('slide-announcer');
  var slides = document.querySelectorAll('[aria-roledescription="slide"]');
  var observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        var label = entry.target.getAttribute('aria-label') || '';
        announcer.textContent = label;
      }
    });
  }, { threshold: 0.5 });
  slides.forEach((slide) => { observer.observe(slide); });
})();
</script>
</body>
</html>
